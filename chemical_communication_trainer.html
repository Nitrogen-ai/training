/* ============================================================
   12. PARSER für freie Eingaben
   ============================================================ */
const STEM = {meth:1,eth:2,prop:3,but:4,pent:5,hex:6,hept:7,oct:8,non:9,dec:10};

function parseFree(raw) {
  if (!raw) return null;
  const s = raw.toLowerCase().trim().replace(/\s+/g," ");
  if (LOOKUP.has(s)) return LOOKUP.get(s);
  // Alkan
  let m = s.match(/^(meth|eth|prop|but|pent|hex|hept|oct|non|dec)an(?:e)?$/);
  if (m) return makeAdHoc("alkan", STEM[m[1]]);
  // Alkanol
  m = s.match(/^(meth|eth|prop|but|pent|hex|hept|oct|non|dec)an(?:-(\d+)-)?ol$/);
  if (m) return makeAdHoc("alkanol", STEM[m[1]], m[2]?+m[2]:1);
  m = s.match(/^(\d+)-(meth|eth|prop|but|pent|hex|hept|oct|non|dec)an(?:e)?ol$/);
  if (m) return makeAdHoc("alkanol", STEM[m[2]], +m[1]);
  // Säure
  m = s.match(/^(meth|eth|prop|but|pent|hex)ans(?:ä|ae)ure$/);
  if (m) return makeAdHoc("alkansaeure", STEM[m[1]]);
  m = s.match(/^(meth|eth|prop|but|pent|hex)anoic acid$/);
  if (m) return makeAdHoc("alkansaeure", STEM[m[1]]);
  // Aldehyd
  m = s.match(/^(meth|eth|prop|but|pent|hex)anal$/);
  if (m) return makeAdHoc("alkanal", STEM[m[1]]);
  // Alken
  m = s.match(/^(eth|prop|but|pent|hex|hept|oct)en$/);
  if (m) return makeAdHoc("alken", STEM[m[1]], 1);
  m = s.match(/^(eth|prop|but|pent|hex|hept|oct)ene$/);
  if (m) return makeAdHoc("alken", STEM[m[1]], 1);
  m = s.match(/^(\d+)-(prop|but|pent|hex|hept|oct)en(?:e)?$/);
  if (m) return makeAdHoc("alken", STEM[m[2]], +m[1]);
  m = s.match(/^(prop|but|pent|hex|hept|oct)-(\d+)-en$/);
  if (m) return makeAdHoc("alken", STEM[m[1]], +m[2]);
  // Alkin
  m = s.match(/^(eth|prop|but|pent|hex)in$/);
  if (m) return makeAdHoc("alkin", STEM[m[1]], 1);
  m = s.match(/^(but|pent|hex)-(\d+)-in$/);
  if (m) return makeAdHoc("alkin", STEM[m[1]], +m[2]);
  // Keton
  m = s.match(/^(prop|but|pent|hex)an-(\d+)-on$/);
  if (m) return makeAdHoc("alkanon", STEM[m[1]], +m[2]);
  return null;
}

function makeAdHoc(kind, n, pos=1) {
  const out = {};
  if (kind === "alkan") {
    out.full = () => (n===1 ? methaneStruct() : nAlkaneFull(n, ALK[n-1] || `C${n}-Alkan`));
    out.skeletal = () => nAlkaneSkeletal(n, ALK[n-1] || `C${n}-Alkan`);
  } else if (kind === "alkanol") {
    const name = `${ALK[n-1]||"C"+n}-${pos}-ol`.replace("anan","an");
    const fixedName = (n===1 && pos===1) ? "Methanol" : (n===2 && pos===1) ? "Ethanol" : `${ALK[n-1].replace("an","")}an-${pos}-ol`;
    out.full = () => nAlkanolFull(n, pos, fixedName);
    out.skeletal = () => nAlkanolSkeletal(n, pos, fixedName);
  } else if (kind === "alkansaeure") {
    const nm = ACID[n] || `C${n}-Alkansäure`;
    out.full = () => nAcidFull(n, nm);
    out.skeletal = () => nAcidSkeletal(n, nm);
  } else if (kind === "alkanal") {
    const nm = ALD[n] || `C${n}-Alkanal`;
    out.full = () => nAldehydeFull(n, nm);
    out.skeletal = () => nAldehydeSkeletal(n, nm);
  } else if (kind === "alken") {
    const nm = (pos===1 && ENE[n]) ? ENE[n] : `${ALK[n-1].replace("an","")}-${pos}-en`;
    out.full = () => nAlkeneFull(n, pos, nm);
    out.skeletal = () => nAlkeneSkeletal(n, pos, nm);
  } else if (kind === "alkin") {
    const nm = (pos===1 && YNE[n]) ? YNE[n] : `${ALK[n-1].replace("an","")}-${pos}-in`;
    out.full = () => nAlkyneFull(n, pos, nm);
    out.skeletal = () => nAlkyneSkeletal(n, pos, nm);
  } else if (kind === "alkanon") {
    const nm = `${ALK[n-1].replace("an","")}an-${pos}-on`;
    out.full = () => nKetoneFull(n, pos, nm);
    out.skeletal = () => nKetoneSkeletal(n, pos, nm);
  } else return null;
  return out;
}


/* ============================================================
   13. RENDERER — gibt SVG-String zurück
   opts: { showH, showLP, lpStyle: 'dots'|'lines', mode: 'lewis'|'skeletal' }
   ============================================================ */
const VB = 1000;
const MARGIN = 90;
const BOND_MIN = 60;
const BOND_MAX = 180;

function render(struct, opts) {
  if (!struct) return null;
  let {atoms, bonds} = struct;
  const showLP = !!opts.showLP;
  const showH  = !!opts.showH;
  const lpLine = (opts.lpStyle === "lines");
  const isSkel = (opts.mode === "skeletal");

  // Maske: welche Atome zeichnen wir?
  const visible = atoms.map(a => {
    if (a.hidden) return false; // nur im Skelett
    if (a.e === "H" && !showH && !isSkel) return false;
    return true;
  });
  // Im Skelett: H's an C verbergen (anders gesagt: alle H sind versteckt im Skelett)
  // Im aktuellen Datenmodell hat das Skelett keine H's, also passt das.

  // Bounding box (nur über sichtbare und über Bindungs-Endpunkte)
  let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
  for (let i=0; i<atoms.length; i++) {
    if (!visible[i] && atoms[i].e === "H" && !isSkel) continue;
    const a = atoms[i];
    if (a.x < minX) minX = a.x;
    if (a.x > maxX) maxX = a.x;
    if (a.y < minY) minY = a.y;
    if (a.y > maxY) maxY = a.y;
  }
  const w = maxX - minX, h = maxY - minY;
  const inner = VB - 2*MARGIN;
  let scale;
  if (w < 0.01 && h < 0.01) scale = BOND_MAX;
  else scale = Math.min(inner / Math.max(w, 0.01), inner / Math.max(h, 0.01));
  scale = Math.max(BOND_MIN, Math.min(BOND_MAX, scale));

  const bondLen   = scale;
  const stroke    = Math.max(3.5, bondLen * 0.055);
  const fontSize  = Math.max(24, bondLen * 0.40);
  const lpDot     = Math.max(3, bondLen * 0.05);
  const lpSep     = bondLen * 0.18;
  const lpDist    = bondLen * 0.34;
  const labelPad  = bondLen * 0.22;
  const dbOff     = bondLen * 0.13;
  const tbOff     = bondLen * 0.16;

  const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
  const toX = x => VB/2 + (x - cx) * scale;
  const toY = y => VB/2 + (y - cy) * scale;

  /* Bindungen */
  const bondParts = [];
  const line = (x1,y1,x2,y2) =>
    `<line x1="${x1.toFixed(2)}" y1="${y1.toFixed(2)}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}" stroke="#1c1712" stroke-width="${stroke.toFixed(2)}" stroke-linecap="round"/>`;

  for (const b of bonds) {
    const A = atoms[b.a], B = atoms[b.b];
    if (A.e === "H" && !visible[b.a]) continue;
    if (B.e === "H" && !visible[b.b]) continue;
    const x1 = toX(A.x), y1 = toY(A.y), x2 = toX(B.x), y2 = toY(B.y);
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.hypot(dx, dy);
    if (len < 1e-6) continue;
    const ux = dx/len, uy = dy/len;
    const padA = visible[b.a] ? labelPad : 0;
    const padB = visible[b.b] ? labelPad : 0;
    const a0x = x1 + ux*padA, a0y = y1 + uy*padA;
    const b0x = x2 - ux*padB, b0y = y2 - uy*padB;
    const px = -uy, py = ux;
    if (b.o === 1) {
      bondParts.push(line(a0x, a0y, b0x, b0y));
    } else if (b.o === 2) {
      // Beide Linien gleich lang, symmetrisch um die Bindungsachse versetzt
      const off = dbOff;
      bondParts.push(line(
        a0x - px*off, a0y - py*off,
        b0x - px*off, b0y - py*off
      ));
      bondParts.push(line(
        a0x + px*off, a0y + py*off,
        b0x + px*off, b0y + py*off
      ));
    } else if (b.o === 3) {
      // Mittellinie + zwei symmetrisch versetzte, alle gleich lang
      const off = tbOff;
      bondParts.push(line(a0x, a0y, b0x, b0y));
      bondParts.push(line(
        a0x - px*off, a0y - py*off,
        b0x - px*off, b0y - py*off
      ));
      bondParts.push(line(
        a0x + px*off, a0y + py*off,
        b0x + px*off, b0y + py*off
      ));
    }
  }

  /* Atom-Labels (weißer Hintergrund-Pad, unabhängig vom Papier-Beige) */
  const atomParts = [];
  for (let i=0; i<atoms.length; i++) {
    const a = atoms[i];
    if (!visible[i]) continue;
    const x = toX(a.x), y = toY(a.y);
    const r = Math.max(fontSize * 0.55, fontSize * 0.30 * a.e.length);
    atomParts.push(
      `<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${r.toFixed(2)}" fill="#ffffff"/>`
    );
    atomParts.push(
      `<text x="${x.toFixed(2)}" y="${y.toFixed(2)}" font-size="${fontSize.toFixed(2)}" `+
      `font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="500" `+
      `text-anchor="middle" dominant-baseline="central" fill="#1c1712">${a.e}</text>`
    );
    // Ladung wird im LP-Block platziert (kennt die LP-Richtungen)
  }

  /* LPs und Ladungen — gemeinsam behandeln, damit Ladungen außerhalb der LPs stehen */
  const lpParts = [];
  const chargeParts = [];
  for (let i=0; i<atoms.length; i++) {
    const a = atoms[i];
    if (!visible[i]) continue;
    const hasLP = !!(a.lp && a.lp > 0);
    const hasUnpaired = !!a.unpaired;
    const hasCharge = !!a.charge;
    if (!hasLP && !hasUnpaired && !hasCharge) continue;

    // Bindungs-Winkel an a sammeln
    const neigh = [];
    const bondAng = [];
    for (const b of bonds) {
      if (b.a === i) { neigh.push({j:b.b, o:b.o}); bondAng.push(Math.atan2(atoms[b.b].y - a.y, atoms[b.b].x - a.x)); }
      else if (b.b === i) { neigh.push({j:b.a, o:b.o}); bondAng.push(Math.atan2(atoms[b.a].y - a.y, atoms[b.a].x - a.x)); }
    }
    // Hybridisierung (für Orbital-Anzahl)
    let maxO = 1;
    for (const {o} of neigh) if (o > maxO) maxO = o;
    let nOrb;
    if (maxO === 3) nOrb = 2;
    else if (maxO === 2) nOrb = 3;
    else nOrb = 4;

    // LP-Winkel berechnen (nur falls LP > 0; aber zur Ladungsplatzierung
    // brauchen wir auch dann die Winkel der "implizit" zu vermeidenden Richtungen)
    const nLp = a.lp || 0;
    const lpAngles = (showLP && nLp > 0) ? computeLPAngles(bondAng, nOrb, nLp) : [];

    const ax = toX(a.x), ay = toY(a.y);
    // LP zeichnen
    if (showLP) {
      for (const ang of lpAngles) {
        drawLP(lpParts, ax, ay, ang, lpDist, lpSep, lpDot, stroke, lpLine);
      }
    }
    // Einzelne (ungepaarte) Elektronen als Punkte — je eines pro freier Seite.
    // Lewis-Konvention: erst je 1 Elektron auf jede der 4 Oktett-Seiten.
    const unpairedAngs = [];
    if (hasUnpaired && showLP) {
      const nUnpaired = (typeof a.unpaired === "number") ? a.unpaired : 1;
      for (let u=0; u<nUnpaired; u++) {
        const occ = bondAng.concat(lpAngles, unpairedAngs);
        const ang = findFreeAngle(occ);
        unpairedAngs.push(ang);
        const cxL = ax + Math.cos(ang)*lpDist;
        const cyL = ay + Math.sin(ang)*lpDist;
        lpParts.push(`<circle cx="${cxL.toFixed(2)}" cy="${cyL.toFixed(2)}" r="${lpDot.toFixed(2)}" fill="#1c1712"/>`);
      }
    }

    // Ladungen — werden außerhalb aller bindenden + nichtbindenden Elektronen gezeichnet
    if (hasCharge) {
      const occupied = bondAng.concat(lpAngles, unpairedAngs);
      const ang = findFreeAngle(occupied);
      // Distanz so groß, dass Ladung hinter den LPs steht
      const chDist = (showLP && (nLp > 0 || hasUnpaired))
                       ? lpDist + lpSep * 1.4 + bondLen * 0.10
                       : bondLen * 0.42;
      const supSize = fontSize * 0.50;
      const cxC = ax + Math.cos(ang) * chDist;
      const cyC = ay + Math.sin(ang) * chDist;
      chargeParts.push(
        `<text x="${cxC.toFixed(2)}" y="${cyC.toFixed(2)}" `+
        `font-size="${supSize.toFixed(2)}" font-family="'Helvetica Neue',sans-serif" font-weight="500" `+
        `text-anchor="middle" dominant-baseline="central" fill="#1c1712">${a.charge}</text>`
      );
    }
  }

  return {
    svg:
`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${VB} ${VB}" width="${VB}" height="${VB}" preserveAspectRatio="xMidYMid meet">
  <rect width="${VB}" height="${VB}" fill="#ffffff"/>
  ${bondParts.join("\n  ")}
  ${atomParts.join("\n  ")}
  ${lpParts.join("\n  ")}
  ${chargeParts.join("\n  ")}
</svg>`,
    bondLen, atomCount: atoms.length
  };
}

/* === DUAL-MODELL: VSEPR vs. Orbital (Punkt II.a) ===
   Für reine Elemente / Metalle mit eindeutigen Valenzelektronen.
   Zwei Panele nebeneinander, jeweils mit Titel:
     links  = VSEPR-Modell: Valenzelektronen als Einzelpunkte, maximal
              voneinander entfernt (Abstoßung sichtbar)
     rechts = Orbital-Modell: Elektronen zu Orbital-Paaren gruppiert,
              doppelt besetzte Orbitale als Strich (Lewis-Paar),
              einfach besetzte als Punkt. */
function renderDualModel(subst, valence, titles) {
  const PW = 1000, PH = 1000;           // jedes Panel quadratisch (Viewbox-Einheiten)
  const GAP = 60;
  const totalW = PW*2 + GAP;
  // Element-Symbol aus der Struktur (Einzelatom), nicht aus dem Substanznamen
  let symbol = subst.formula || subst.name || "?";
  try {
    const st = subst.full && subst.full();
    if (st && st.atoms && st.atoms.length === 1) symbol = st.atoms[0].e;
  } catch(e){}
  const fontSize = 150;
  const dotR = 16;
  const lineStroke = 13;
  const lpDist = 130;     // Abstand der Elektronen vom Symbol-Zentrum
  const lpSep = 50;       // Abstand der zwei Punkte/Strichlänge eines Paares
  const titleSize = 62;

  function panel(ox, mode, title) {
    const cx = ox + PW/2, cy = PH/2 + 40;
    const parts = [];
    // Titel
    parts.push(
      `<text x="${(ox+PW/2).toFixed(1)}" y="92" font-size="${titleSize}" `+
      `font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="600" `+
      `text-anchor="middle" fill="#6b5bd2">${title}</text>`
    );
    // Trennlinie unter Titel
    parts.push(`<line x1="${(ox+120).toFixed(1)}" y1="140" x2="${(ox+PW-120).toFixed(1)}" y2="140" stroke="#e0dccf" stroke-width="3"/>`);
    // Symbol
    parts.push(`<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${(fontSize*0.6).toFixed(1)}" fill="#ffffff"/>`);
    parts.push(
      `<text x="${cx.toFixed(1)}" y="${cy.toFixed(1)}" font-size="${fontSize}" `+
      `font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="500" `+
      `text-anchor="middle" dominant-baseline="central" fill="#1c1712">${symbol}</text>`
    );

    if (mode === "vsepr") {
      // Valenzelektronen als Einzelpunkte, gleichmäßig im Kreis (max. Abstoßung).
      // Start bei 0° (rechts), sodass z.B. 2 Elektronen links+rechts stehen.
      const n = valence;
      for (let k=0; k<n; k++) {
        const ang = k * (2*Math.PI / Math.max(n,1));
        const px = cx + Math.cos(ang)*lpDist;
        const py = cy + Math.sin(ang)*lpDist;
        parts.push(`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="${dotR}" fill="#1c1712"/>`);
      }
    } else {
      // Orbital-Modell: Elektronen paaren (s-Orbital zuerst, dann p).
      // Anzahl Paare = floor(valence/2), Rest = einzelne Elektronen.
      const pairs = Math.floor(valence/2);
      const singles = valence % 2;
      // Positionen: maximal entfernt — wir verteilen (pairs+singles) "Orbitale"
      const nOrb = pairs + singles;
      const slots = [];
      for (let k=0; k<nOrb; k++) {
        slots.push(-Math.PI/2 + k * (2*Math.PI / Math.max(nOrb,1)));
      }
      let si = 0;
      // Paare als Strich (quer zur radialen Richtung)
      for (let p=0; p<pairs; p++) {
        const ang = slots[si++];
        const mx = cx + Math.cos(ang)*lpDist, my = cy + Math.sin(ang)*lpDist;
        const px = -Math.sin(ang), py = Math.cos(ang);
        const half = lpSep/2 + dotR;
        parts.push(`<line x1="${(mx+px*half).toFixed(1)}" y1="${(my+py*half).toFixed(1)}" x2="${(mx-px*half).toFixed(1)}" y2="${(my-py*half).toFixed(1)}" stroke="#1c1712" stroke-width="${lineStroke}" stroke-linecap="round"/>`);
      }
      // Einzelelektronen als Punkt
      for (let s=0; s<singles; s++) {
        const ang = slots[si++];
        const mx = cx + Math.cos(ang)*lpDist, my = cy + Math.sin(ang)*lpDist;
        parts.push(`<circle cx="${mx.toFixed(1)}" cy="${my.toFixed(1)}" r="${dotR}" fill="#1c1712"/>`);
      }
    }
    return parts.join("\n  ");
  }

  const leftPanel = panel(0, "vsepr", titles.vsepr);
  const rightPanel = panel(PW+GAP, "orbital", titles.orbital);
  // dezente vertikale Trennlinie zwischen den Panelen
  const divider = `<line x1="${(PW+GAP/2).toFixed(1)}" y1="180" x2="${(PW+GAP/2).toFixed(1)}" y2="${(PH-120)}" stroke="#e8e4d8" stroke-width="2" stroke-dasharray="8 8"/>`;

  return {
    svg:
`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${totalW} ${PH}" width="${totalW}" height="${PH}" preserveAspectRatio="xMidYMid meet">
  <rect width="${totalW}" height="${PH}" fill="#ffffff"/>
  ${leftPanel}
  ${divider}
  ${rightPanel}
</svg>`,
    bondLen: 0, atomCount: 1
  };
}

/* Findet die Mitte der größten Lücke zwischen besetzten Winkeln */
function findFreeAngle(occupied) {
  if (occupied.length === 0) return -Math.PI/2; // Default: oben
  const sorted = occupied.slice().sort((u,v)=>u-v);
  let bestAng = 0, bestGap = -1;
  for (let k=0; k<sorted.length; k++) {
    const a1 = sorted[k];
    const a2 = sorted[(k+1) % sorted.length] + ((k+1) >= sorted.length ? 2*Math.PI : 0);
    const gap = a2 - a1;
    if (gap > bestGap) {
      bestGap = gap;
      bestAng = (a1 + a2) / 2;
    }
  }
  return bestAng;
}

function drawLP(out, ax, ay, ang, dist, sep, dotR, stroke, asLine) {
  const cxL = ax + Math.cos(ang)*dist;
  const cyL = ay + Math.sin(ang)*dist;
  const px = -Math.sin(ang), py = Math.cos(ang);  // senkrecht
  if (asLine) {
    // Strich quer zur Bindungs-Richtung, Länge ~ sep + 2*dotR
    const half = (sep + 2*dotR) / 2;
    const x1 = cxL + px*half, y1 = cyL + py*half;
    const x2 = cxL - px*half, y2 = cyL - py*half;
    out.push(`<line x1="${x1.toFixed(2)}" y1="${y1.toFixed(2)}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}" stroke="#1c1712" stroke-width="${stroke.toFixed(2)}" stroke-linecap="round"/>`);
  } else {
    const x1 = cxL + px*sep/2, y1 = cyL + py*sep/2;
    const x2 = cxL - px*sep/2, y2 = cyL - py*sep/2;
    out.push(`<circle cx="${x1.toFixed(2)}" cy="${y1.toFixed(2)}" r="${dotR.toFixed(2)}" fill="#1c1712"/>`);
    out.push(`<circle cx="${x2.toFixed(2)}" cy="${y2.toFixed(2)}" r="${dotR.toFixed(2)}" fill="#1c1712"/>`);
  }
}

/* Berechne LP-Winkel via VSEPR-Repulsion:
   Bindungen sind feste Pole, LPs werden auf dem Kreis so platziert,
   dass die Summe der inversen Winkelabstände (zu Bindungen UND anderen LPs)
   minimal wird. Iterative Relaxation (Gradient-Descent auf 1D-Kreis). */
function computeLPAngles(bondAng, nOrb, nLp) {
  if (nLp <= 0) return [];
  const k = bondAng.length;

  // Sonderfall: keine Bindungen → äquidistant
  if (k === 0) {
    const out = [];
    for (let i=0; i<nLp; i++) out.push(2*Math.PI * i / nLp - Math.PI/2);
    return out;
  }

  // Sonderfall: 2 lineare Bindungen (0° / 180°) → LPs exakt senkrecht ober/unterhalb
  if (k === 2) {
    const d = Math.abs(wrapPi(bondAng[0] - bondAng[1]));
    if (Math.abs(d - Math.PI) < 0.15) {
      // linear: LPs senkrecht zur Bindungsachse
      const axis = bondAng[0];
      const perp1 = axis + Math.PI/2;
      const perp2 = axis - Math.PI/2;
      if (nLp === 2) return [perp1, perp2];
      if (nLp === 1) return [perp1];
      // mehr als 2 LPs bei linearer Anordnung: verteile symmetrisch
      const out = [];
      for (let i=0; i<nLp; i++) {
        out.push(perp1 + (i - (nLp-1)/2) * 0.5);
      }
      return out;
    }
  }

  // Allgemeine Initialisierung: LPs round-robin in die größten Lücken
  const sorted = bondAng.slice().sort((u,v)=>u-v);
  const gaps = [];
  for (let i=0; i<sorted.length; i++) {
    const a1 = sorted[i];
    const a2 = sorted[(i+1) % sorted.length] + ((i+1) >= sorted.length ? 2*Math.PI : 0);
    gaps.push({mid: (a1 + a2)/2, size: a2 - a1, a1, a2, count: 0});
  }
  // Verteile LPs proportional zur Lückengröße (round-robin nach Restkapazität)
  const lps = [];
  for (let n=0; n<nLp; n++) {
    // Wähle die Lücke mit größtem "Druck" = size / (count+1)
    let best = gaps[0];
    for (const g of gaps) {
      if (g.size / (g.count+1) > best.size / (best.count+1)) best = g;
    }
    best.count++;
  }
  // Setze LPs gleichmäßig innerhalb jeder Lücke
  for (const g of gaps) {
    for (let j=1; j<=g.count; j++) {
      const t = j / (g.count + 1);
      lps.push(g.a1 + t * g.size);
    }
  }
  while (lps.length < nLp) lps.push(gaps[0].mid);

  // Repulsions-Optimierung: LPs sind bewegliche Ladungen, Bindungen feste Anker
  const FIXED = bondAng;
  const STEP = 0.05;
  const ITERS = 240;
  for (let iter=0; iter<ITERS; iter++) {
    for (let i=0; i<lps.length; i++) {
      let force = 0;
      for (const b of FIXED) {
        const d = wrapPi(lps[i] - b);
        if (Math.abs(d) > 1e-6) force += Math.sign(d) / (d*d);
      }
      for (let j=0; j<lps.length; j++) {
        if (j === i) continue;
        const d = wrapPi(lps[i] - lps[j]);
        if (Math.abs(d) > 1e-6) force += Math.sign(d) / (d*d);
      }
      if (force > 50) force = 50;
      if (force < -50) force = -50;
      lps[i] += STEP * force * 0.01;
    }
  }

  return lps.map(a => {
    while (a > Math.PI) a -= 2*Math.PI;
    while (a <= -Math.PI) a += 2*Math.PI;
    return a;
  });
}

/* Wickelt Δ in (-π, π] (kürzester Bogen) */
function wrapPi(d) {
  while (d > Math.PI) d -= 2*Math.PI;
  while (d <= -Math.PI) d += 2*Math.PI;
  return d;
}

function circMean(angs) {
  let sx=0, sy=0;
  for (const a of angs) { sx += Math.cos(a); sy += Math.sin(a); }
  return Math.atan2(sy, sx);
}
function circHalfDiff(a, b) {
  let d = a - b;
  while (d > Math.PI) d -= 2*Math.PI;
  while (d < -Math.PI) d += 2*Math.PI;
  return Math.abs(d) / 2;
}

/* =====================================================
   HELPERS
   ===================================================== */
function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function slugify(s) {
  return (s || "molekuel")
    .toLowerCase()
    .replace(/ä/g, "ae").replace(/ö/g, "oe").replace(/ü/g, "ue").replace(/ß/g, "ss")
    .replace(/\(.*?\)/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-|-$/g, "") || "molekuel";
}

function substanceName(s, lang) {
  if (lang === "en" && s.en) return s.en;
  return s.name;
}

function downloadSVG(svgString, filename) {
  // Versuche Blob zuerst
  try {
    const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 100);
    return true;
  } catch (e) {}
  // Fallback data URI
  try {
    const data = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgString);
    const a = document.createElement("a");
    a.href = data; a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    return true;
  } catch (e) {}
  return false;
}

/* Renderer-Wrapper: Lewis oder Skelett */
function renderRep(subst, rep) {
  if (!subst) return null;
  if (rep === "structural") {
    // Dual-Modell (VSEPR vs. Orbital) für reine Elemente / Metalle mit Einzelatom
    if (qualifiesDualModel(subst)) {
      const val = valenceOf(subst);
      return renderDualModel(subst, val, {
        vsepr: T("modelVSEPR"),
        orbital: T("modelOrbital")
      });
    }
    const struct = subst.full ? subst.full() : null;
    // Aromaten ohne vollständige Lewis-Struktur (Naphthalin/Anthracen):
    // Ringskelett auch als "Strukturformel" zeigen
    if (!struct && subst.aromaticKind) {
      return renderAromatic(subst.aromaticKind, subst.name, subst.formula);
    }
    if (!struct) return null;
    return render(struct, { showLP: true, showH: true, lpStyle: "lines", mode: "lewis" });
  }
  if (rep === "skeletal") {
    // Aromaten: dedizierter Kekulé-/Mesomerie-Renderer
    if (subst.aromaticKind) {
      return renderAromatic(subst.aromaticKind, subst.name, subst.formula);
    }
    const struct = subst.skeletal ? subst.skeletal() : null;
    if (!struct) return null;
    return render(struct, { showLP: false, showH: false, lpStyle: "lines", mode: "skeletal" });
  }
  return null;
}

/* Valenzelektronen einer Substanz (Feld oder aus Struktur). */
function valenceOf(subst) {
  if (typeof subst.valence === "number") return subst.valence;
  // aus Einzelatom-Struktur ableiten: 2*lp + unpaired
  try {
    const st = subst.full && subst.full();
    if (st && st.atoms && st.atoms.length === 1) {
      const a = st.atoms[0];
      return (a.lp ? a.lp*2 : 0) + (a.unpaired ? 1 : 0);
    }
  } catch(e){}
  return 0;
}

/* Eignet sich die Substanz für die Gegenüberstellung (zwei Modelle)?
   Nur Erdalkalimetalle (Mg, Ca) und Aluminiumgruppe (Al) — dort ist der
   Kontrast Punkte-Darstellung vs. Orbital-Paar didaktisch sinnvoll.
   Alle anderen Elemente/Nichtmetalle werden normal als Lewis-Formel gezeichnet. */
const DUAL_MODEL_KEYS = ["mg_metal", "ca_metal", "al_metal"];
function qualifiesDualModel(subst) {
  return DUAL_MODEL_KEYS.includes(subst.key);
}

/* Summenformel ohne Zustand (für kompakte Listen-Chips). */
function formulaPlain(subst) {
  const fws = formulaWithState(subst);
  const m = fws.match(/^(.*?)\([a-z]+\)$/);
  return m ? m[1] : fws;
}

/* Summenformel mit Aggregatzustand als tiefgestellter Index für die Anzeige.
   z.B. H₂SO₄ + Zustand l → "H₂SO₄" gefolgt von kleinem (l) als <sub>. */
function formulaDisplay(subst) {
  const fws = formulaWithState(subst);  // "H₂SO₄(l)"
  const m = fws.match(/^(.*?)\(([a-z]+)\)$/);
  if (!m) return fws;
  const base = m[1], state = m[2];
  return `${base}<sub class="state-index">(${state})</sub>`;
}

/* SVG-Box-Wrapper für Tile-Inhalt */
function svgInTile(subst, rep) {
  const r = renderRep(subst, rep);
  if (!r) return null;
  return r.svg;
}

/* Elektronenkonfiguration eines Übergangsmetalls als HTML (Orbital-Kästchen).
   Zeigt die volle Konfiguration als Text + die Außenschale als besetzte Orbitale. */
function econfigHtml(subst) {
  if (!subst || !subst.econfig) return `<div style="color:#888">${T("notAvailable")}</div>`;
  // Parse die Kurzkonfiguration, z.B. "3d⁶ 4s²" → [{shell:'3d',n:6},{shell:'4s',n:2}]
  const supMap = {"⁰":0,"¹":1,"²":2,"³":3,"⁴":4,"⁵":5,"⁶":6,"⁷":7,"⁸":8,"⁹":9};
  function parseSup(s){ let v=0; for(const ch of s){ if(supMap[ch]!==undefined) v=v*10+supMap[ch]; } return v; }
  const parts = [];
  const re = /([0-9][spdf])([⁰¹²³⁴⁵⁶⁷⁸⁹]+)/g;
  let m;
  while ((m = re.exec(subst.econfigShort)) !== null) {
    parts.push({ shell: m[1], n: parseSup(m[2]) });
  }
  // Orbital-Kapazität: s=1 Box, p=3, d=5, f=7 (je 2 Elektronen)
  const cap = { s:1, p:3, d:5, f:7 };
  let boxes = "";
  for (const p of parts) {
    const type = p.shell[1];
    const nBoxes = cap[type] || 1;
    // Verteile p.n Elektronen nach Hund: erst je 1 (↑), dann auffüllen (↓)
    let up = new Array(nBoxes).fill(false);
    let down = new Array(nBoxes).fill(false);
    let e = p.n;
    for (let i=0;i<nBoxes && e>0;i++){ up[i]=true; e--; }
    for (let i=0;i<nBoxes && e>0;i++){ down[i]=true; e--; }
    let orbBoxes = "";
    for (let i=0;i<nBoxes;i++){
      const arrows = (up[i]?"↑":"") + (down[i]?"↓":"");
      orbBoxes += `<span class="orb-box">${arrows||"&nbsp;"}</span>`;
    }
    boxes += `<div class="orb-shell">
      <div class="orb-label">${p.shell}</div>
      <div class="orb-boxes">${orbBoxes}</div>
    </div>`;
  }
  return `<div class="econfig">
    <div class="econfig-full">${subst.econfig}</div>
    <div class="orb-row">${boxes}</div>
  </div>`;
}

/* SVG mit Substanz-Beschriftung am unteren Rand (für Export) */
function renderForExport(subst, rep, lang) {
  const r = renderRep(subst, rep);
  if (!r) return null;
  let svg = r.svg;
  const vb = svg.match(/viewBox="0 0 ([\d.]+) ([\d.]+)"/);
  const W = vb ? parseFloat(vb[1]) : 1000;
  const H = vb ? parseFloat(vb[2]) : 1000;
  const extra = 160;
  const newH = H + extra;
  // Canvas nach unten erweitern (viewBox, svg-Höhe, Hintergrund-Rect),
  // damit die zweite Zeile (Summenformel) NICHT mehr abgeschnitten wird.
  svg = svg.replace(/viewBox="0 0 [\d.]+ [\d.]+"/, `viewBox="0 0 ${W} ${newH}"`);
  svg = svg.replace(/height="[\d.]+"/, `height="${newH}"`);          // svg-Tag
  svg = svg.replace(/<rect width="[\d.]+" height="[\d.]+" fill="#ffffff"\/>/,
                    `<rect width="${W}" height="${newH}" fill="#ffffff"/>`);
  const name = substanceName(subst, lang);
  const formula = formulaWithState(subst) || subst.formula || "";
  const cx = W/2, nameY = H + 66, formulaY = H + 118;
  const label = `<text x="${cx}" y="${nameY}" font-size="40" font-family="Helvetica,Arial,sans-serif" font-weight="600" text-anchor="middle" fill="#1c1712">${escapeXml(name)}</text>` +
                (formula ? `<text x="${cx}" y="${formulaY}" font-size="30" font-family="Helvetica,Arial,sans-serif" font-style="italic" text-anchor="middle" fill="#6c6358">${escapeXml(formula)}</text>` : "");
  svg = svg.replace(/<\/svg>/, label + "</svg>");
  return svg;
}

function escapeXml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

const TASK_TYPES = [
  { id: "name",       emoji: "📝", labelKey: "tile_name" },
  { id: "formula",    emoji: "🔬", labelKey: "tile_formula" },
  { id: "skeletal",   emoji: "🦴", labelKey: "tile_skeletal" },

];
const TILE_ECONFIG = { id: "econfig", emoji: "🪙", labelKey: "tile_econfig" };

/* Welche Kacheln gelten für diese Substanz?
   - Übergangsmetalle: Name, Summenformel, Elektronenkonfiguration (kein Lewis/Skelett)
   - Substanzen ohne sinnvolle Skelettformel: Skelett-Kachel entfällt (Punkt 0e)
   - sonst: alle vier */
/* Skelettformeln für Aliphaten (Alkane/Alkene/Alkine + Verzweigte), Aromaten
   sowie die funktionellen Klassen Alkanale, Alkanone, Carbonsäuren und Ester.
   Die Skelett-Kachel erscheint nur, wenn skeletal() tatsächlich etwas liefert. */
const SKELETAL_CLASSES = ["alkan","alkan_iso","alken","alken_iso","alkin","alkin_iso",
                          "aromat","alkanal","alkanon","alkansaeure","ester"];
function taskTypesFor(subst) {
  if (!subst) return TASK_TYPES;
  if (subst.klass === "transition") {
    return [
      { id: "name",    emoji: "📝", labelKey: "tile_name" },
      { id: "formula", emoji: "🔬", labelKey: "tile_formula" },
      TILE_ECONFIG
    ];
  }
  // Skelett nur bei Aliphaten/Aromaten UND wenn eine sinnvolle Skelettformel existiert
  let hasSkeletal = false;
  if (SKELETAL_CLASSES.includes(subst.sub) && typeof subst.skeletal === "function") {
    try { hasSkeletal = !!subst.skeletal(); } catch(e) { hasSkeletal = false; }
  }
  if (!hasSkeletal) {
    return TASK_TYPES.filter(t => t.id !== "skeletal");
  }
  return TASK_TYPES;
}

  naoh:{emoji:"🧴", de:"Natronlauge löst Fett und Eiweiß – Kern von Rohrreinigern. Die freien OH⁻-Ionen knacken die Bindungen in Fettmolekülen (Verseifung).", en:"Caustic soda dissolves fat and protein – core of drain cleaners. The free OH⁻ ions break the bonds in fat molecules (saponification)."},
  koh: {emoji:"🪥", de:"Kalilauge wird zu weicher Schmierseife und dient als Batterie-Elektrolyt. Die beweglichen K⁺- und OH⁻-Ionen leiten den Strom.", en:"Potassium hydroxide becomes soft soap and a battery electrolyte. The mobile K⁺ and OH⁻ ions carry the current."},
  caoh2:{emoji:"🧱", de:"Gelöschter Kalk steckt in Mörtel und macht saure Böden fruchtbar. Die OH⁻-Ionen neutralisieren überschüssige H⁺-Ionen im Boden.", en:"Slaked lime is in mortar and makes acidic soils fertile. Its OH⁻ ions neutralise excess H⁺ ions in the soil."},

  // ---- Säuren ----
  hf:  {emoji:"🔬", de:"Ätzt sogar Glas – zum Mattieren und für Mikrochips. Das kleine, hart anziehende Fluorid bindet das Silicium aus dem Glas heraus. Sehr gefährlich.", en:"Even etches glass – for frosting and microchips. The small, strongly attracting fluoride pulls silicon out of the glass. Very dangerous."},
  hcl: {emoji:"🍽️", de:"Bildet unsere Magensäure und reinigt Metall vor dem Verzinken. In Wasser spaltet die polare H–Cl-Bindung vollständig in H⁺ und Cl⁻ – darum eine starke Säure.", en:"Forms our stomach acid and cleans metal before galvanizing. In water the polar H–Cl bond splits completely into H⁺ and Cl⁻ – hence a strong acid."},
  hbr: {emoji:"⚗️", de:"Starke Säure für Bromverbindungen. Die H–Br-Bindung ist noch leichter spaltbar als bei HCl, da Brom größer ist und das Elektron schwächer hält.", en:"A strong acid for bromine compounds. The H–Br bond splits even more easily than HCl, as the larger bromine holds the electron more loosely."},
  hi:  {emoji:"⚗️", de:"Sehr starke Säure und kräftiges Reduktionsmittel. Die lange, schwache H–I-Bindung gibt H⁺ am leichtesten ab.", en:"A very strong acid and powerful reducing agent. The long, weak H–I bond releases H⁺ most readily."},
  hcn: {emoji:"☠️", de:"Riecht nach Bittermandeln, hochgiftig (in Spuren in Apfelkernen). Das Cyanid-Ion blockiert das Eisen in der Atmungskette der Zellen.", en:"Smells of bitter almonds, highly toxic (traces in apple seeds). The cyanide ion blocks the iron in cells' respiratory chain."},
  hno3:{emoji:"💥", de:"Grundstoff für Dünger und Sprengstoffe (TNT). Die leicht abspaltbaren O-reichen Nitro-Gruppen liefern bei der Explosion blitzschnell viel Gas.", en:"Basis for fertilizers and explosives (TNT). The readily released, oxygen-rich nitro groups deliver a lot of gas in a flash during an explosion."},
  h2so4:{emoji:"🔋", de:"Die meistproduzierte Chemikalie der Welt – Säure in Autobatterien. Sie gibt zwei H⁺-Ionen ab und entzieht Stoffen gierig Wasser (stark hygroskopisch).", en:"The world's most-produced chemical – the acid in car batteries. It releases two H⁺ ions and greedily strips water from substances (strongly hygroscopic)."},
  h3po4:{emoji:"🥤", de:"Gibt Cola den herben Geschmack, steckt in Rostumwandlern. Die drei sauren OH-Gruppen können nacheinander H⁺ abgeben.", en:"Gives cola its tang, used in rust converters. Its three acidic OH groups can release H⁺ one after another."},
  h2co3:{emoji:"🫧", de:"Entsteht, wenn CO₂ sich in Wasser löst – das Prickeln im Sprudel. Sie zerfällt leicht zurück zu CO₂ und Wasser, daher entweicht die Kohlensäure.", en:"Forms when CO₂ dissolves in water – the fizz in sparkling drinks. It readily decomposes back to CO₂ and water, so the carbonic acid escapes."},

  // ---- Salze ----
  nacl:{emoji:"🧂", de:"Kochsalz – Würze und Streusalz. Das starke Ionengitter aus Na⁺ und Cl⁻ macht es fest; Wasser-Dipole reißen die Ionen heraus, daher löst es sich gut.", en:"Table salt – seasoning and road grit. The strong ionic lattice of Na⁺ and Cl⁻ makes it solid; water dipoles tear the ions out, so it dissolves well."},
  kcl: {emoji:"🧂", de:"Diät-Speisesalz und Kaliumdünger. Wie alle Salze ein hartes, sprödes Ionengitter, das in Wasser in K⁺ und Cl⁻ zerfällt.", en:"Diet salt and potassium fertilizer. Like all salts a hard, brittle ionic lattice that dissociates into K⁺ and Cl⁻ in water."},
  kbr: {emoji:"😌", de:"War früher Beruhigungsmittel und Fotochemikalie. Das große Bromid-Ion bildet mit K⁺ ein leicht lösliches Gitter.", en:"Once a sedative and photo chemical. The large bromide ion forms an easily soluble lattice with K⁺."},
  ki:  {emoji:"🧂", de:"Macht Speisesalz zu Jodsalz und schützt die Schilddrüse. Das große Iodid-Ion ist gut wasserlöslich und vom Körper rasch aufnehmbar.", en:"Makes iodized salt and protects the thyroid. The large iodide ion is very water-soluble and quickly absorbed."},
  naf: {emoji:"🦷", de:"Härtet als Zahnpasta-Zusatz den Zahnschmelz. Die kleinen Fluorid-Ionen werden ins Schmelz-Mineral eingebaut und machen es säurefester.", en:"As a toothpaste additive it hardens enamel. The small fluoride ions get built into the enamel mineral, making it more acid-resistant."},
  nabr:{emoji:"⚗️", de:"Diente in Beruhigungsmitteln und als Bohrspülung. Das dichte Ionengitter macht gesättigte Lösungen schwer – ideal als schwere Spülflüssigkeit.", en:"Used in sedatives and as drilling fluid. The dense ionic lattice makes saturated solutions heavy – ideal as a weighting fluid."},
  mgo: {emoji:"🧗", de:"Hitzebeständig (Schamotte) und „Chalk“ beim Klettern. Die doppelt geladenen Mg²⁺/O²⁻-Ionen ziehen sich sehr stark an → extrem hoher Schmelzpunkt.", en:"Heat-resistant (firebrick) and climbers' 'chalk'. The doubly charged Mg²⁺/O²⁻ ions attract very strongly → extremely high melting point."},
  cao: {emoji:"🔥", de:"Branntkalk wird mit Wasser sehr heiß (selbsterhitzende Dosen, Mörtel). Beim Einbau der Wasser-Dipole ins Ca²⁺/O²⁻-Gitter wird viel Energie frei.", en:"Quicklime gets very hot with water (self-heating cans, mortar). Inserting water dipoles into the Ca²⁺/O²⁻ lattice releases a lot of energy."},

  // ---- Aromaten ----
  benzol:{emoji:"⚠️", de:"Baustein vieler Kunststoffe und Farbstoffe, zugleich krebserregend. Die sechs Elektronen sind ringförmig „verschmiert“ (delokalisiert) – das macht den Ring ungewöhnlich stabil.", en:"A building block of many plastics and dyes, but carcinogenic. Its six electrons are 'smeared' around the ring (delocalised) – making it unusually stable."},
  naphthalin:{emoji:"🦋", de:"Der typische Geruch alter Mottenkugeln. Die unpolaren Moleküle verdampfen langsam (Sublimation) und vertreiben Motten – ganz ohne zu schmelzen.", en:"The typical smell of old mothballs. The non-polar molecules slowly evaporate (sublimation) and repel moths – without even melting."},
  anthracen:{emoji:"🌈", de:"Ausgangsstoff leuchtender Farbstoffe, in der OLED-Forschung untersucht. Das ausgedehnte delokalisierte Elektronensystem kann Licht aufnehmen und wieder abstrahlen.", en:"A precursor for bright dyes, studied for OLEDs. Its extended delocalised electron system can absorb light and emit it again."},

  // ---- Alkane ----
  alkan_1:{emoji:"🔥", de:"Hauptbestandteil von Erdgas, zugleich starkes Treibhausgas. Die winzigen, unpolaren Moleküle haben kaum Van-der-Waals-Kräfte – darum ist Methan ein Gas.", en:"Main component of natural gas, also a potent greenhouse gas. The tiny, non-polar molecules have barely any Van-der-Waals forces – so methane is a gas."},
  alkan_2:{emoji:"⛽", de:"Im Erdgas; wird zu Ethen für Kunststoffe gespalten. Etwas längere Kette als Methan, aber die schwachen Van-der-Waals-Kräfte halten es noch gasförmig.", en:"In natural gas; cracked into ethene for plastics. A slightly longer chain than methane, but weak Van-der-Waals forces keep it gaseous."},
  alkan_3:{emoji:"🏕️", de:"Füllt Camping- und Grillflaschen, weil es sich unter mildem Druck verflüssigen lässt – die Van-der-Waals-Kräfte reichen dafür schon fast aus.", en:"Fills camping and barbecue bottles because it liquefies under mild pressure – its Van-der-Waals forces almost suffice on their own."},
  alkan_4:{emoji:"🔥", de:"Das Gas in Feuerzeugen. Mit vier C-Atomen ist Butan das längste noch gasförmige Standard-Alkan; etwas mehr Van-der-Waals-Kräfte als Propan.", en:"The gas in lighters. With four carbons, butane is the longest still-gaseous standard alkane; slightly more Van-der-Waals attraction than propane."},
  alkan_5:{emoji:"🧪", de:"Sehr flüchtige Flüssigkeit, Treibmittel für Schäume. Ab fünf C-Atomen reichen die Van-der-Waals-Kräfte gerade für den flüssigen Zustand.", en:"A very volatile liquid, a blowing agent for foams. From five carbons on, Van-der-Waals forces just suffice for the liquid state."},
  alkan_6:{emoji:"🫒", de:"Löst Fette und gewinnt Pflanzenöl aus Saaten. Die unpolaren Hexan-Moleküle ziehen die ebenfalls unpolaren, langen Fettketten über Van-der-Waals-Kräfte heraus – „Gleiches löst Gleiches“.", en:"Dissolves fats and extracts vegetable oil from seeds. The non-polar hexane molecules pull out the equally non-polar fat chains via Van-der-Waals forces – 'like dissolves like'."},
  alkan_7:{emoji:"⛽", de:"Referenzsubstanz mit Oktanzahl 0: unverzweigtes Heptan bildet bei der Verbrennung leicht reaktive Radikale, die zu vorzeitigem „Klopfen“ führen.", en:"Reference with octane number 0: straight-chain heptane easily forms reactive radicals during combustion, causing premature 'knocking'."},
  alkan_8:{emoji:"🏎️", de:"Iso-Octan (verzweigt) definiert die Oktanzahl 100: seine Verbrennungs-Radikale sind durch die Verzweigung stabiler und zünden erst beim Funken – kein Klopfen.", en:"Iso-octane (branched) defines octane number 100: its combustion radicals are stabilised by the branching and ignite only at the spark – no knocking."},
  alkan_9:{emoji:"⛽", de:"Bestandteil von Kerosin. Die langen Ketten ziehen sich über viele Van-der-Waals-Kontakte stark an → flüssig und lagerfähig im Flugzeugflügel statt zu verdampfen.", en:"A component of kerosene. The long chains attract strongly via many Van-der-Waals contacts → liquid and storable in the wing tanks instead of evaporating."},
  alkan_10:{emoji:"🛢️", de:"Gehört zur Kerosin-/Dieselfraktion. Noch längere Ketten = noch stärkere Van-der-Waals-Kräfte, daher höherer Siedepunkt als die kürzeren Alkane.", en:"Belongs to the kerosene/diesel fraction. Even longer chains = even stronger Van-der-Waals forces, hence a higher boiling point than shorter alkanes."},

  // ---- Alkene ----
  alken_2:{emoji:"🍌", de:"Reifegas der Pflanzen (lässt Bananen nachreifen) und Rohstoff für Polyethylen. Die reaktive Doppelbindung lässt sich aufknüpfen und zu langen Ketten verbinden.", en:"The plant ripening gas (ripens bananas) and raw material for polyethylene. Its reactive double bond can be opened and linked into long chains."},
  alken_3:{emoji:"♳", de:"Baustein von Polypropylen (Verpackungen, Autoteile). Die Doppelbindung ist die „Sollbruchstelle“, an der die Moleküle zu Ketten verknüpft werden.", en:"The basis of polypropylene (packaging, car parts). The double bond is the 'weak point' where molecules link into chains."},
  alken_4:{emoji:"🏭", de:"Comonomer zum Einstellen der Eigenschaften von Polyethylen. Die Seitenkette stört die regelmäßige Packung der Polymerketten und macht den Kunststoff weicher.", en:"A comonomer for tuning polyethylene. Its side chain disturbs the regular packing of the polymer chains, making the plastic softer."},
  alken_5:{emoji:"⚗️", de:"Reaktives Alken aus dem Crackprozess. Die Doppelbindung ist elektronenreich und wird gern von Säuren oder Brom angegriffen.", en:"A reactive alkene from cracking. The electron-rich double bond is readily attacked by acids or bromine."},
  alken_6:{emoji:"⚗️", de:"Baustein für spezielle Polyethylen-Sorten. Längere Kette = mehr Van-der-Waals-Kräfte, daher schon flüssig statt gasförmig.", en:"A building block for special polyethylene grades. A longer chain = more Van-der-Waals forces, so it is liquid rather than gaseous."},
  alken_7:{emoji:"⚗️", de:"Längeres α-Alken für Feinchemikalien. Die endständige Doppelbindung ist der bevorzugte Reaktionsort.", en:"A longer α-olefin for fine chemicals. The terminal double bond is the preferred reaction site."},
  alken_8:{emoji:"🧴", de:"Wird zu Tensiden und Weichmachern verarbeitet. Der lange unpolare Schwanz + reaktive Doppelbindung machen es zum idealen Waschmittel-Vorprodukt.", en:"Processed into surfactants and plasticizers. Its long non-polar tail + reactive double bond make it an ideal detergent precursor."},

  // ---- Alkine ----
  alkin_2:{emoji:"🔥", de:"Ethin (Acetylen) liefert die heißeste gängige Schweißflamme (>3000 °C). In der Dreifachbindung steckt sehr viel Energie, die beim Verbrennen schlagartig frei wird.", en:"Ethyne (acetylene) gives the hottest common welding flame (>3000 °C). Its triple bond stores a lot of energy, released abruptly on burning."},
  alkin_3:{emoji:"⚗️", de:"Reaktives Gas und Synthesebaustein. Die elektronenreiche Dreifachbindung lässt sich vielseitig weiter verknüpfen.", en:"A reactive gas and synthesis building block. The electron-rich triple bond links versatilely."},
  alkin_4:{emoji:"⚗️", de:"Endständiges Alkin für Kupplungsreaktionen. Das ≡C–H ist schwach sauer und lässt sich gezielt abspalten.", en:"A terminal alkyne for coupling reactions. The ≡C–H is weakly acidic and can be removed deliberately."},
  alkin_5:{emoji:"⚗️", de:"Reaktives Zwischenprodukt. Die hohe Elektronendichte der Dreifachbindung macht es zum guten Anknüpfungspunkt.", en:"A reactive intermediate. The high electron density of the triple bond makes it a good attachment point."},
  alkin_6:{emoji:"🔗", de:"Aha: Das ≡C–H-Wasserstoffatom am Kettenende ist – ungewöhnlich für Kohlenwasserstoffe – schwach sauer und abspaltbar. Mit starken Basen entsteht ein „Acetylid“, mit dem man Kohlenstoffketten gezielt verlängern kann. Grund auf Teilchenebene: das sp-Hybridorbital hält die Bindungselektronen dicht am C und lockert so das H.", en:"Aha: the terminal ≡C–H is – unusually for a hydrocarbon – weakly acidic and removable. With strong bases it forms an 'acetylide' that lets chemists deliberately lengthen carbon chains. Particle level: the sp-hybrid orbital holds the bonding electrons close to carbon, loosening the H."},
  alkin_4_2:{emoji:"⚗️", de:"But-2-in trägt die Dreifachbindung mittig – ein symmetrisches inneres Alkin ohne saures ≡C–H, daher reaktionsträger als die endständigen.", en:"But-2-yne has its triple bond in the middle – a symmetric internal alkyne with no acidic ≡C–H, hence less reactive than terminal ones."},

  // ---- Alkanale ----
  alkanal_1:{emoji:"🧬", de:"Formaldehyd konserviert Präparate und steckt in Klebharzen. Das stark positiv polarisierte Carbonyl-C reagiert mit Eiweißen und vernetzt sie (Härtung/Fixierung).", en:"Formaldehyde preserves specimens and is in adhesive resins. Its strongly positive carbonyl C reacts with proteins and cross-links them (curing/fixing)."},
  alkanal_2:{emoji:"🍷", de:"Acetaldehyd entsteht beim Alkoholabbau und verursacht den Kater. Das reaktive Carbonyl-C reizt die Zellen, bis Enzyme es weiter abbauen.", en:"Acetaldehyde forms when alcohol is broken down and causes hangovers. Its reactive carbonyl C irritates cells until enzymes break it down further."},
  alkanal_3:{emoji:"👃", de:"Stechend riechende Flüssigkeit, Zwischenprodukt für Kunststoffe. Die polare C=O-Gruppe macht es flüssig, obwohl die Kette kurz ist.", en:"A pungent liquid, an intermediate for plastics. The polar C=O group keeps it liquid despite the short chain."},
  alkanal_4:{emoji:"🌰", de:"Baustein für Lacke und Aromen. Das Carbonyl-C ist der reaktive „Angriffspunkt“, an dem viele Synthesen ansetzen.", en:"A building block for coatings and flavours. The carbonyl C is the reactive 'attack point' for many syntheses."},
  alkanal_5:{emoji:"🌸", de:"In Duft- und Aromastoffen. Die polare Carbonylgruppe macht den Geruch flüchtig und durchdringend.", en:"In fragrances and flavourings. The polar carbonyl group makes the scent volatile and penetrating."},
  alkanal_6:{emoji:"🌿", de:"Riecht nach frisch geschnittenem Gras. Pflanzen bilden Hexanal, wenn Zellwände verletzt werden – ein typischer „Gründuft“.", en:"Smells of freshly cut grass. Plants form hexanal when cell walls are injured – a typical 'green' scent."},

  // ---- Alkanone ----
  alkanon_3:{emoji:"💅", de:"Aceton im Nagellackentferner, ein starkes Lösungsmittel. Die polare C=O-Gruppe UND der unpolare Rest lösen sowohl Wasser- als auch fettartige Stoffe.", en:"Acetone in nail-polish remover, a strong solvent. Its polar C=O group AND non-polar part dissolve both water-like and fat-like substances."},
  alkanon_4:{emoji:"🪣", de:"Butanon (MEK) löst Lacke und Kleber. Wie Aceton ein vielseitiges Lösungsmittel dank polarer Carbonylgruppe plus unpolarem Rest.", en:"Butanone (MEK) dissolves paints and glues. Like acetone, a versatile solvent thanks to a polar carbonyl group plus a non-polar part."},
  alkanon_5_2:{emoji:"⚗️", de:"Fruchtig riechendes Lösungsmittel und Aromastoff. Die Carbonylgruppe sitzt nahe dem Kettenende (unsymmetrisch).", en:"A fruity-smelling solvent and flavour. The carbonyl group sits near the chain end (asymmetric)."},
  alkanon_5_3:{emoji:"⚗️", de:"Symmetrisches Keton: die Carbonylgruppe liegt genau in der Mitte – daher links und rechts gleich lange Ethyl-Reste.", en:"A symmetric ketone: the carbonyl group lies exactly in the middle – so equal ethyl groups left and right."},

  // ---- Alkansäuren ----
  alkansaeure_1:{emoji:"🐜", de:"Ameisensäure ist das Wehrsekret von Ameisen und Brennnesseln. Die kleine, sehr polare Säure dringt leicht in die Haut und reizt durch ihre H⁺-Ionen.", en:"Formic acid is the defence secretion of ants and nettles. The small, very polar acid penetrates skin easily and irritates via its H⁺ ions."},
  alkansaeure_2:{emoji:"🍶", de:"Essigsäure gibt Essig den sauren Geschmack und konserviert. Die abgegebenen H⁺-Ionen senken den pH so weit, dass Mikroben nicht überleben.", en:"Acetic acid gives vinegar its sour taste and preserves food. The released H⁺ ions lower the pH so far that microbes cannot survive."},
  alkansaeure_3:{emoji:"🧀", de:"Propansäure (Propionat) hemmt Schimmel in Brot und Käse. Die Säuregruppe stört den Stoffwechsel der Pilzzellen.", en:"Propanoic acid (propionate) inhibits mould in bread and cheese. Its acid group disrupts the metabolism of fungal cells."},
  alkansaeure_4:{emoji:"🧈", de:"Butansäure verleiht ranziger Butter den Geruch. Sie wird frei, wenn Van-der-Waals-gebundene Fettmoleküle zerfallen – die kurze Säure ist flüchtig und stinkt.", en:"Butanoic acid gives rancid butter its smell. It is freed when fat molecules break down; the short acid is volatile and reeks."},
  alkansaeure_5:{emoji:"👃", de:"Pentansäure (Valeriansäure) riecht unangenehm, steckt in Baldrian. Kurze Kette = flüchtig, polare Säuregruppe = durchdringender Geruch.", en:"Pentanoic acid (valeric acid) smells unpleasant, occurs in valerian. Short chain = volatile, polar acid group = penetrating odour."},
  alkansaeure_6:{emoji:"🐐", de:"Hexansäure (Capronsäure) prägt den Geruch von Ziegenkäse. Die mittellange Kette ist gerade noch flüchtig genug, um in die Nase zu steigen.", en:"Hexanoic acid (caproic acid) shapes the smell of goat cheese. Its medium chain is just volatile enough to reach the nose."},

  // ---- Alkanole ----
  alkanol_1_1:{emoji:"⚠️", de:"Methanol ist wichtiger Industriealkohol, aber giftig. Enzyme bauen ihn zu Formaldehyd/Ameisensäure ab, die den Sehnerv schädigen.", en:"Methanol is an important industrial alcohol but toxic. Enzymes turn it into formaldehyde/formic acid, which damage the optic nerve."},
  alkanol_2_1:{emoji:"🍺", de:"Ethanol – Alkohol in Getränken, Desinfektionsmittel, Biokraftstoff. Die OH-Gruppe bildet Wasserstoffbrücken, daher mit Wasser in jedem Verhältnis mischbar.", en:"Ethanol – the alcohol in drinks, a disinfectant, a biofuel. Its OH group forms hydrogen bonds, so it mixes with water in any ratio."},
  alkanol_3_1:{emoji:"🧴", de:"Lösungs- und Desinfektionsmittel. Die OH-Gruppe (wasserliebend) und die C-Kette (fettliebend) lösen beides – Schmutz wie Keime.", en:"A solvent and disinfectant. Its OH group (water-loving) and C chain (fat-loving) dissolve both – grime and germs."},
  alkanol_3_2:{emoji:"🧽", de:"Isopropanol reinigt Elektronik und desinfiziert Haut. Es verdunstet schnell (schwächere Wasserstoffbrücken als Wasser) und lässt keine Rückstände.", en:"Isopropanol cleans electronics and disinfects skin. It evaporates quickly (weaker hydrogen bonds than water) and leaves no residue."},
  alkanol_4_1:{emoji:"🎨", de:"Lösungsmittel für Lacke. Mit der längeren Kette nimmt die Wasserlöslichkeit ab – der unpolare Teil überwiegt zunehmend.", en:"A solvent for coatings. With the longer chain water-solubility drops – the non-polar part increasingly dominates."},
  alkanol_4_2:{emoji:"🧪", de:"Lösungsmittel und Zwischenprodukt. Sekundäre OH-Gruppe (am inneren C) – etwas reaktionsträger als primäre Alkohole.", en:"A solvent and intermediate. A secondary OH group (on an inner C) – slightly less reactive than primary alcohols."},
  alkanol_5_1:{emoji:"🍌", de:"Bildet mit Säuren fruchtig riechende Ester. Die lange Kette macht es kaum noch wasserlöslich, aber gut fettlöslich.", en:"Forms fruity esters with acids. The long chain makes it barely water-soluble but readily fat-soluble."},
  alkanol_5_3:{emoji:"⚗️", de:"Sekundärer Alkohol und Lösungsmittel; OH genau in Kettenmitte (symmetrisch).", en:"A secondary alcohol and solvent; OH exactly in the middle of the chain (symmetric)."},
  alkanol_6_1:{emoji:"🌹", de:"Riecht blumig, in Parfüms. Die lange unpolare Kette dominiert nun klar über die OH-Gruppe – kaum noch wasserlöslich.", en:"Smells floral, used in perfumes. The long non-polar chain now clearly dominates over the OH group – barely water-soluble."},

  // ---- Ester ----
  ester_1_1:{emoji:"🍏", de:"Methylformiat riecht fruchtig, dient als Lösungs-/Treibmittel. Ester haben keine freie OH-Gruppe → kaum Wasserstoffbrücken → flüchtig und angenehm duftend.", en:"Methyl formate smells fruity, used as solvent/blowing agent. Esters have no free OH → barely any hydrogen bonds → volatile and pleasantly scented."},
  ester_1_2:{emoji:"🍑", de:"Ethylformiat hat ein rum-/pfirsichartiges Aroma. Wie alle Ester ohne H-Brücken-Donor – daher flüchtig und intensiv riechend.", en:"Ethyl formate has a rum/peach aroma. Like all esters it lacks a hydrogen-bond donor – hence volatile and intensely scented."},
  ester_2_1:{emoji:"🍎", de:"Methylacetat – süßlich riechendes Lösungsmittel (z. B. in Klebstoffen). Die polare Estergruppe löst viele Kunststoffe an.", en:"Methyl acetate – a sweet-smelling solvent (e.g. in glues). Its polar ester group softens many plastics."},
  ester_2_2:{emoji:"💅", de:"Ethylacetat riecht fruchtig, häufiges Lösungsmittel (Nagellackentferner). Ohne OH-Gruppe sehr flüchtig, daher rascher Geruch und schnelles Trocknen.", en:"Ethyl acetate smells fruity, a common solvent (nail-polish remover). Without an OH group it is very volatile – quick scent and fast drying."},
  ester_3_1:{emoji:"🍓", de:"Methylpropanoat hat ein fruchtiges Aroma (Aromastoff). Typisch für Ester: angenehmer Duft, weil keine stinkende freie Säuregruppe mehr vorliegt.", en:"Methyl propanoate has a fruity aroma (flavouring). Typical of esters: a pleasant scent, as no smelly free acid group remains."},

  // ---- Metalle ----
  li_metal:{emoji:"🔋", de:"Leichtestes Metall – Herz moderner Akkus. Das eine locker gebundene Außenelektron gibt Lithium leicht ab und wandert als Ion durch die Batterie.", en:"The lightest metal – the heart of modern batteries. Its single loosely bound outer electron is given up easily and the ion shuttles through the battery."},

function renderTaskCard(showPlayer) {
  const s = STATE.currentSubst;
  if (!s) return "";
  const cm = CLASS_META[s.sub || s.klass];
  const cmLabel = cm ? (LANG === "de" ? cm.de : cm.en) : "";
  const cmEmoji = cm ? cm.emoji : "";

  // Spinning-Wheel-Phase (Punkt 0c): zeigt das Drehrad statt der Aufgaben
  if (STATE.spinning) {
    return `<div class="task-card">
      <div class="task-info">
        <div class="task-class-label">${cmEmoji} ${cmLabel}</div>
        ${showPlayer && STATE.currentPlayer ? `<div class="task-player">🎓 ${escapeXml(STATE.currentPlayer)}</div>` : ""}
      </div>
      <div class="spin-wheel">
        <div class="spin-label">${T("spinning")}</div>
        <div class="spin-name">${escapeXml(STATE.spinName || "…")}</div>
      </div>
    </div>`;
  }

  // Im Klassenmodus: Substanzname direkt als Überschrift (nicht aufdecken müssen).
  // Primärname in der gewählten Sprache, der andere Name als Untertitel.
  const classMode = (STATE.mode === "class");
  const primaryName = substanceName(s, LANG);
  const otherName = (LANG === "de") ? s.en : s.name;
  const nameHeader = classMode
    ? `<div class="subst-headline">
         <div class="subst-name-de">${escapeXml(primaryName)}</div>
         ${otherName && otherName !== primaryName ? `<div class="subst-name-en">${escapeXml(otherName)}</div>` : ""}
       </div>`
    : "";

  let h = `<div class="task-card">
    <div class="task-info">
      <div class="task-class-label">${cmEmoji} ${cmLabel}</div>
      ${showPlayer && STATE.currentPlayer ? `<div class="task-player">🎓 ${escapeXml(STATE.currentPlayer)}</div>` : ""}
    </div>
    ${nameHeader}
    <div class="task-prompt">⚡ ${T("yourTask")}</div>
    <div class="task-tiles">`;

  // Im Klassenmodus die "name"-Kachel weglassen (Name steht schon oben)
  let tiles = taskTypesFor(s);
  if (classMode) tiles = tiles.filter(t => t.id !== "name");
  for (const tt of tiles) {
    const revealed = STATE.revealedTiles.has(tt.id);
    let content = "";
    if (revealed) {
      if (tt.id === "name") {
        const pName = substanceName(s, LANG);
        const oName = (LANG === "de") ? s.en : s.name;
        content = `<div class="tile-content">
          <div class="name-de">${escapeXml(pName)}</div>
          ${oName && oName !== pName ? `<div class="name-en">${escapeXml(oName)}</div>` : ""}
        </div>`;
      } else if (tt.id === "formula") {
        content = `<div class="tile-content"><div class="formula">${formulaDisplay(s)}</div></div>`;
      } else if (tt.id === "structural") {
        const svg = svgInTile(s, "structural");
        content = svg ? `<div class="tile-content">${svg}</div>`
                      : `<div class="tile-content"><div style="color:#888;font-size:0.78rem">${T("notAvailable")}</div></div>`;
      } else if (tt.id === "skeletal") {
        const svg = svgInTile(s, "skeletal");
        content = svg ? `<div class="tile-content">${svg}</div>`
                      : `<div class="tile-content"><div style="color:#888;font-size:0.78rem">${T("skeletalNotAvail")}</div></div>`;
      } else if (tt.id === "econfig") {
        content = `<div class="tile-content">${econfigHtml(s)}</div>`;
      }
    } else {
      content = `<div class="tile-emoji">${tt.emoji}</div>
        <div class="tile-label">${T(tt.labelKey)}</div>
        <div class="tile-hint">${T("clickToReveal")}</div>`;
    }
    h += `<div class="task-tile ${revealed?"revealed":""}" data-action="reveal-tile" data-tile="${tt.id}">${content}</div>`;
  }

  h += `</div>`;

  // Kontext-Info (aufdeckbar) — alltags-/technikrelevantes Wissen, mit Emoji.
  // Erscheint in Klassen- und Übungsmodus, sofern Daten vorhanden sind.
  const ci = CONTEXT_INFO[s.key];
  if (ci) {
    const ciText = (LANG === "de") ? ci.de : ci.en;
    if (STATE.contextRevealed) {
      h += `<div class="context-box revealed" data-action="reveal-context">
        <div class="context-title">${ci.emoji} ${T("contextTitle")}</div>
        <div class="context-text">${escapeXml(ciText)}</div>
      </div>`;
    } else {
      h += `<div class="context-box" data-action="reveal-context">
        <div class="context-title">${ci.emoji} ${T("contextTitle")}</div>
        <div class="context-hint">${T("contextHint")}</div>
      </div>`;
    }
  }

  // Self-assessment (alle Kacheln aufgedeckt + noch nicht gescored)
  const allRevealed = tiles.every(t => STATE.revealedTiles.has(t.id));
  if (allRevealed && !STATE.scored) {
    h += `<div class="score-area">
      <div class="score-prompt">${T("selfAssessTitle")}</div>
      <div class="score-btns">
        <button class="score-btn" data-action="score" data-score="2">
          <span class="score-btn-emoji">✅</span>${T("score2")} (2P)
        </button>
        <button class="score-btn" data-action="score" data-score="1">
          <span class="score-btn-emoji">⚠️</span>${T("score1")} (1P)
        </button>
        <button class="score-btn" data-action="score" data-score="0">
          <span class="score-btn-emoji">❌</span>${T("score0")} (0P)
        </button>
      </div>
    </div>`;
  } else if (allRevealed && STATE.scored) {
    // Show next button after scoring
    const scoreLine = STATE.scoreSelected === 2 ? "✅ +2" : STATE.scoreSelected === 1 ? "⚠️ +1" : "❌ +0";
    if (poolExhausted()) {
      const doneMsg = LANG === "de" ? "🎉 Alle Substanzen dieser Auswahl geübt!" : "🎉 All substances of this selection practised!";
      h += `<div class="score-area">
        <div class="score-prompt">${scoreLine} · ${doneMsg}</div>
        <div class="score-btns">
          <button class="btn" data-action="finish-round">🏁 ${T("backToSetup")}</button>
        </div>
      </div>`;
    } else {
      const nextLabel = STATE.mode === "class" && STATE.playerNames.length > 1 ? T("nextStudent") : T("nextTask");
      h += `<div class="score-area">
        <div class="score-prompt">${scoreLine}</div>
        <div class="score-btns">
          <button class="btn" data-action="next-task">🎲 ${nextLabel}</button>
        </div>
      </div>`;
    }
  }

  h += `</div>`;
  return h;
}

/* === EXPORT MODE === */
function renderExportMode() {
  const list = STATE.exportClass ? substancesByClass(STATE.exportClass) : [];
  const subst = STATE.exportSubst;
  let preview = "";
  let canDownload = false;
  if (subst) {
    const svg = renderForExport(subst, STATE.exportRep, STATE.exportLang);
    if (svg) {
      preview = svg;
      canDownload = true;
    } else {
      preview = `<div style="color:#888;text-align:center">${STATE.exportRep === "skeletal" ? T("skeletalNotAvail") : T("notAvailable")}</div>`;
    }
  } else {
    preview = `<div style="color:#888;text-align:center;font-style:italic">${LANG==="de"?"← Stoffklasse und Substanz wählen":"← Choose class and substance"}</div>`;
  }

  let h = `<div class="export-section">`;

  // Klassen-Wahl
  h += `<section>
    <div class="section-title">📚 ${LANG==="de"?"Stoffklasse":"Compound class"}</div>
    <div class="panel">
      <div class="class-grid">${CLASS_ORDER.map(cId => {
        const meta = CLASS_META[cId];
        const cnt = substancesByClass(cId).length;
        return `<button class="class-btn ${STATE.exportClass===cId?"active":""}" data-action="export-class" data-cid="${cId}">
          <span class="emoji">${meta.emoji}</span>
          <span>${LANG==="de"?meta.de:meta.en}</span>
          <span class="count">${cnt}</span>
        </button>`;
      }).join("")}</div>
    </div>
  </section>`;

  // Substanz-Wahl
  if (STATE.exportClass) {
    h += `<section>
      <div class="section-title">⚗️ ${T("exportSubstance")} <span style="color:var(--dim);font-weight:400;font-size:0.78rem;margin-left:0.4em">(${list.length})</span></div>
      <div class="panel">
        <div class="substance-list">
          ${list.map(s => `<div class="substance-item ${subst===s?"active":""}" data-action="export-subst" data-key="${s.key}">
            ${escapeXml(LANG==="en" && s.en ? s.en : s.name)}
            <span class="formula">${formulaPlain(s)}</span>
          </div>`).join("")}
        </div>
      </div>
    </section>`;
  }

  // Darstellung & Sprache & Vorschau
  if (subst) {
    // Skelett-Option nur anbieten, wenn die Substanz eine Skelettformel hat
    const hasSkel = taskTypesFor(subst).some(t => t.id === "skeletal");
    if (!hasSkel && STATE.exportRep === "skeletal") STATE.exportRep = "structural";
    h += `<section>
      <div class="section-title">🎨 ${T("exportRepresentation")} & ${T("exportLang")}</div>
      <div class="panel">
        <div class="export-controls">
          <div>
            <div style="font-size:0.78rem;color:var(--dim);margin-bottom:0.4rem">${T("exportRepresentation")}</div>
            <div class="export-radio-group">
              <button class="export-radio ${STATE.exportRep==="structural"?"active":""}" data-action="export-rep" data-rep="structural">${T("repLewis")}</button>
              ${hasSkel ? `<button class="export-radio ${STATE.exportRep==="skeletal"?"active":""}" data-action="export-rep" data-rep="skeletal">${T("repSkeletal")}</button>` : ""}
            </div>
          </div>
          <div>
            <div style="font-size:0.78rem;color:var(--dim);margin-bottom:0.4rem">${T("exportLang")}</div>
            <div class="export-radio-group">
              <button class="export-radio ${STATE.exportLang==="de"?"active":""}" data-action="export-lang" data-lang="de">Deutsch 🇩🇪</button>
              <button class="export-radio ${STATE.exportLang==="en"?"active":""}" data-action="export-lang" data-lang="en">English 🇬🇧</button>
            </div>
          </div>
        </div>
        <div class="export-preview">${preview}</div>
        <div class="btn-row" style="justify-content:center;gap:0.5rem;flex-wrap:wrap">
          <button class="btn" data-action="export-download" ${canDownload?"":"disabled"}>📥 SVG</button>
          <button class="btn small ghost" data-action="export-png" data-size="800"  ${canDownload?"":"disabled"}>🖼️ PNG ${LANG==="de"?"klein":"small"}</button>
          <button class="btn small ghost" data-action="export-png" data-size="1600" ${canDownload?"":"disabled"}>🖼️ PNG ${LANG==="de"?"mittel":"medium"}</button>
          <button class="btn small ghost" data-action="export-png" data-size="3200" ${canDownload?"":"disabled"}>🖼️ PNG ${LANG==="de"?"groß":"large"}</button>
        </div>
      </div>
    </section>`;
  }

  h += `</div>`;
  return h;
}

/* =====================================================
   EVENT HANDLING
   ===================================================== */
function attachEvents() {
  document.querySelectorAll("[data-action]").forEach(el => {
    el.addEventListener("click", handleAction);
  });
  const csvFile = document.getElementById("csv-file");
  if (csvFile) {
    csvFile.addEventListener("change", handleCSV);
  }
}

function handleAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;
  switch (action) {
    case "lang-de": LANG = "de"; renderApp(); break;
    case "lang-en": LANG = "en"; renderApp(); break;
    case "set-mode-class":
      STATE.mode = "class";
      STATE.year = null;
      STATE.activeClasses = [];
      STATE.currentSubst = null;
      renderApp();
      break;
    case "set-mode-practice":
      STATE.mode = "practice";
      STATE.activeClasses = [];
      STATE.currentSubst = null;
      renderApp();
      break;
    case "set-mode-export":
      STATE.mode = "export";
      STATE.exportClass = null;
      STATE.exportSubst = null;
      renderApp();
      break;
    case "reset-mode":
      STATE = {
        ...STATE,
        mode: null,
        currentSubst: null,
        currentPlayer: null,
        revealedTiles: new Set(),
        contextRevealed: false,
        scored: false
      };
      renderApp();
      break;
    case "csv-trigger":
      document.getElementById("csv-file").click();
      break;
    case "save-names": {
      const txt = document.getElementById("names-input").value;
      const lines = txt.split(/\r?\n|,|;/).map(s => s.trim()).filter(Boolean);
      if (lines.length === 0) return;
      STATE.playerNames = lines;
      STATE.usedPlayerNames = [];
      renderApp();
      break;
    }
    case "clear-names":
      STATE.playerNames = [];
      STATE.usedPlayerNames = [];
      STATE.currentPlayer = null;
      STATE.currentSubst = null;
      renderApp();
      break;
    case "set-year": {
      const y = parseInt(el.dataset.year);
      STATE.year = y;
      // KEINE automatische Klassen-Vorwahl mehr — Klassen bleiben frei wählbar
      renderApp();
      break;
    }
    case "reset-year":
      STATE.year = null;
      STATE.activeClasses = [];
      STATE.currentSubst = null;
      renderApp();
      break;
    case "toggle-class": {
      const c = el.dataset.cid;
      const i = STATE.activeClasses.indexOf(c);
      if (i >= 0) STATE.activeClasses.splice(i, 1);
      else STATE.activeClasses.push(c);
      renderApp();
      break;
    }
    case "classes-all":
      STATE.activeClasses = [...CLASS_ORDER];
      renderApp();
      break;
    case "classes-none":
      STATE.activeClasses = [];
      renderApp();
      break;
    case "start-training":
      newTask();
      break;
    case "back-to-setup":      // Punkt 0a: zurück zur Setup-Ansicht (mit Reset → frische Randomisierung)
      STATE.trainingPage = false;
      STATE.currentSubst = null;
      STATE.revealedTiles = new Set();
      STATE.contextRevealed = false;
      STATE.scored = false;
      STATE.scoreSelected = null;
      STATE.spinning = false;
      renderApp();
      break;
    case "finish-round":       // alle Substanzen geübt → zurück ins Stoffklassenmenü
      finishRound();
      break;
    case "resume-task":        // zurück zur laufenden Aufgabe
      STATE.trainingPage = true;
      renderApp();
      break;
    case "reveal-tile": {
      const t = el.dataset.tile;
      STATE.revealedTiles.add(t);
      renderApp();
      break;
    }
    case "reveal-context": {
      STATE.contextRevealed = true;
      renderApp();
      break;
    }
    case "score": {
      const s = parseInt(el.dataset.score);
      STATE.scoreSelected = s;
      STATE.scored = true;
      STATE.points += s;
      STATE.totalTasks += 1;
      if (s === 2) {
        STATE.streak += 1;
        if (STATE.streak > STATE.bestStreak) STATE.bestStreak = STATE.streak;
      } else {
        STATE.streak = 0;
      }
      renderApp();
      // Confetti for 2-point answers
      if (s === 2) spawnConfetti();
      // Punkt: alle Substanzen der Auswahl geübt → automatisch zurück ins Menü
      if (poolExhausted()) setTimeout(finishRound, 2800);
      break;
    }
    case "next-task":
      newTask();
      break;
    case "export-class":
      STATE.exportClass = el.dataset.cid;
      STATE.exportSubst = null;
      renderApp();
      break;
    case "export-subst": {
      const key = el.dataset.key;
      STATE.exportSubst = SUBSTANCES.find(s => s.key === key);
      renderApp();
      break;
    }
    case "export-rep":
      STATE.exportRep = el.dataset.rep;
      renderApp();
      break;
    case "export-lang":
      STATE.exportLang = el.dataset.lang;
      renderApp();
      break;
    case "export-download":
      doExport();
      break;
    case "export-png":
      doExportPNG(parseInt(el.dataset.size));
      break;
  }
}

function handleCSV(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    const lines = ev.target.result.split(/\r?\n/)
      .map(l => l.split(/[,;\t]/)[0].trim())
      .filter(Boolean);
    STATE.playerNames = lines;
    STATE.usedPlayerNames = [];
    renderApp();
  };
  r.readAsText(file);
}

/* Alle Substanzen der aktuellen Auswahl bereits gezogen? */
function poolExhausted() {
  const subs = availableSubstances();
  return subs.length > 0 && subs.every(s => STATE.usedSubstances.includes(s.key));
}
/* Runde sauber beenden: Memory + aktuelle Aufgabe zurücksetzen,
   damit beim nächsten Start frisch randomisiert wird. */
function finishRound() {
  STATE.usedSubstances = [];
  STATE.currentSubst = null;
  STATE.revealedTiles = new Set();
  STATE.contextRevealed = false;
  STATE.scored = false;
  STATE.scoreSelected = null;
  STATE.spinning = false;
  STATE.trainingPage = false;
  renderApp();
}

function newTask() {
  // Pick player
  if (STATE.mode === "class" && STATE.playerNames.length > 0) {
    let avail = STATE.playerNames.filter(n => !STATE.usedPlayerNames.includes(n));
    if (avail.length === 0) {
      STATE.usedPlayerNames = [];
      avail = [...STATE.playerNames];
    }
    const p = pick(avail);
    STATE.currentPlayer = p;
    STATE.usedPlayerNames.push(p);
  }
  // Pick substance — mit Memory (keine Wiederholung bis Pool erschöpft)
  const subs = availableSubstances();
  if (subs.length === 0) {
    alert(LANG === "de" ? "Keine Substanzen ausgewählt!" : "No substances selected!");
    return;
  }
  let pool = subs.filter(s => !STATE.usedSubstances.includes(s.key));
  if (pool.length === 0) {            // Pool erschöpft → Memory zurücksetzen
    STATE.usedSubstances = [];
    pool = [...subs];
  }
  const chosen = pick(pool);
  STATE.currentSubst = chosen;
  STATE.usedSubstances.push(chosen.key);
  STATE.revealedTiles = new Set();
  STATE.contextRevealed = false;
  STATE.scored = false;
  STATE.scoreSelected = null;
  STATE.trainingPage = true;          // auf die Aufgaben-Seite wechseln (Punkt 0a)

  // Klassenmodus: Spinning-Wheel-Animation, dann Name direkt sichtbar (Punkt 0c)
  if (STATE.mode === "class" || STATE.mode === "practice") {
    startSpin(subs, chosen);
  } else {
    STATE.spinning = false;
    renderApp();
  }
}

/* Spinning-Wheel-Animation: zykliert Substanznamen, landet auf 'chosen'. */
function startSpin(pool, chosen) {
  STATE.spinning = true;
  STATE.spinName = "";
  renderApp();
  const names = pool.map(s => substanceName(s, LANG));
  const finalName = substanceName(chosen, LANG);
  let ticks = 0;
  const totalTicks = 18 + Math.floor(Math.random()*6);  // wie viele Wechsel
  function step() {
    if (ticks >= totalTicks) {
      STATE.spinName = finalName;
      STATE.spinning = false;
      renderApp();
      return;
    }
    STATE.spinName = names[Math.floor(Math.random()*names.length)];
    renderApp();
    ticks++;
    // Verlangsamung gegen Ende (ease-out)
    const delay = 40 + Math.pow(ticks/totalTicks, 3) * 260;
    setTimeout(step, delay);
  }
  setTimeout(step, 60);
}

function doExport() {
  const s = STATE.exportSubst;
  if (!s) return;
  const svg = renderForExport(s, STATE.exportRep, STATE.exportLang);
  if (!svg) return;
  const baseName = (STATE.exportLang === "en" && s.en) ? s.en : s.name;
  const fname = slugify(baseName) + "-" + STATE.exportRep + ".svg";
  downloadSVG(svg, fname);
}

/* PNG-Rasterexport (offline, ohne Bibliothek) in wählbarer Pixelbreite. */
function downloadPNG(svgString, filename, targetW) {
  const vb = svgString.match(/viewBox="0 0 ([\d.]+) ([\d.]+)"/);
  const W = vb ? parseFloat(vb[1]) : 1000;
  const H = vb ? parseFloat(vb[2]) : 1000;
  const scale = targetW / W;
  const cw = Math.round(W*scale), ch = Math.round(H*scale);
  const img = new Image();
  img.onload = function() {
    const canvas = document.createElement("canvas");
    canvas.width = cw; canvas.height = ch;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, cw, ch);
    ctx.drawImage(img, 0, 0, cw, ch);
    const finish = (url, revoke) => {
      const a = document.createElement("a");
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      setTimeout(() => { document.body.removeChild(a); if (revoke) URL.revokeObjectURL(url); }, 100);
    };
    if (canvas.toBlob) {
      canvas.toBlob(b => { if (b) finish(URL.createObjectURL(b), true); else finish(canvas.toDataURL("image/png"), false); }, "image/png");
    } else {
      finish(canvas.toDataURL("image/png"), false);
    }
  };
  img.onerror = function() { alert(LANG === "de" ? "PNG-Export fehlgeschlagen." : "PNG export failed."); };
  img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgString);
}
function doExportPNG(targetW) {
  const s = STATE.exportSubst;
  if (!s) return;
  const svg = renderForExport(s, STATE.exportRep, STATE.exportLang);
  if (!svg) return;
  const baseName = (STATE.exportLang === "en" && s.en) ? s.en : s.name;
  downloadPNG(svg, slugify(baseName) + "-" + STATE.exportRep + "-" + targetW + "px.png", targetW);
}

/* === CONFETTI === */
function spawnConfetti() {
  const c = document.createElement("div");
  c.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden";
  document.body.appendChild(c);
  const cols = ["#7c6af7","#e96dbd","#5dd8c8","#ffd700","#00c853","#4fc3f7","#f55a5a"];
  for (let i=0;i<50;i++) {
    const s = document.createElement("span");
    const sz = (5+Math.random()*9)+"px";
    s.style.cssText = `position:absolute;left:${Math.random()*100}%;top:-10vh;
      width:${sz};height:${sz};border-radius:${Math.random()>0.5?"50%":"2px"};
      background:${pick(cols)};
      animation:cfall ${1.4+Math.random()*1.8}s ${Math.random()*0.4}s linear forwards;
      opacity:1;`;
    c.appendChild(s);
  }
  // CSS-Animation inline
  if (!document.getElementById("confetti-style")) {
    const st = document.createElement("style");
    st.id = "confetti-style";
    st.textContent = "@keyframes cfall { to { transform: translateY(110vh) rotate(720deg); opacity:0; } }";
    document.head.appendChild(st);
  }
  setTimeout(() => c.remove(), 3500);
}

/* =====================================================
   INIT
   ===================================================== */
renderApp();
</script>
