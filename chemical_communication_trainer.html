<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚗️ Chemical Communication Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0f1a;--card:#151828;--card2:#1a1e32;
  --accent:#7c6af7;--accent2:#e96dbd;--accent3:#5dd8c8;
  --green:#00c853;--gold:#ffd700;--pink:#ff6b9d;--blue:#4fc3f7;--purple:#b388ff;
  --red:#f55a5a;--text:#e8eaf6;--dim:#8890b8;--radius:16px;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:70px}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 15% 20%,rgba(124,106,247,.1) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 85% 80%,rgba(233,109,189,.08) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 50% 50%,rgba(93,216,200,.05) 0%,transparent 70%)}
.app{max-width:820px;margin:0 auto;padding:10px 14px;position:relative;z-index:1}

/* TOP BAR */
.top-bar{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.top-bar-left{flex:1;min-width:0}
h1{font-family:'Fredoka',sans-serif;font-size:1.6rem;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
h1 small{display:block;font-size:.62rem;color:var(--dim);-webkit-text-fill-color:var(--dim);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.top-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.top-right-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end}

/* LANG TOGGLE */
.lang-toggle{display:flex;border-radius:9px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.lang-btn{padding:5px 11px;border:none;cursor:pointer;font-family:'Fredoka',sans-serif;font-size:.78rem;font-weight:600;background:transparent;color:var(--dim);transition:all .2s}
.lang-btn.active{background:var(--accent);color:#fff}

/* CSV */
.csv-btn-small{padding:5px 11px;border-radius:8px;border:1px dashed var(--blue);background:rgba(79,195,247,.07);color:var(--blue);cursor:pointer;font-family:'Nunito',sans-serif;font-size:.74rem;font-weight:700;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.csv-btn-small:hover{background:rgba(79,195,247,.18);border-style:solid}
.csv-info-small{font-size:.68rem;color:var(--green)}
.csv-clear{font-size:.65rem;color:var(--red);cursor:pointer;text-decoration:underline;margin-left:4px}
.tracker{display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end;margin-top:2px}
.tracker-pill{font-size:.58rem;padding:2px 6px;border-radius:7px;background:rgba(255,255,255,.05);color:var(--dim);border:1px solid rgba(255,255,255,.06)}
.tracker-pill.used{opacity:.22;text-decoration:line-through}
.tracker-pill.current{background:rgba(124,106,247,.25);border-color:var(--accent);color:var(--gold);opacity:1;text-decoration:none}

/* HELP BTN */
.help-btn{padding:5px 12px;border-radius:8px;border:1px dashed var(--purple);background:rgba(179,136,255,.08);color:var(--purple);cursor:pointer;font-family:'Fredoka',sans-serif;font-size:.8rem;font-weight:600;transition:all .2s}
.help-btn:hover{background:rgba(179,136,255,.18);border-style:solid}

/* HELP MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(5px)}
.modal-box{background:var(--card2);border:1px solid rgba(124,106,247,.3);border-radius:var(--radius);max-width:720px;width:100%;max-height:88vh;overflow-y:auto;padding:22px;box-shadow:0 0 60px rgba(124,106,247,.2)}
.modal-title{font-family:'Fredoka',sans-serif;font-size:1.35rem;color:var(--gold);margin-bottom:3px}
.modal-sub{font-size:.78rem;color:var(--dim);margin-bottom:18px}
.modal-close{float:right;background:rgba(255,255,255,.07);border:none;color:var(--dim);cursor:pointer;border-radius:7px;padding:4px 11px;font-size:.82rem;font-family:'Nunito',sans-serif;font-weight:700}
.modal-close:hover{color:var(--text);background:rgba(255,255,255,.14)}
.help-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-top:10px}
.help-tile{background:var(--card);border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,.07)}
.help-tile-title{font-family:'Fredoka',sans-serif;font-size:.95rem;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.help-tile-sub{font-size:.7rem;color:var(--dim);margin-bottom:8px;line-height:1.5}
.help-formula-box{background:#fff;border-radius:8px;padding:10px;text-align:center;min-height:64px;display:flex;align-items:center;justify-content:center}

/* STATS */
.stats-bar{display:flex;justify-content:center;gap:8px;margin:7px 0;flex-wrap:wrap}
.stat{background:var(--card);padding:5px 11px;border-radius:30px;font-size:.76rem;display:flex;align-items:center;gap:4px;border:1px solid rgba(255,255,255,.07)}
.streak-fire{animation:pulse .6s infinite alternate}
@keyframes pulse{0%{transform:scale(1)}100%{transform:scale(1.25)}}

/* SECTION */
.section{margin:9px 0}
.section-title{font-family:'Fredoka',sans-serif;font-size:.96rem;color:var(--pink);margin-bottom:7px;display:flex;align-items:center;gap:6px}

/* SPINNER */
.spinner-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.spin-btn{padding:9px 20px;border-radius:12px;border:2px solid var(--accent);background:var(--card);color:var(--accent);cursor:pointer;font-family:'Fredoka',sans-serif;font-size:.9rem;font-weight:600;transition:all .25s;user-select:none;white-space:nowrap;flex-shrink:0;animation:glowPulse 1.5s ease-in-out infinite}
.spin-btn:hover{background:var(--accent);color:#fff;transform:scale(1.05);box-shadow:0 4px 18px rgba(124,106,247,.4)}
@keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(124,106,247,.2)}50%{box-shadow:0 0 20px rgba(124,106,247,.5)}}
.spin-btn.disabled{opacity:.3;pointer-events:none;animation:none}
.wheel-window{width:220px;height:48px;border-radius:11px;border:2px solid rgba(124,106,247,.28);background:var(--card);overflow:hidden;position:relative;flex-shrink:0}
.wheel-window::before,.wheel-window::after{content:'';position:absolute;left:0;right:0;height:12px;z-index:2;pointer-events:none}
.wheel-window::before{top:0;background:linear-gradient(to bottom,var(--card) 30%,transparent)}
.wheel-window::after{bottom:0;background:linear-gradient(to top,var(--card) 30%,transparent)}
.wheel-pointer{position:absolute;right:-2px;top:50%;transform:translateY(-50%);width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:12px solid var(--accent);z-index:3;filter:drop-shadow(-2px 0 4px rgba(124,106,247,.5))}
.wheel-track{position:absolute;left:0;right:0;top:0}
.wheel-item{height:48px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-size:.9rem;font-weight:600;color:var(--text);white-space:nowrap;padding:0 10px}

/* YEAR BUTTONS */
.year-btns{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.year-btn{padding:8px 18px;border-radius:10px;border:2px solid rgba(255,255,255,.1);background:var(--card);color:var(--dim);cursor:pointer;font-family:'Fredoka',sans-serif;font-size:.95rem;font-weight:600;transition:all .2s}
.year-btn:hover{border-color:var(--accent3);color:var(--accent3)}
.year-btn.selected{border-color:var(--accent3);background:rgba(93,216,200,.1);color:var(--accent3);box-shadow:0 0 10px rgba(93,216,200,.18)}

/* BADGES */
.done-badge{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:11px;background:linear-gradient(135deg,rgba(124,106,247,.15),rgba(233,109,189,.08));border:2px solid var(--accent);color:var(--gold);font-family:'Fredoka',sans-serif;font-size:.92rem;font-weight:600;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.year-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:9px;background:rgba(93,216,200,.1);border:1.5px solid rgba(93,216,200,.25);color:var(--accent3);font-family:'Fredoka',sans-serif;font-size:.88rem;font-weight:600}
.name-year-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.mini-link{font-size:.68rem;color:var(--dim);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:'Nunito',sans-serif}

/* CONTEXT FACTS */
.context-facts{background:linear-gradient(135deg,rgba(124,106,247,.06),rgba(93,216,200,.03));border:1px solid rgba(124,106,247,.14);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.context-facts-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:7px;font-family:'DM Mono',monospace}
.fact-list{display:flex;flex-direction:column;gap:5px}
.fact-item{font-size:.8rem;color:var(--text);line-height:1.5;display:flex;gap:6px}
.fact-emoji{flex-shrink:0;font-size:.9rem}

/* TASK CARD */
.task-card{border-radius:var(--radius);overflow:hidden;position:relative;background:linear-gradient(135deg,#080a12 0%,#0f1222 60%,#080b16 100%);border:2px solid rgba(124,106,247,.2);box-shadow:0 0 36px rgba(124,106,247,.08),inset 0 0 50px rgba(0,0,0,.35);margin:12px 0;padding:20px 18px}
.task-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(transparent,rgba(124,106,247,.05),transparent,rgba(233,109,189,.04),transparent);animation:rotateBg 14s linear infinite}
@keyframes rotateBg{to{transform:rotate(360deg)}}
.task-card>*{position:relative;z-index:1}
.task-class-badge{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;color:var(--dim);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:2px 9px}
.task-compound-name{font-family:'Fredoka',sans-serif;font-size:2rem;font-weight:700;color:#fff;margin-bottom:2px;line-height:1.15;text-shadow:0 0 26px rgba(124,106,247,.38)}
.task-names-row{font-size:.76rem;color:var(--dim);font-family:'DM Mono',monospace;margin-bottom:12px}

/* TASK TILES */
.task-tiles{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.task-tile{padding:11px 13px;border-radius:11px;border:2px solid rgba(255,255,255,.07);background:rgba(255,255,255,.025);cursor:pointer;transition:all .2s;text-align:center;font-family:'Nunito',sans-serif}
.task-tile:hover:not(.revealed){border-color:var(--accent);background:rgba(124,106,247,.07);color:var(--text)}
.task-tile.active{border-color:var(--gold);background:rgba(255,215,0,.07);color:var(--gold);box-shadow:0 0 13px rgba(255,215,0,.12)}
.task-tile.revealed{border-color:var(--green);background:rgba(0,200,83,.07);color:var(--green);cursor:default}
.tile-icon{font-size:1.25rem;margin-bottom:2px}
.tile-label{font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.tile-hint-text{font-size:.63rem;color:rgba(255,215,0,.55);margin-top:2px}
.tile-click-hint{font-size:.58rem;color:rgba(255,255,255,.16);margin-top:2px}
.svg-solution-area{margin-top:7px;padding:10px;border-radius:9px;background:#fff;text-align:center;animation:fadeUp .3s ease;min-height:54px;display:flex;align-items:center;justify-content:center;flex-direction:column}
@keyframes fadeUp{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.svg-solution-area img{max-width:100%;max-height:190px}
.svg-placeholder-msg{color:#777;font-size:.7rem;font-family:'DM Mono',monospace;line-height:1.6;padding:6px}
.svg-placeholder-msg code{background:#eee;border-radius:3px;padding:1px 4px;font-size:.67rem;color:#444}

/* ALL-DONE OVERLAY */
.celeb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:250;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.celeb-box{background:linear-gradient(135deg,#0f1a0f,#0d1020);border:2px solid var(--green);border-radius:20px;padding:32px 28px;max-width:420px;width:100%;text-align:center;box-shadow:0 0 60px rgba(0,200,83,.25),0 0 120px rgba(93,216,200,.1);animation:popIn .5s cubic-bezier(.175,.885,.32,1.275)}
.celeb-emoji{font-size:3rem;margin-bottom:8px;animation:bounce 0.6s ease infinite alternate}
@keyframes bounce{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-8px) scale(1.08)}}
.celeb-title{font-family:'Fredoka',sans-serif;font-size:1.7rem;color:var(--green);margin-bottom:6px;line-height:1.2}
.celeb-name{font-family:'Fredoka',sans-serif;font-size:1.1rem;color:var(--gold);margin-bottom:10px}
.celeb-msg{font-size:.88rem;color:var(--dim);line-height:1.6;margin-bottom:20px}
.celeb-btn{padding:13px 34px;border-radius:14px;border:none;font-family:'Fredoka',sans-serif;font-size:1.05rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--green),#00e676);color:#000;box-shadow:0 4px 18px rgba(0,200,83,.35);transition:all .2s}
.celeb-btn:hover{transform:scale(1.06);box-shadow:0 6px 26px rgba(0,200,83,.5)}

/* PROGRESS DOTS */
.progress-ring{display:flex;justify-content:center;margin:6px 0}
.step-dots{display:flex;gap:5px;align-items:center}
.step-dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.1);transition:all .3s}
.step-dot.active{background:var(--accent);transform:scale(1.3);box-shadow:0 0 8px var(--accent)}
.step-dot.done{background:var(--green)}

/* CONFETTI */
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
.confetti span{position:absolute;width:9px;height:9px;border-radius:50%;animation:cfall linear forwards;opacity:0}
@keyframes cfall{0%{opacity:1;transform:translateY(-10vh) rotate(0)}100%{opacity:0;transform:translateY(110vh) rotate(720deg)}}

/* FOOTER */
.footer{position:fixed;bottom:8px;left:14px;font-size:.65rem;color:rgba(255,255,255,.2);font-family:'Nunito',sans-serif;letter-spacing:.5px;z-index:10}

/* BUTTONS */
.btn-row{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin:11px 0}
.action-btn{padding:11px 26px;border-radius:12px;border:none;font-family:'Fredoka',sans-serif;font-size:.98rem;font-weight:600;cursor:pointer;transition:all .25s}
.btn-next{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px rgba(124,106,247,.28)}
.btn-next:hover{transform:scale(1.05);box-shadow:0 6px 22px rgba(124,106,247,.44)}

sub,sup{font-size:.62em}
@media(max-width:580px){h1{font-size:1.25rem}.task-compound-name{font-size:1.5rem}.wheel-window{width:165px}.task-tiles{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="footer">Poremski</div>
<input type="file" id="csv-file-input" accept=".csv,.txt" style="display:none" onchange="handleCSV(event)">
<script>
/* ═══════════════════════════════════

═══════════════════════════════════ */

      scoreLabel:'Punkte',totalLabel:'Gesamt',streakLabel:'Serie',bestLabel:'Beste',

      yearPrompt:'Jahr wählen:',spinBtn:'🎰 Spin!',factsTitle:'Wissenswertes',taskAsk:'Deine Aufgabe',

      allDoneTitle:'🎉 All 4 fields revealed!',allDoneSub:'Click for the next task.',
      celebTitles:['Excellent!','Fantastic!','Well done!','Chemistry pro!','Brilliant!'],
      celebMsgs:['You mastered all four representations! 🧪 Keep it up!','Perfect work – name, formula, skeletal and structural formula all known! 🔬','Chemistry is no mystery when you know your stuff! 💪 Next task?','You\'re getting better and better! All 4 fields revealed! ⚗️','Bravo! Every reaction starts with knowledge – and you have it! 🌟'],
      celebNextBtn:'🎲 New Task!',
      nextBtn:'🎲 Next Task',noSVG:'No SVG imported yet',noSVGHint:'Import a file named:',
      changeYear:'change',newClass:'new'}
};
let lang='de';
const t=k=>TR[lang][k]||k;
const tN=s=>lang==='en'?(s.en||s.de):s.de;

/* ═══════════════════════════════════
   SUBSTANCE LIBRARY
═══════════════════════════════════ */
function sub(n){if(n===1)return '';const m={'0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉'};return String(n).split('').map(c=>m[c]||c).join('');}

const ACIDS_BASES=[
  {de:'Salzsäure',en:'Hydrochloric acid',formula:'HCl',class:'acids_bases',svg:'HCl',
   facts:{de:['🧪 Starke einprotonige Säure – in Wasser vollständig dissoziiert zu H⁺ und Cl⁻','⚗️ Konzentriert hat sie einen pH unter 0 – eine der stärksten Laborsäuren','🔬 Das Magen produziert täglich ~2 Liter Salzsäure zur Verdauung','🏭 Wichtig in der Metallverarbeitung: löst Oxide von Metallen (Beizen)'],

  {de:'Schwefelsäure',en:'Sulfuric acid',formula:'H₂SO₄',class:'acids_bases',svg:'H2SO4',
   facts:{de:['⚡ Meistproduzierte Industriechemikalie der Welt: ~200 Mio. Tonnen/Jahr','🔋 Basis des Blei-Akkumulators – in fast jedem Verbrenner-Auto','☁️ Saurer Regen entsteht wenn SO₂ in der Atmosphäre zu H₂SO₄ reagiert','🌡️ Beim Verdünnen so viel Wärme frei, dass Wasser sieden kann – immer Säure ins Wasser!'],
         en:['⚡ Most produced industrial chemical worldwide: ~200 million tonnes/year','🔋 Basis of the lead-acid battery – in almost every combustion car','☁️ Acid rain forms when SO₂ in the atmosphere reacts to H₂SO₄','🌡️ Diluting releases so much heat water can boil – always add acid to water!']}},
  {de:'Salpetersäure',en:'Nitric acid',formula:'HNO₃',class:'acids_bases',svg:'HNO3',

  {de:'Wasserstoff',en:'Hydrogen',formula:'H₂',class:'elements',svg:'H2',facts:{de:['💨 Leichtestes und häufigstes Element im Universum (75% der Materie)','🚀 Flüssiger Wasserstoff treibt NASA-Raketen an (Schubkraft + reaktionsreichstes Treibstoff)','🔋 Brennstoffzellen erzeugen Strom aus H₂ + ½O₂ → H₂O – Null-Emission-Fahrzeuge','☀️ Im Sonnenkern verschmelzen 620 Mio. Tonnen Wasserstoff pro Sekunde zu Helium'],en:['💨 Lightest and most abundant element in the universe (75% of matter)','🚀 Liquid hydrogen powers NASA rockets (highest specific impulse of any propellant)','🔋 Fuel cells generate electricity from H₂ + ½O₂ → H₂O – zero-emission vehicles','☀️ In the sun\'s core 620 million tonnes of hydrogen fuse to helium every second']}},
  {de:'Sauerstoff',en:'Oxygen',formula:'O₂',class:'elements',svg:'O2',facts:{de:['🌬️ 21% der Luft – vor 2,4 Mrd. Jahren von Cyanobakterien in die Atmosphäre gepumpt','🔥 Ohne Sauerstoff keine Verbrennung – Brandlöschen durch O₂-Entzug (CO₂-Löscher)','🩺 Medizinischer O₂ erhöht Sättigung bei Lungenkrankheiten (COPD, COVID-19)','⚗️ Flüssiger Sauerstoff siedet bei −183°C und hat eine hellblaue Farbe'],en:['🌬️ 21% of air – pumped into the atmosphere by cyanobacteria 2.4 billion years ago','🔥 No combustion without oxygen – fire fighting by O₂ removal (CO₂ extinguishers)','🩺 Medical O₂ raises saturation in lung diseases (COPD, COVID-19)','⚗️ Liquid oxygen boils at −183°C and has a pale blue colour']}},
  {de:'Stickstoff',en:'Nitrogen',formula:'N₂',class:'elements',svg:'N2',facts:{de:['🌫️ 78% der Luft – aber Pflanzen können ihn nicht direkt nutzen (Stickstoffixierung nötig)','🥶 Flüssiger Stickstoff siedet bei −196°C – genutzt in Molekular-Gastronomie und Kryotherapie','💊 Stickstoff steckt in jeder Aminosäure, in DNA/RNA und im Hämoglobin','🌿 Blitze fixieren Stickstoff: N₂ + O₂ → NO → HNO₃ – natürlicher Dünger aus dem Himmel'],en:['🌫️ 78% of air – but plants cannot use it directly (nitrogen fixation needed)','🥶 Liquid nitrogen boils at −196°C – used in molecular gastronomy and cryotherapy','💊 Nitrogen is in every amino acid, DNA/RNA and haemoglobin','🌿 Lightning fixes nitrogen: N₂ + O₂ → NO → HNO₃ – natural fertiliser from the sky']}},
  {de:'Chlor',en:'Chlorine',formula:'Cl₂',class:'elements',svg:'Cl2',facts:{de:['🟡 Gelbgrünes Giftgas – im 1. WK als Kampfgas; Grenze der Gasangriffe bei Ypern 1915','🏊 Schwimmbäder: Chlor als Hypochlorit (ClO⁻) tötet Bakterien und Viren','🧂 NaCl (Kochsalz) enthält Chlor – täglich 5–6 g nötig für Nerven und Osmose','🔬 Reaktion mit Wasser: Cl₂ + H₂O → HCl + HClO (Hypochlorige Säure = Desinfektionsmittel)'],en:['🟡 Yellow-green toxic gas – used as chemical weapon in WWI; Ypres 1915','🏊 Swimming pools: chlorine as hypochlorite (ClO⁻) kills bacteria and viruses','🧂 NaCl (table salt) contains chlorine – 5–6 g daily needed for nerves and osmosis','🔬 Reaction with water: Cl₂ + H₂O → HCl + HClO (hypochlorous acid = disinfectant)']}},
  {de:'Fluor',en:'Fluorine',formula:'F₂',class:'elements',svg:'F2',facts:{de:['⚠️ Reaktivstes aller Elemente – reagiert mit fast allem, sogar mit Edelgasen und Glas','🦷 Fluorid (F⁻) in Zahnpasta wandelt Hydroxylapatit in Fluorapatit um – säureresistenter','🧊 PTFE (Teflon) ist eine extrem stabile Fluorverbindung – Antihaft-Beschichtung','💡 FCKW enthielten Fluor – wurden verboten, da sie das Ozon abbauen'],en:['⚠️ Most reactive of all elements – reacts with almost everything, even noble gases and glass','🦷 Fluoride (F⁻) in toothpaste converts hydroxyapatite to fluorapatite – more acid-resistant','🧊 PTFE (Teflon) is an extremely stable fluorine compound – non-stick coating','💡 CFCs contained fluorine – banned because they destroy ozone']}},
  {de:'Brom',en:'Bromine',formula:'Br₂',class:'elements',svg:'Br2',facts:{de:['🟤 Einziges Nichtmetall, das bei Raumtemperatur flüssig ist (Fp. −7°C, Kp. 59°C)','💊 Bromide waren früher als Beruhigungsmittel in Gebrauch – heute obsolet','🔥 Flammschutzmittel in Elektronik enthalten bromorganische Verbindungen','🌊 Meerwasser enthält ~65 mg Br/L – wird industriell durch Oxidation gewonnen'],en:['🟤 Only non-metal liquid at room temperature (mp −7°C, bp 59°C)','💊 Bromides were once used as sedatives – now obsolete','🔥 Flame retardants in electronics contain organobromine compounds','🌊 Seawater contains ~65 mg Br/L – extracted industrially by oxidation']}},
  {de:'Iod',en:'Iodine',formula:'I₂',class:'elements',svg:'I2',facts:{de:['🔮 Sublimiert direkt zu violettem Gas bei leichter Erwärmung (Sublimationspunkt 184°C)','🦋 Schilddrüsenhormone (T3, T4) enthalten Iod – Mangel verursacht Kropf und Kretinismus','🩹 Betadine (Iodpovidon) ist ein weltweit verbreitetes Wunddesinfektionsmittel','🍟 Stärke-Nachweis: I₂ + Amylose → tiefblauer Einschlusskomplex'],en:['🔮 Sublimes directly to violet gas on gentle heating (sublimation point 184°C)','🦋 Thyroid hormones (T3, T4) contain iodine – deficiency causes goitre and cretinism','🩹 Betadine (povidone-iodine) is a globally used wound disinfectant','🍟 Starch test: I₂ + amylose → deep blue inclusion complex']}},
  {de:'Kohlenstoff',en:'Carbon',formula:'C',class:'elements',svg:'C',facts:{de:['💎 Diamant und Graphit: beide reiner Kohlenstoff – nur die Kristallstruktur ist unterschiedlich','🌡️ Graphit leitet Strom (delokalisierte π-Elektronen), Diamant isoliert – obwohl beides C ist','🔬 Fullerene C₆₀ ("Buckyballs") 1985 entdeckt – Nobelpreis Chemie 1996','⏳ Radiokarbondatierung: ¹⁴C zerfällt in 5730 Jahren – datiert organische Funde bis 50.000 Jahre'],en:['💎 Diamond and graphite: both pure carbon – only the crystal structure differs','🌡️ Graphite conducts electricity (delocalised π-electrons), diamond insulates – both are C','🔬 Fullerenes C₆₀ ("Buckyballs") discovered 1985 – Nobel Prize Chemistry 1996','⏳ Radiocarbon dating: ¹⁴C decays in 5730 years – dates organic finds up to 50,000 years']}},
  {de:'Schwefel',en:'Sulfur',formula:'S₈',class:'elements',svg:'S8',facts:{de:['🟡 Gelber Feststoff – in der Antike als "brennender Stein" bekannt (Homer: "göttlicher Schwefel")','🌋 Um Vulkane Schwefelablagerungen durch SO₂-Ausgasung: Subduktionszonen reich an S','🍾 SO₂ als Konservierungsmittel in Wein (E220) – inhibiert Hefewachstum und Oxidation','⚡ Vulkanisation: Schwefelbrücken verbinden Gummi-Polymerketten → Reifen, Dichtungen'],en:['🟡 Yellow solid – known in antiquity as "burning stone" (Homer: "divine sulphur")','🌋 Sulphur deposits around volcanoes from SO₂ degassing: subduction zones rich in S','🍾 SO₂ as preservative in wine (E220) – inhibits yeast growth and oxidation','⚡ Vulcanisation: sulphur bridges cross-link rubber polymer chains → tyres, seals']}},
  {de:'Phosphor',en:'Phosphorus',formula:'P₄',class:'elements',svg:'P4',facts:{de:['🔥 Weißer Phosphor entzündet sich spontan an der Luft bei 34°C – Brandwaffe im Krieg','🌿 Phosphor unersetzbar in Knochen (Ca₃(PO₄)₂), DNA und ATP (Energieträger der Zelle)','🎇 Streichhölzer: Köpfchen mit KClO₃, Reib­fläche mit rotem Phosphor (sicherer als weißer)','⚠️ Organophosphate: Pestizide UND Nervengase (Sarin, VX) haben dieselbe Grundstruktur'],en:['🔥 White phosphorus ignites spontaneously in air at 34°C – used as incendiary weapon','🌿 Phosphorus irreplaceable in bones (Ca₃(PO₄)₂), DNA and ATP (cell energy carrier)','🎇 Matches: head with KClO₃, striking surface with red phosphorus (safer than white)','⚠️ Organophosphates: pesticides AND nerve agents (sarin, VX) share the same core structure']}},
  {de:'Natrium',en:'Sodium',formula:'Na',class:'elements',svg:'Na',facts:{de:['⚡ Explosionsartige Reaktion mit Wasser: 2Na + 2H₂O → 2NaOH + H₂ (Flamme!)','🧂 NaCl (Kochsalz) ist die wichtigste Na-Verbindung – täglich 1,5–2 g Na nötig','🔋 Natrium-Ionen (Na⁺) leiten Nervenimpulse: Na⁺/K⁺-ATPase-Pumpe in jeder Zelle','🌟 Natriumdampflampen leuchten orange (589 nm) – einst Standard der Straßenbeleuchtung'],en:['⚡ Explosive reaction with water: 2Na + 2H₂O → 2NaOH + H₂ (flame!)','🧂 NaCl (table salt) is the main Na compound – 1.5–2 g Na needed daily','🔋 Sodium ions (Na⁺) conduct nerve impulses: Na⁺/K⁺-ATPase pump in every cell','🌟 Sodium vapour lamps emit orange light (589 nm) – once standard street lighting']}},
  {de:'Eisen',en:'Iron',formula:'Fe',class:'elements',svg:'Fe',facts:{de:['🔩 Meistverwendetes Metall: 1,8 Mrd. t/Jahr; 90% der Metallproduktion ist Stahl','🩸 Hämoglobin enthält 4 Fe²⁺-Ionen – trägt O₂ im Blut; Eisenmangel → Anämie','🧲 Ferromagnetisch – Grundlage aller Permanentmagnete, Elektromotoren und Transformatoren','🌍 Erdkern: flüssiges und festes Eisen/Nickel erzeugen das Erdmagnetfeld'],en:['🔩 Most used metal: 1.8 billion t/year; 90% of metal production is steel','🩸 Haemoglobin contains 4 Fe²⁺ ions – carries O₂ in blood; iron deficiency → anaemia','🧲 Ferromagnetic – basis of all permanent magnets, electric motors and transformers','🌍 Earth\'s core: liquid and solid iron/nickel generate the geomagnetic field']}},
  {de:'Kupfer',en:'Copper',formula:'Cu',class:'elements',svg:'Cu',facts:{de:['🟤 Eines der ersten Metalle des Menschen (Kupferzeit ~5000 v. Chr., vor Bronze und Eisen)','⚡ Bester Alltagsleiter (nach Silber) – ~80% allen Kupfers steckt in Kabeln und Leitungen','🦠 Kupfer tötet Bakterien innerhalb von Minuten (oligodynamischer Effekt) – in Klinik-Türgriffen','🗽 Freiheitsstatue: 80 t Kupferblech, 3 mm dünn; Grünspan (CuCO₃·Cu(OH)₂) schützt sie'],en:['🟤 One of the first metals used by humans (Copper Age ~5000 BC, before bronze and iron)','⚡ Best everyday conductor (after silver) – ~80% of all copper is in cables and wires','🦠 Copper kills bacteria within minutes (oligodynamic effect) – used in clinical door handles','🗽 Statue of Liberty: 80 t copper sheet, 3 mm thin; verdigris (CuCO₃·Cu(OH)₂) protects it']}},
  {de:'Calcium',en:'Calcium',formula:'Ca',class:'elements',svg:'Ca',facts:{de:['🦴 99% des Körper-Calciums in Knochen und Zähnen als Hydroxylapatit Ca₅(PO₄)₃(OH)','🏗️ CaCO₃ (Kalk) ist das häufigste Mineral der Erdkruste – Marmor, Kreide, Kalkstein','🌊 Korallenriffe: CaCO₃-Skelette von Korallen; Ozeanversauerung bedroht sie','💪 Vitamin D3 reguliert Ca²⁺-Resorption im Darm – Mangel → Rachitis bei Kindern'],en:['🦴 99% of body calcium in bones and teeth as hydroxyapatite Ca₅(PO₄)₃(OH)','🏗️ CaCO₃ (limestone) is the most common mineral in the Earth\'s crust – marble, chalk, limestone','🌊 Coral reefs: CaCO₃ skeletons of corals; ocean acidification threatens them','💪 Vitamin D3 regulates Ca²⁺ absorption in the intestine – deficiency → rickets in children']}},
  {de:'Magnesium',en:'Magnesium',formula:'Mg',class:'elements',svg:'Mg',facts:{de:['✨ Verbrennt mit blendendem weißem Licht bei 3100°C – daher in Feuerwerkskörpern und Blitzlampen','🌿 Magnesium ist das Zentralatom im Chlorophyll – ohne Mg kein Photosynthese möglich','💊 Magnesiummangel verursacht Muskelkrämpfe (Tetanie) und Herzrhythmusstörungen','🚗 Mg-Legierungen sind 30% leichter als Aluminium – wichtig für E-Autos und Luftfahrt'],en:['✨ Burns with blinding white light at 3100°C – hence used in fireworks and flashlamps','🌿 Magnesium is the central atom in chlorophyll – no Mg, no photosynthesis','💊 Magnesium deficiency causes muscle cramps (tetany) and cardiac arrhythmia','🚗 Mg alloys are 30% lighter than aluminium – important for EVs and aviation']}},
];

function makeSeries(cls,nameGen,fmlGen,factsGen,svgGen){
  const out=[];
  for(let n=1;n<=12;n++){const i=nameGen(n);out.push({de:i.de,en:i.en,formula:fmlGen(n),class:cls,carbonCount:n,facts:factsGen(n),svg:svgGen(n)});}
  return out;
}

function makeEsters(){
  const out=[];
  const ap=[{n:1,d:'Methanoat',e:'methanoate'},{n:2,d:'Ethanoat',e:'ethanoate'},{n:3,d:'Propanoat',e:'propanoate'},{n:4,d:'Butanoat',e:'butanoate'},{n:5,d:'Pentanoat',e:'pentanoate'},{n:6,d:'Hexanoat',e:'hexanoate'}];
  const alp=[{n:1,d:'Methyl',e:'Methyl'},{n:2,d:'Ethyl',e:'Ethyl'},{n:3,d:'Propyl',e:'Propyl'},{n:4,d:'Butyl',e:'Butyl'},{n:5,d:'Pentyl',e:'Pentyl'},{n:6,d:'Hexyl',e:'Hexyl'}];
  const sD={'1_2':'🍌 Bananenduft','2_2':'🍐 Birnenduft (Essigester)','2_3':'🍈 Aprikosenduft','2_4':'🍇 Traubenduft','4_2':'🍍 Ananasduft','5_2':'🍎 Apfelduft','6_2':'🥭 Mangoduft'};
  const sE={'1_2':'🍌 Banana scent','2_2':'🍐 Pear scent (ethyl acetate)','2_3':'🍈 Apricot scent','2_4':'🍇 Grape scent','4_2':'🍍 Pineapple scent','5_2':'🍎 Apple scent','6_2':'🥭 Mango scent'};
  for(const a of ap){for(const al of alp){
    const tC=a.n+al.n; const k=`${a.n}_${al.n}`;
    out.push({de:`${al.d}${a.d}`,en:`${al.e} ${a.e}`,formula:`C${sub(tC)}H${sub(2*tC)}O₂`,
      class:'esters',acidC:a.n,alcC:al.n,svg:`ester_acid${a.n}_alc${al.n}`,
      facts:{de:[sD[k]||`🌺 Ester C${tC} – fruchtartig-süßlicher Geruch`,
        `🧪 Kondensation: ${CAR_D[a.n]} + ${ACO_D[al.n]} ⇌ ${al.d}${a.d} + H₂O (Veresterung)`,
        '💧 Rückreaktion: Ester + H₂O → Säure + Alkohol (Hydrolyse, sauer oder basisch katalysiert)',
        '🌸 Ester geben Früchten, Blüten und Parfümen ihren charakteristischen Duft',
        `⚗️ Estergruppe: R–C(=O)–O–R' | Säurerest C${a.n}, Alkylrest C${al.n}`],
        en:[sE[k]||`🌺 Ester C${tC} – fruity-sweet scent`,
        `🧪 Condensation: ${CAR_E[a.n]} + ${ACO_E[al.n]} ⇌ ${al.e} ${a.e} + H₂O (esterification)`,
        '💧 Reverse: ester + H₂O → acid + alcohol (hydrolysis, acid or base catalysed)',
        '🌸 Esters give fruits, flowers and perfumes their characteristic scent',
        `⚗️ Ester group: R–C(=O)–O–R' | Acid part C${a.n}, alkyl part C${al.n}`]}});
  }}
  return out;
}

const pick=a=>a[Math.floor(Math.random()*a.length)];

function pickTrackedName(){let av=playerNames.filter(n=>!usedNames.includes(n));if(!av.length){usedNames=[];av=[...playerNames];}const c=av[Math.floor(Math.random()*av.length)];usedNames.push(c);return c;}
function pickTrackedClass(y){const al=YEAR_CLASSES[y]||YEAR_CLASSES[8];let av=al.filter(c=>!state.usedClasses.includes(c));if(!av.length){state.usedClasses=[];av=[...al];}const c=pick(av);state.usedClasses.push(c);return c;}
function pickTrackedTask(cId){const hO=['alkanes','alkenes','alkynes','alcohols','aldehydes','ketones','carboxylic_acids','esters'].includes(cId);const avT=TASK_TYPES.filter(tt=>!(tt.id==='skeletal'||tt.id==='structural')||hO);let av=avT.filter(tt=>!state.usedTasks.includes(tt.id));if(!av.length){state.usedTasks=[];av=[...avT];}const c=pick(av);state.usedTasks.push(c.id);return c;}
function pickSubstance(cId){const d=CLASS_META[cId]?.data||[];return pick(d);}

window.handleCSV=function(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{const lines=ev.target.result.split(/\r?\n/).map(l=>l.split(',')[0].trim().split(' ')[0].trim()).filter(Boolean);playerNames=lines;usedNames=[];state.step=0;state.playerName=null;render();};r.readAsText(file);};

window.clearNames=()=>{playerNames=[];usedNames=[];state.step=1;state.playerName=null;render();};

function spinWheel(cId,opts,forced,cb){
  state.spinning=true;document.querySelectorAll('.spin-btn').forEach(b=>b.classList.add('disabled'));
  const container=document.getElementById(cId);if(!container){state.spinning=false;return;}
  const win=container.querySelector('.wheel-window');const track=container.querySelector('.wheel-track');if(!win||!track){state.spinning=false;return;}
  const itemH=win.offsetHeight;const winVal=forced!=null?forced:pick(opts);const winIdx=opts.indexOf(winVal);
  const cycles=4;const strip=[];for(let c=0;c<cycles;c++) for(const o of opts) strip.push(o);for(let i=0;i<=winIdx;i++) strip.push(opts[i]);
  track.innerHTML='';strip.forEach(item=>{const d=document.createElement('div');d.className='wheel-item';d.textContent=item;track.appendChild(d);});
  const finalOffset=-(strip.length-1)*itemH;track.style.transition='none';track.style.transform='translateY(0)';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{track.style.transition='transform 1.6s cubic-bezier(0.08,0.82,0.17,1)';track.style.transform=`translateY(${finalOffset}px)`;}));
  setTimeout(()=>{state.spinning=false;cb(winVal);},1700);
}

window.doSpin=function(id){
  if(state.spinning)return;
  if(id==='spin-player'&&hasNames()){const f=pickTrackedName();spinWheel('spin-player',playerNames,f,v=>{state.playerName=v;render();});}
  else if(id==='spin-class'&&state.year){
    const al=YEAR_CLASSES[state.year]||YEAR_CLASSES[8];
    const labels=al.map(c=>`${CLASS_META[c].emoji} ${CLASS_META[c].de}`);
    const fId=pickTrackedClass(state.year);const fLabel=`${CLASS_META[fId].emoji} ${CLASS_META[fId].de}`;
    spinWheel('spin-class',labels,fLabel,v=>{
      const m=al.find(c=>`${CLASS_META[c].emoji} ${CLASS_META[c].de}`===v);
      state.classId=m||fId;state.substance=pickSubstance(state.classId);state.taskType=pickTrackedTask(state.classId);state.revealedTiles=new Set();render();
    });
  }
};
window.selectYear=function(y){state.year=y;state.classId=null;state.substance=null;state.taskType=null;state.revealedTiles=new Set();render();};
window.newRound=function(){state.classId=null;state.substance=null;state.taskType=null;state.spinning=false;state.revealedTiles=new Set();render();};

window.revealTile=function(tileId){
  state.revealedTiles.add(tileId);
  const allIds=TASK_TYPES.map(tt=>tt.id);
  if(allIds.every(id=>state.revealedTiles.has(id))&&!state.revealedTiles.has('_scored')){
    state.score++;state.streak++;if(state.streak>state.bestStreak)state.bestStreak=state.streak;state.total++;state.revealedTiles.add('_scored');
    spawnConfetti();
    // Show celebration overlay after brief delay so tiles render first
    setTimeout(showCelebration, 400);
  }
  render();
};

function showCelebration(){
  const T=TR[lang];
  const titles=T.celebTitles; const msgs=T.celebMsgs;
  const title=titles[Math.floor(Math.random()*titles.length)];
  const msg=msgs[Math.floor(Math.random()*msgs.length)];
  const nameStr=state.playerName?`<div class="celeb-name">🎓 ${state.playerName}</div>`:'';
  const celebEmojis=['🎉','🏆','⭐','🔬','⚗️','💎','🌟','🥳','💥','🧪'];
  const emo=celebEmojis[Math.floor(Math.random()*celebEmojis.length)];
  const html=`<div class="celeb-overlay" onclick="if(event.target===this)closeCeleb()">
    <div class="celeb-box">
      <div class="celeb-emoji">${emo}</div>
      <div class="celeb-title">${title}</div>
      ${nameStr}
      <div class="celeb-msg">${msg}</div>
      <button class="celeb-btn" onclick="closeCeleb()">${T.celebNextBtn}</button>
    </div>
  </div>`;
  let slot=document.getElementById('celeb-slot');
  if(!slot){slot=document.createElement('div');slot.id='celeb-slot';document.body.appendChild(slot);}
  slot.innerHTML=html;
}
window.closeCeleb=function(){
  const slot=document.getElementById('celeb-slot');
  if(slot) slot.innerHTML='';
  newRound();
};

function getSVG(s,tid){
  if(!s)return null;
  const id=s.svg;
  // 1. User-imported (highest priority)
  if(importedSVGs[`${id}_${tid}`])return importedSVGs[`${id}_${tid}`];
  if(id&&importedSVGs[id])return importedSVGs[id];
  // 2. Built-in embedded SVGs
  const bKey=`${id}_${tid}`;
  if(BUILTIN_SVGS[bKey])return BUILTIN_SVGS[bKey];
  if(BUILTIN_SVGS[id])return BUILTIN_SVGS[id];
  return null;
}

function spawnConfetti(){
  const c=document.createElement('div');c.className='confetti';document.body.appendChild(c);
  const cols=['#7c6af7','#e96dbd','#5dd8c8','#ffd700','#00c853','#4fc3f7','#f55a5a'];
  for(let i=0;i<60;i++){const s=document.createElement('span');s.style.left=Math.random()*100+'%';s.style.background=pick(cols);const sz=(5+Math.random()*10)+'px';s.style.width=sz;s.style.height=sz;s.style.borderRadius=Math.random()>.5?'50%':'2px';s.style.animationDuration=(1.5+Math.random()*2.5)+'s';s.style.animationDelay=Math.random()*.6+'s';c.appendChild(s);}
  setTimeout(()=>c.remove(),4500);
}

window.toggleHelp=function(){
  state.showHelp=!state.showHelp;
  const slot=document.getElementById('help-modal-slot');
  if(state.showHelp){
    if(slot){slot.innerHTML=helpModalHTML();}
  } else {
    if(slot){slot.innerHTML='';}
  }
};
window.handleModalClick=function(e){if(e.target===e.currentTarget)toggleHelp();};

}

function renderTaskCard(){
  const s=state.substance;const cm=CLASS_META[state.classId];const tt=state.taskType;
  if(!s||!cm||!tt) return '';
  const allIds=TASK_TYPES.map(x=>x.id);const allRev=allIds.every(id=>state.revealedTiles.has(id));
  const facts=(s.facts&&s.facts[lang])||[];
  let h=`<div class="task-card"><div class="task-class-badge">${cm.emoji} ${lang==='de'?cm.de:cm.en}${s.carbonCount?' · C'+s.carbonCount:''}</div>
    <div class="task-compound-name">${tN(s)}</div>
    <div class="task-names-row">${s.en&&s.en!==s.de?s.en:''}${s.carbonCount?' · '+t('carbonCount')+' '+s.carbonCount:''}</div>`;
  if(facts.length){
    h+=`<div class="context-facts"><div class="context-facts-title">📚 ${t('factsTitle')}</div><div class="fact-list">`;
    facts.slice(0,4).forEach(f=>{const p=f.split(' ');h+=`<div class="fact-item"><span class="fact-emoji">${p[0]}</span><span>${p.slice(1).join(' ')}</span></div>`;});
    h+=`</div></div>`;
  }
  h+=`<div style="font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-bottom:7px;font-family:'DM Mono',monospace">⚡ ${t('taskAsk')}</div>`;
  h+=`<div class="task-tiles">`;
  TASK_TYPES.forEach(x=>{
    const isA=x.id===tt.id;const isR=state.revealedTiles.has(x.id);
    let cls2='task-tile';if(isA)cls2+=' active';if(isR)cls2+=' revealed';
    let inner='';
    if(isR){
      const svg=getSVG(s,x.id);
      if(svg) inner=`<div class="svg-solution-area"><img src="${svg}" alt="${x.id}"></div>`;
      else if(x.id==='name') inner=`<div class="svg-solution-area"><div style="font-family:'Fredoka',sans-serif;font-size:1.15rem;color:#333;font-weight:700">${tN(s)}</div>${s.en&&s.en!==s.de?`<div style="font-size:.72rem;color:#777;margin-top:2px">${s.en}</div>`:''}</div>`;
      else if(x.id==='formula') inner=`<div class="svg-solution-area"><div style="font-family:'DM Mono',monospace;font-size:1.28rem;font-weight:700;color:#333">${s.formula}</div></div>`;
      else inner=`<div class="svg-solution-area"><div class="svg-placeholder-msg"><strong>${t('noSVG')}</strong><br>${t('noSVGHint')}<br><code>${s.svg}_${x.id}.svg</code></div></div>`;
    }
    const ca=!isR?`onclick="revealTile('${x.id}')"`:' ';
    const hl=!isR&&isA?`<div class="tile-hint-text">${t('clickReveal')}</div>`:!isR?`<div class="tile-click-hint">${t('clickAny')}</div>`:'';
    h+=`<div class="${cls2}" ${ca}><div class="tile-icon">${x.emoji}</div><div class="tile-label">${lang==='de'?x.de:x.en}</div>${hl}${inner}</div>`;
  });
  h+=`</div>`;
  // No inline banner – celebration overlay is shown separately
  h+=`</div>`;
  return h;
}

function render(){
  const app=document.getElementById('app');
  const HN=hasNames();
  let h='';

  // TOP BAR
  h+=`<div class="top-bar"><div class="top-bar-left"><h1>⚗️ Chemical Communication Trainer<small>${t('appSub')}</small></h1></div>
    <div class="top-right">
      <div class="top-right-row">
        <div class="lang-toggle"><button class="lang-btn${lang==='de'?' active':''}" onclick="setLang('de')">DE 🇩🇪</button><button class="lang-btn${lang==='en'?' active':''}" onclick="setLang('en')">EN 🇬🇧</button></div>
        <button class="help-btn" onclick="toggleHelp()">${t('helpBtn')}</button>
      </div>
      <div class="top-right-row">`;
  if(!HN) h+=`<button class="csv-btn-small" onclick="triggerCSV()">${t('csvBtn')}</button>`;
  else h+=`<span class="csv-info-small">👥 ${playerNames.length} · <span class="csv-clear" onclick="clearNames()">✕</span></span>`;
  h+=`</div>`;
  if(HN){h+=`<div class="tracker">`;playerNames.forEach(n=>{const iC=state.playerName===n;const iU=usedNames.includes(n)&&!iC;h+=`<span class="tracker-pill${iU?' used':''}${iC?' current':''}">${n}</span>`;});h+=`</div>`;}
  h+=`</div></div>`;

  // STATS
  h+=`<div class="stats-bar"><div class="stat">🏆 ${t('scoreLabel')}: <strong>${state.score}</strong></div><div class="stat">📊 ${t('totalLabel')}: <strong>${state.total}</strong></div><div class="stat"><span class="${state.streak>=3?'streak-fire':''}">🔥</span> ${t('streakLabel')}: <strong>${state.streak}</strong></div><div class="stat">⭐ ${t('bestLabel')}: <strong>${state.bestStreak}</strong></div></div>`;

  // PROGRESS DOTS
  const tD=HN?4:3;
  const dS=HN?(state.playerName?(state.year?(state.classId?3:2):1):0):(state.year?(state.classId?2:1):0);
  h+=`<div class="progress-ring"><div class="step-dots">`;
  for(let i=0;i<tD;i++) h+=`<div class="step-dot ${dS>i?'done':dS===i?'active':''}"></div>`;
  h+=`</div></div>`;

  // PLAYER NAME
  if(HN){
    h+=`<div class="section"><div class="section-title">${t('sectionPlayer')}</div>`;
    if(state.playerName){
      h+=`<div class="name-year-row"><div class="done-badge">🎰 ${state.playerName} ✅</div>`;
      if(state.year) h+=`<div class="year-badge">🎓 ${state.year} ✅</div>`;
      else{
        h+=`<div><span style="font-size:.8rem;color:var(--dim);margin-right:5px">${t('yearPrompt')}</span><div class="year-btns">`;
        [7,8,9,10].forEach(y=>h+=`<button class="year-btn${state.year===y?' selected':''}" onclick="selectYear(${y})">${y}</button>`);
        h+=`</div></div>`;
      }
      h+=`</div>`;
    } else h+=spinnerHTML('spin-player',playerNames);
    h+=`</div>`;
  } else {
    h+=`<div class="section"><div class="section-title">${t('sectionYear')}</div>`;
    if(state.year) h+=`<div class="name-year-row"><div class="year-badge">🎓 ${state.year} ✅</div><button class="mini-link" onclick="selectYear(null)">${t('changeYear')}</button></div>`;
    else{h+=`<span style="font-size:.83rem;color:var(--dim);margin-right:7px">${t('yearPrompt')}</span><div class="year-btns">`;[7,8,9,10].forEach(y=>h+=`<button class="year-btn${state.year===y?' selected':''}" onclick="selectYear(${y})">${y}</button>`);h+=`</div>`;}
    h+=`</div>`;
  }

  // COMPOUND CLASS
  if(state.year&&(!HN||state.playerName)){
    const al=YEAR_CLASSES[state.year]||YEAR_CLASSES[8];
    const labels=al.map(c=>`${CLASS_META[c].emoji} ${lang==='de'?CLASS_META[c].de:CLASS_META[c].en}`);
    h+=`<div class="section"><div class="section-title">${t('sectionClass')}</div>`;
    if(state.classId){const cm=CLASS_META[state.classId];h+=`<div class="name-year-row"><div class="done-badge">${cm.emoji} ${lang==='de'?cm.de:cm.en} ✅</div><button class="mini-link" onclick="newRound()">${t('newClass')}</button></div>`;}
    else{
      h+=spinnerHTML('spin-class',labels);
      h+=`<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:3px">`;
      al.forEach(c=>{const u=state.usedClasses.includes(c)&&state.classId!==c;h+=`<span class="tracker-pill${u?' used':''}">${CLASS_META[c].emoji} ${lang==='de'?CLASS_META[c].de:CLASS_META[c].en}</span>`;});
      h+=`</div>`;
    }
    h+=`</div>`;
  }

  // TASK CARD
  if(state.classId&&state.substance&&state.taskType){
    h+=renderTaskCard();
    h+=`<div class="btn-row"><button class="action-btn btn-next" onclick="newRound()">${t('nextBtn')}</button></div>`;
  }

  h+=`<input type="file" id="svg-import-input" accept=".svg,.png" multiple style="display:none" onchange="importSVG(event)">`;
  app.innerHTML=h;
  // Help modal lives in its own persistent slot outside app so render() never wipes it
  if(!document.getElementById('help-modal-slot')){
    const slot=document.createElement('div');slot.id='help-modal-slot';document.body.appendChild(slot);
  }
  if(state.showHelp){
    const slot=document.getElementById('help-modal-slot');
    if(slot&&!slot.children.length) slot.innerHTML=helpModalHTML();
  }
}

window.setLang=function(l){
  lang=l;
  render();
  // If help modal is open, re-render it in the slot with new language
  if(state.showHelp){
    const slot=document.getElementById('help-modal-slot');
    if(slot) slot.innerHTML=helpModalHTML();
  }
};
render();
</script>
</body>
</html>
