<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemical Communication Trainer</title>
<style>
  :root {
    --bg: #0d0f1a;
    --card: #151828;
    --card2: #1a1e32;
    --accent: #7c6af7;
    --accent2: #e96dbd;
    --accent3: #5dd8c8;
    --green: #00c853;
    --gold: #ffd700;
    --pink: #ff6b9d;
    --blue: #4fc3f7;
    --purple: #b388ff;
    --red: #f55a5a;
    --orange: #ffa726;
    --text: #e8eaf6;
    --dim: #8890b8;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100%; }
  body {
    font-family: "Nunito", "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    padding: 1.5rem 1rem 4rem;
    background-image:
      radial-gradient(ellipse 60% 50% at 15% 20%, rgba(124,106,247,.1) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 85% 80%, rgba(233,109,189,.08) 0%, transparent 70%);
    min-height: 100vh;
  }
  .wrap { max-width: 1080px; margin: 0 auto; }

  /* === HEADER === */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    padding-bottom: 1rem;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }
  h1 small {
    display: block;
    font-size: 0.7rem;
    color: var(--dim);
    -webkit-text-fill-color: var(--dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 0.15rem;
    font-weight: 500;
  }
  .header-right { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
  .lang-toggle { display: inline-flex; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; overflow: hidden; }
  .lang-btn {
    background: transparent;
    color: var(--dim);
    border: none;
    padding: 0.35rem 0.75rem;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .lang-btn.active {
    background: var(--accent);
    color: white;
  }
  .mode-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.32rem 0.75rem;
    background: rgba(255,215,0,0.08);
    border: 1px solid rgba(255,215,0,0.25);
    border-radius: 8px;
    color: var(--gold);
    font-size: 0.78rem;
    font-weight: 600;
  }
  .change-mode {
    background: transparent;
    border: 1px dashed rgba(255,255,255,0.18);
    color: var(--dim);
    padding: 0.3rem 0.7rem;
    border-radius: 7px;
    font-family: inherit;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .change-mode:hover { color: var(--text); border-color: var(--accent); }

  /* === MODE SELECT (START SCREEN) === */
  .mode-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1.25rem;
    margin-top: 2rem;
  }
  .mode-card {
    background: linear-gradient(135deg, var(--card), var(--card2));
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    padding: 1.5rem 1.25rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .mode-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(124,106,247,0.18), transparent 60%);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .mode-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(124,106,247,0.18);
  }
  .mode-card:hover::before { opacity: 1; }
  .mode-card > * { position: relative; z-index: 1; }
  .mode-emoji { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .mode-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text); }
  .mode-desc { color: var(--dim); font-size: 0.85rem; line-height: 1.55; }

  /* === SECTIONS === */
  section { margin-bottom: 1.25rem; }
  .section-title {
    font-size: 0.92rem;
    font-weight: 700;
    color: var(--pink);
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .panel {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 1rem 1.1rem;
  }

  /* === BUTTONS === */
  .btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    padding: 0.65rem 1.4rem;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }
  .btn:hover { transform: scale(1.04); box-shadow: 0 4px 18px rgba(124,106,247,0.34); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn.ghost {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
  }
  .btn.ghost:hover {
    background: var(--accent);
    color: white;
  }
  .btn.small { padding: 0.4rem 0.85rem; font-size: 0.82rem; }
  .btn-row { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; margin-top: 0.6rem; }

  /* === NAME INPUT / CSV === */
  .name-input-area {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.6rem;
  }
  textarea.names-area {
    width: 100%;
    min-height: 90px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 0.65rem 0.8rem;
    font-family: inherit;
    color: var(--text);
    font-size: 0.92rem;
    resize: vertical;
  }
  textarea.names-area:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
  .name-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-top: 0.5rem;
  }
  .name-chip {
    background: rgba(124,106,247,0.12);
    color: var(--accent);
    border: 1px solid rgba(124,106,247,0.3);
    padding: 0.18rem 0.6rem;
    border-radius: 12px;
    font-size: 0.78rem;
    font-weight: 600;
  }
  .name-chip.used { opacity: 0.35; text-decoration: line-through; }
  .name-chip.current { background: var(--gold); color: #1a1500; border-color: var(--gold); }

  /* === YEAR BUTTONS === */
  .year-btns { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .year-btn {
    background: var(--card2);
    color: var(--text);
    border: 2px solid rgba(255,255,255,0.08);
    padding: 0.55rem 1.2rem;
    border-radius: 10px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
  }
  .year-btn:hover { border-color: var(--accent3); color: var(--accent3); }
  .year-btn.active {
    background: var(--accent3);
    color: #0d1f1c;
    border-color: var(--accent3);
  }

  /* === CLASS GRID (Auswahl) === */
  .class-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 0.55rem;
  }
  .class-btn {
    background: var(--card2);
    color: var(--text);
    border: 1.5px solid rgba(255,255,255,0.08);
    padding: 0.55rem 0.8rem;
    border-radius: 9px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .class-btn .emoji { font-size: 1.05rem; flex-shrink: 0; }
  .class-btn .count { color: var(--dim); font-size: 0.7rem; margin-left: auto; }
  .class-btn:hover { border-color: var(--accent); }
  .class-btn.active {
    background: rgba(124,106,247,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }
  .class-btn.active .count { color: var(--accent); }

  /* === SUBSTANCE LIST (Export-Modus) === */
  .substance-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.4rem;
    max-height: 380px;
    overflow-y: auto;
    padding: 0.4rem 0.2rem;
  }
  .substance-item {
    background: var(--card2);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 7px;
    padding: 0.45rem 0.7rem;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.12s;
    color: var(--text);
  }
  .substance-item .formula { color: var(--dim); font-size: 0.75rem; font-style: italic; margin-left: 0.4em; }
  .substance-item:hover {
    background: rgba(124,106,247,0.1);
    border-color: var(--accent);
  }
  .substance-item.active {
    background: rgba(255,215,0,0.1);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* === STATS === */
  .stats {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
    margin: 0.6rem 0;
  }
  .stat {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    padding: 0.35rem 0.85rem;
    border-radius: 999px;
    font-size: 0.82rem;
    font-weight: 600;
    display: flex;
    gap: 0.4rem;
    align-items: center;
  }
  .stat strong { color: var(--gold); }

  /* === TASK CARD === */
  .task-card {
    background: linear-gradient(135deg, #0a0d18, #131736);
    border: 2px solid rgba(124,106,247,0.25);
    border-radius: var(--radius);
    padding: 1.5rem 1.3rem;
    position: relative;
    overflow: hidden;
    margin: 1rem 0;
  }
  .task-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: conic-gradient(transparent 30%, rgba(124,106,247,0.06), transparent 60%, rgba(233,109,189,0.04), transparent);
    animation: spin 16s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .task-card > * { position: relative; z-index: 1; }
  .task-info {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.7rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .task-class-label {
    font-size: 0.72rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: rgba(255,255,255,0.04);
    padding: 0.18rem 0.65rem;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .task-player {
    font-size: 0.85rem;
    color: var(--gold);
    font-weight: 700;
  }
  .task-prompt {
    color: var(--dim);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 0.8rem 0 0.3rem;
    font-weight: 700;
  }

  /* === TASK TILES === */
  .task-tiles {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.75rem;
    margin-top: 0.7rem;
  }
  @media (max-width: 580px) {
    .task-tiles { grid-template-columns: 1fr; }
  }
  .task-tile {
    background: rgba(255,255,255,0.02);
    border: 2px solid rgba(255,255,255,0.07);
    border-radius: 11px;
    padding: 0.85rem;
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
    color: var(--text);
    min-height: 110px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .task-tile:hover:not(.revealed) {
    background: rgba(124,106,247,0.06);
    border-color: var(--accent);
  }
  .task-tile.revealed {
    background: white;
    border-color: var(--green);
    cursor: default;
    color: #1a1500;
    min-height: 130px;
    padding: 0.5rem;
  }
  .tile-emoji { font-size: 1.5rem; margin-bottom: 0.25rem; }
  .tile-label {
    font-weight: 700;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: inherit;
  }
  .tile-hint {
    font-size: 0.7rem;
    color: var(--dim);
    margin-top: 0.3rem;
  }
  .tile-content {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0.3rem;
  }
  .tile-content .name-de {
    font-weight: 700;
    font-size: 1.05rem;
    color: #1c1712;
  }
  .tile-content .name-en {
    font-size: 0.8rem;
    color: #7a7368;
    font-style: italic;
    margin-top: 0.2rem;
  }
  .tile-content .formula {
    font-family: "DM Mono", "SFMono-Regular", monospace;
    font-size: 1.25rem;
    font-weight: 700;
    color: #1c1712;
  }
  .state-index {
    font-size: 0.62em;
    font-weight: 600;
    color: #6c6358;
    vertical-align: sub;
  }
  .tile-content img,
  .tile-content svg {
    max-width: 100%;
    max-height: 200px;
    display: block;
  }

  /* === ELEKTRONENKONFIGURATION (Übergangsmetalle) === */
  .econfig { text-align: center; padding: 0.3rem; }
  .econfig-full {
    font-family: "DM Mono", "SFMono-Regular", monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: #1c1712;
    margin-bottom: 0.7rem;
  }
  .orb-row {
    display: flex;
    justify-content: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .orb-shell { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; }
  .orb-label {
    font-family: "DM Mono", monospace;
    font-size: 0.85rem;
    font-weight: 700;
    color: #6b5bd2;
  }
  .orb-boxes { display: flex; gap: 2px; }
  .orb-box {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 1.35rem;
    height: 1.35rem;
    padding: 0 1px;
    border: 1.5px solid #1c1712;
    border-radius: 3px;
    font-size: 0.8rem;
    line-height: 1;
    letter-spacing: -1px;
    color: #1c1712;
    background: #fff;
  }

  /* === SPINNING WHEEL + AUFGABEN-SEITE (Punkt 0a / 0c) === */
  .task-page { animation: pageIn 0.28s ease; }
  @keyframes pageIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
  .back-btn { margin-bottom: 0.9rem; }
  .spin-wheel {
    text-align: center;
    padding: 2.4rem 1rem;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 0.8rem;
  }
  .spin-label { font-size: 0.95rem; color: var(--dim); letter-spacing: 0.02em; }
  .spin-name {
    font-size: 1.9rem;
    font-weight: 800;
    color: var(--accent, #7c6af7);
    background: linear-gradient(90deg,#7c6af7,#e96dbd);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: spinPulse 0.16s ease;
    min-height: 2.3rem;
  }
  @keyframes spinPulse { from { transform: scale(0.9); opacity:0.5; } to { transform: scale(1); opacity:1; } }
  .subst-headline {
    text-align: center;
    margin: 0.4rem 0 0.6rem;
    padding: 0.7rem 1rem;
    background: linear-gradient(135deg, rgba(124,106,247,0.12), rgba(233,109,189,0.12));
    border-radius: 14px;
    border: 1px solid rgba(124,106,247,0.25);
  }
  .subst-name-de { font-size: 1.5rem; font-weight: 800; color: var(--text); }
  .subst-name-en { font-size: 0.95rem; color: var(--dim); font-style: italic; margin-top: 0.15rem; }

  /* === SCORE BUTTONS === */
  .score-area {
    margin-top: 1rem;
    padding-top: 0.9rem;
    border-top: 1px dashed rgba(255,255,255,0.1);
  }
  .score-prompt {
    text-align: center;
    color: var(--dim);
    font-size: 0.82rem;
    margin-bottom: 0.6rem;
  }
  .score-btns {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .score-btn {
    background: var(--card2);
    border: 2px solid rgba(255,255,255,0.08);
    color: var(--text);
    padding: 0.55rem 1.1rem;
    border-radius: 10px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.88rem;
    transition: all 0.15s;
    min-width: 90px;
  }
  .score-btn[data-score="2"]:hover, .score-btn.selected[data-score="2"] {
    background: var(--green); border-color: var(--green); color: #021507;
  }
  .score-btn[data-score="1"]:hover, .score-btn.selected[data-score="1"] {
    background: var(--orange); border-color: var(--orange); color: #1a0c00;
  }
  .score-btn[data-score="0"]:hover, .score-btn.selected[data-score="0"] {
    background: var(--red); border-color: var(--red); color: white;
  }
  .score-btn-emoji { font-size: 1.15rem; display: block; margin-bottom: 0.15rem; }

  /* === EXPORT === */
  .export-section { margin-top: 0.5rem; }
  .export-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 0.7rem; }
  @media (max-width: 480px) { .export-controls { grid-template-columns: 1fr; } }
  .export-preview {
    background: white;
    border-radius: 10px;
    padding: 1rem;
    margin-bottom: 0.7rem;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .export-preview svg { max-width: 100%; max-height: 380px; }
  .export-radio-group {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .export-radio {
    background: var(--card2);
    border: 1.5px solid rgba(255,255,255,0.08);
    color: var(--text);
    padding: 0.4rem 0.85rem;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 600;
  }
  .export-radio.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .export-radio:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  /* === MODAL === */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(5px);
  }
  .modal-box {
    background: linear-gradient(135deg, #0a1e0a, #0d1428);
    border: 2px solid var(--green);
    border-radius: 16px;
    padding: 1.8rem 1.6rem;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 0 50px rgba(0,200,83,0.25);
  }
  .modal-emoji { font-size: 2.8rem; margin-bottom: 0.3rem; }
  .modal-title { font-size: 1.4rem; font-weight: 700; color: var(--green); margin-bottom: 0.3rem; }
  .modal-msg { color: var(--dim); margin-bottom: 1rem; line-height: 1.5; font-size: 0.92rem; }
  .modal-points {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 1rem;
  }

  /* === FOOTER === */
  .footer-hint {
    text-align: center;
    color: var(--dim);
    font-size: 0.78rem;
    margin-top: 1.5rem;
    font-style: italic;
  }

  /* Misc */
  sub, sup { font-size: 0.65em; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
"use strict";

/* =====================================================
   CORE_PLACEHOLDER — Renderer + Substanz-Katalog
   ===================================================== */
"use strict";

/* ============================================================
   1. STRUKTUR-DATENMODELL
   { atoms: [{e, x, y, lp, charge?, hidden?}],
     bonds: [{a, b, o}],
     name, formula }
   y wächst nach unten (SVG); Bindungslänge = 1 Einheit.
   ============================================================ */

const SIN60 = Math.sin(Math.PI/3);   // 0.866
const COS60 = Math.cos(Math.PI/3);   // 0.5

/* ---------- Atom-Generatoren (für Reine Elemente) ---------- */
function singleAtom(symbol, valence, name, formula) {
  return {
    atoms:[{e:symbol, x:0, y:0, lp: Math.floor(valence/2), unpaired: valence % 2}],
    bonds:[],
    name, formula
  };
}

/* ---------- Diatomare Moleküle ---------- */
function diat(e1, lp1, e2, lp2, order, name, formula) {
  return {
    atoms:[{e:e1, x:-0.6, y:0, lp:lp1}, {e:e2, x:0.6, y:0, lp:lp2}],
    bonds:[{a:0, b:1, o:order}],
    name, formula
  };
}

/* ---------- Wasser u.ä. (gewinkelt) ---------- */
function bentXH2(centralE, lp_central, name, formula) {
  // X mit 2 H, gewinkelt (120°-Schul-Approximation für 104.5°)
  // Hs nach unten geöffnet, LPs nach oben
  return {
    atoms: [
      {e:centralE, x:0, y:0, lp:lp_central},
      {e:"H", x:-SIN60, y:COS60, lp:0},
      {e:"H", x:SIN60,  y:COS60, lp:0}
    ],
    bonds: [{a:0,b:1,o:1},{a:0,b:2,o:1}],
    name, formula
  };
}

/* ---------- Ammoniak (pyramidal-Andeutung als 90°-Kreuz mit LP oben) ---------- */
function nh3() {
  return {
    atoms:[
      {e:"N", x:0, y:0, lp:1},
      {e:"H", x:-1, y:0, lp:0},
      {e:"H", x:1, y:0, lp:0},
      {e:"H", x:0, y:1, lp:0}
    ],
    bonds:[{a:0,b:1,o:1},{a:0,b:2,o:1},{a:0,b:3,o:1}],
    name:"Ammoniak", formula:"NH₃"
  };
}

/* ---------- Methan, Tetraeder als Kreuz ---------- */
function methaneStruct() {
  return {
    atoms:[
      {e:"C", x:0, y:0, lp:0},
      {e:"H", x:0, y:-1, lp:0},
      {e:"H", x:1, y:0, lp:0},
      {e:"H", x:0, y:1, lp:0},
      {e:"H", x:-1, y:0, lp:0}
    ],
    bonds:[{a:0,b:1,o:1},{a:0,b:2,o:1},{a:0,b:3,o:1},{a:0,b:4,o:1}],
    name:"Methan", formula:"CH₄"
  };
}

/* ---------- Linear (CO2, Acetylen, ...) ---------- */
function co2Struct() {
  return {
    atoms:[
      {e:"O", x:-1.2, y:0, lp:2},
      {e:"C", x:0, y:0, lp:0},
      {e:"O", x:1.2, y:0, lp:2}
    ],
    bonds:[{a:0,b:1,o:2},{a:1,b:2,o:2}],
    name:"Kohlenstoffdioxid", formula:"CO₂"
  };
}

/* ============================================================
   2. ALKAN-FAMILIE: volle Lewis-Form (linear, Hs oben/unten)
   ============================================================ */
function nAlkaneFull(n, name) {
  if (n < 1) return null;
  const atoms = [], bonds = [];
  for (let i=0; i<n; i++) atoms.push({e:"C", x:i, y:0, lp:0});
  for (let i=0; i<n-1; i++) bonds.push({a:i, b:i+1, o:1});
  for (let i=0; i<n; i++) {
    atoms.push({e:"H", x:i, y:-1, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1});
    atoms.push({e:"H", x:i, y:1, lp:0});  bonds.push({a:i, b:atoms.length-1, o:1});
    if (i===0)   { atoms.push({e:"H", x:-1, y:0, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1}); }
    if (i===n-1) { atoms.push({e:"H", x:n,  y:0, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1}); }
  }
  return {atoms, bonds, name, formula: alkaneFormula(n)};
}
function alkaneFormula(n) { return "C"+(n===1?"":sub(n))+"H"+sub(2*n+2); }

/* ============================================================
   3. ALKAN: Skelett (Zickzack)
   ============================================================ */
function nAlkaneSkeletal(n, name) {
  if (n < 3) return null;
  const atoms = [], bonds = [];
  for (let i=0; i<n; i++) {
    atoms.push({e:"C", x: i*SIN60, y: (i%2===0 ? 0 : COS60), lp:0, hidden:true});
  }
  for (let i=0; i<n-1; i++) bonds.push({a:i, b:i+1, o:1});
  return {atoms, bonds, name, formula: alkaneFormula(n)};
}

/* ============================================================
   4. ALKANOLE
   ============================================================ */
function nAlkanolFull(n, pos, name) {
  // n: Kettenlänge, pos: 1..n, OH ersetzt H an C_pos (genauer: das untere H wird zu O)
  const base = nAlkaneFull(n, "");
  const cIdx = pos - 1;
  // Suche das H bei (cIdx, +1)
  let killIdx = -1;
  for (let i=n; i<base.atoms.length; i++) {
    if (base.atoms[i].e === "H" && base.atoms[i].x === cIdx && base.atoms[i].y === 1) {
      killIdx = i; break;
    }
  }
  if (killIdx < 0) {
    for (let i=n; i<base.atoms.length; i++) {
      if (base.atoms[i].e === "H" && base.atoms[i].x === cIdx) { killIdx = i; break; }
    }
  }
  base.bonds = base.bonds.filter(b => b.a !== killIdx && b.b !== killIdx);
  base.atoms[killIdx] = {e:"O", x:cIdx, y:1, lp:2};
  base.bonds.push({a:cIdx, b:killIdx, o:1});
  // H am O linear in Verlängerung der C-O-Achse (gerade nach unten),
  // damit die OH-Gruppe linear absteht; die 2 LPs liegen dann links/rechts
  base.atoms.push({e:"H", x:cIdx, y:2, lp:0});
  base.bonds.push({a:killIdx, b:base.atoms.length-1, o:1});
  base.name = name;
  base.formula = "C"+(n===1?"":sub(n))+"H"+sub(2*n+2)+"O";
  return base;
}

function nAlkanolSkeletal(n, pos, name) {
  if (n < 3) return null;
  const sk = nAlkaneSkeletal(n, name);
  const cIdx = pos - 1;
  const cAt = sk.atoms[cIdx];
  // Zickzack-Konvention:
  //   gerade Indizes (cIdx%2===0): "Tal", y=0 — Außenseite ist OBEN (-y)
  //   ungerade Indizes:           "Spitze", y=COS60 — Außenseite ist UNTEN (+y)
  const dy = (cIdx % 2 === 0) ? -1 : +1;
  const oxN = sk.atoms.length;
  sk.atoms.push({e:"O", x: cAt.x, y: cAt.y + dy, lp:2});
  sk.bonds.push({a: cIdx, b: oxN, o:1});
  // H am O: gewinkelt nach außen, im 120°-Winkel zur C-O-Achse
  sk.atoms.push({e:"H", x: cAt.x + SIN60, y: cAt.y + dy + dy*COS60, lp:0});
  sk.bonds.push({a: oxN, b: sk.atoms.length-1, o:1});
  sk.name = name;
  sk.formula = "C"+(n===1?"":sub(n))+"H"+sub(2*n+2)+"O";
  return sk;
}

/* ============================================================
   5. ALKANSÄUREN
   ============================================================ */
function nAcidFull(n, name) {
  // CH3-(CH2)_{n-2}-COOH; bei n=1: HCOOH
  if (n < 1) return null;
  const atoms = [], bonds = [];
  for (let i=0; i<n; i++) atoms.push({e:"C", x:i, y:0, lp:0});
  for (let i=0; i<n-1; i++) bonds.push({a:i, b:i+1, o:1});
  // Hs an C0..C_{n-2} (sp³)
  for (let i=0; i<n-1; i++) {
    atoms.push({e:"H", x:i, y:-1, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1});
    atoms.push({e:"H", x:i, y:1, lp:0});  bonds.push({a:i, b:atoms.length-1, o:1});
    if (i===0) { atoms.push({e:"H", x:-1, y:0, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1}); }
  }
  // COOH am letzten C (sp²)
  const cc = n-1;
  // =O oben-rechts (60° vom C aus)
  const iOdb = atoms.length;
  atoms.push({e:"O", x: cc + COS60, y: -SIN60, lp:2});
  bonds.push({a:cc, b:iOdb, o:2});
  // -O unten-rechts
  const iOH = atoms.length;
  atoms.push({e:"O", x: cc + COS60, y: SIN60, lp:2});
  bonds.push({a:cc, b:iOH, o:1});
  // H an OH (weiter rechts)
  atoms.push({e:"H", x: cc + COS60 + 1, y: SIN60, lp:0});
  bonds.push({a:iOH, b:atoms.length-1, o:1});
  if (n===1) {
    // HCOOH: zusätzliches H links am Carbonyl-C
    atoms.push({e:"H", x:-1, y:0, lp:0});
    bonds.push({a:0, b:atoms.length-1, o:1});
  }
  return {atoms, bonds, name, formula: acidFormula(n)};
}
function acidFormula(n) {
  return "C"+(n===1?"":sub(n))+"H"+sub(2*n)+"O₂";
}

function nAcidSkeletal(n, name) {
  // Carboxyl-C ist Teil der Zickzack-Kette; =O und -O-H beide im 120°-Winkel
  if (n < 2) return null;
  const atoms = [], bonds = [];
  for (let i=0; i<n; i++) {
    atoms.push({e:"C", x: i*SIN60, y: (i%2===0 ? 0 : COS60), lp:0, hidden:true});
  }
  for (let i=0; i<n-1; i++) bonds.push({a:i, b:i+1, o:1});
  const last = atoms[n-1];
  const prev = atoms[n-2];
  const dx = last.x - prev.x, dy = last.y - prev.y;
  const ux = dx/Math.hypot(dx,dy), uy = dy/Math.hypot(dx,dy);
  const base = Math.atan2(uy, ux);   // Richtung der eingehenden Bindung
  // Zwei freie Richtungen am Carbonyl-C: jeweils 60° von der "Verlängerung" base abgewinkelt
  const angA = base + Math.PI/3;
  const angB = base - Math.PI/3;
  // Wähle =O oben (kleineres y = kleineres sin, da y wächst nach unten)
  let dbAng, ohAng;
  if (Math.sin(angA) < Math.sin(angB)) { dbAng = angA; ohAng = angB; }
  else { dbAng = angB; ohAng = angA; }
  const oDb = atoms.length;
  atoms.push({e:"O", x: last.x + Math.cos(dbAng), y: last.y + Math.sin(dbAng), lp:2});
  bonds.push({a: n-1, b: oDb, o:2});
  const oH = atoms.length;
  atoms.push({e:"O", x: last.x + Math.cos(ohAng), y: last.y + Math.sin(ohAng), lp:2});
  bonds.push({a: n-1, b: oH, o:1});
  // H am O: wir wollen volle Bindungslänge 1, im 120°-Winkel zur C-O-Achse,
  // auf der Außenseite (weg von der Kette).
  // Die C-O-Achse zeigt vom C aus in Richtung ohAng. Vom O aus zeigt sie in Richtung ohAng+π zurück zum C.
  // Die zwei freien 120°-Richtungen am O sind ohAng + π ± 2π/3. Wir wählen die nach außen weisende.
  const hAngA = ohAng + Math.PI - Math.PI/3 * 2;   // = ohAng + π/3
  const hAngB = ohAng + Math.PI + Math.PI/3 * 2;   // = ohAng + 5π/3 ≡ ohAng - π/3
  // Welche Richtung zeigt weiter weg von der Kette? Kette ist links, =O ist oben/unten.
  // Wähle Richtung, deren cos das gleiche Vorzeichen hat wie ux (also nach rechts wie die Kette weiterführen würde)
  const hVx = Math.cos(hAngA), hVy = Math.sin(hAngA);
  const HAng = (Math.cos(hAngA) > Math.cos(hAngB)) ? hAngA : hAngB;
  const oxAt = atoms[oH];
  atoms.push({e:"H", x: oxAt.x + Math.cos(HAng), y: oxAt.y + Math.sin(HAng), lp:0});
  bonds.push({a: oH, b: atoms.length-1, o:1});
  return {atoms, bonds, name, formula: acidFormula(n)};
}

/* ============================================================
   6. ALKANALE
   ============================================================ */
function nAldehydeFull(n, name) {
  if (n < 1) return null;
  const atoms = [], bonds = [];
  for (let i=0; i<n; i++) atoms.push({e:"C", x:i, y:0, lp:0});
  for (let i=0; i<n-1; i++) bonds.push({a:i, b:i+1, o:1});
  for (let i=0; i<n-1; i++) {
    atoms.push({e:"H", x:i, y:-1, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1});
    atoms.push({e:"H", x:i, y:1, lp:0});  bonds.push({a:i, b:atoms.length-1, o:1});
    if (i===0) { atoms.push({e:"H", x:-1, y:0, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1}); }
  }
  const cc = n-1;
  atoms.push({e:"O", x: cc + COS60, y: -SIN60, lp:2});
  bonds.push({a:cc, b:atoms.length-1, o:2});
  atoms.push({e:"H", x: cc + COS60, y: SIN60, lp:0});
  bonds.push({a:cc, b:atoms.length-1, o:1});
  if (n===1) {
    atoms.push({e:"H", x:-1, y:0, lp:0});
    bonds.push({a:0, b:atoms.length-1, o:1});
  }
  return {atoms, bonds, name, formula: aldehydeFormula(n)};
}
function aldehydeFormula(n) {
  return "C"+(n===1?"":sub(n))+"H"+sub(2*n)+"O";
}
function nAldehydeSkeletal(n, name) {
  if (n < 3) return null;
  const sk = nAlkaneSkeletal(n, name);
  const lastIdx = sk.atoms.length - 1;
  const last = sk.atoms[lastIdx];
  // Außenseite-Konvention wie Alkanol: gerade → -y (oben), ungerade → +y (unten)
  const dy = (lastIdx % 2 === 0) ? -1 : +1;
  // =O bei (last.x + COS60, last.y + dy*SIN60)  — 120° zur Kettenrichtung
  const oDb = sk.atoms.length;
  sk.atoms.push({e:"O", x: last.x + COS60, y: last.y + dy*SIN60, lp:2});
  sk.bonds.push({a: lastIdx, b: oDb, o:2});
  // Aldehyd-H: am Carbonyl-C, in 120°-Stellung zur Kettenrichtung,
  // auf der gegenüberliegenden Seite zu =O
  sk.atoms.push({e:"H", x: last.x + COS60, y: last.y - dy*SIN60, lp:0});
  sk.bonds.push({a: lastIdx, b: sk.atoms.length-1, o:1});
  sk.name = name;
  sk.formula = aldehydeFormula(n);
  return sk;
}

/* ============================================================
   7. ALKANONE  (R-CO-R')
   ============================================================ */
function nKetoneFull(n, pos, name) {
  // n: Kettenlänge, pos: Position des Carbonyl-C (1-basiert, intern → 2..n-1)
  if (n < 3 || pos < 2 || pos > n-1) return null;
  const atoms = [], bonds = [];
  for (let i=0; i<n; i++) atoms.push({e:"C", x:i, y:0, lp:0});
  for (let i=0; i<n-1; i++) bonds.push({a:i, b:i+1, o:1});
  // Hs (sp³ an Cs ≠ Carbonyl-C)
  const cc = pos - 1;  // 0-basierter Index des Carbonyl-Cs
  for (let i=0; i<n; i++) {
    if (i === cc) continue;
    atoms.push({e:"H", x:i, y:-1, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1});
    atoms.push({e:"H", x:i, y:1, lp:0});  bonds.push({a:i, b:atoms.length-1, o:1});
    if (i===0)   { atoms.push({e:"H", x:-1, y:0, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1}); }
    if (i===n-1) { atoms.push({e:"H", x:n,  y:0, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1}); }
  }
  // Carbonyl-O am cc, oben
  atoms.push({e:"O", x:cc, y:-1, lp:2});
  bonds.push({a:cc, b:atoms.length-1, o:2});
  return {atoms, bonds, name, formula: ketoneFormula(n)};
}
function ketoneFormula(n) { return "C"+sub(n)+"H"+sub(2*n)+"O"; }

function nKetoneSkeletal(n, pos, name) {
  if (n < 3) return null;
  const sk = nAlkaneSkeletal(n, name);
  const cc = pos - 1;
  // =O am cc, senkrecht zur Kettenmitte: nach oben (kleineres y)
  const cAt = sk.atoms[cc];
  // Carbonyl-O auf der Außenseite — User-Wunsch:
  //   Pentan-3-on (cc=2, gerade) → bleibt unten (+y)
  //   Propan-2-on, Butan-2-on, Pentan-2-on (cc=1, ungerade) → ebenfalls unten
  // → einfach: immer +y (unten), unabhängig von Parität
  // Hintergrund: Alkanol/Aldehyd zeigen oben (Außenseite vom Tal), aber User möchte
  // die Ketogruppe konsistent unten haben.
  const dy = +1;
  sk.atoms.push({e:"O", x: cAt.x, y: cAt.y + dy, lp:2});
  sk.bonds.push({a: cc, b: sk.atoms.length-1, o:2});
  sk.name = name;
  sk.formula = ketoneFormula(n);
  return sk;
}

/* ============================================================
   8. ALKENE  &  ALKINE
   ============================================================ */
function nAlkeneFull(n, pos, name) {
  // pos: Position der Doppelbindung (zwischen Cs an Index pos-1 und pos)
  if (n < 2 || pos < 1 || pos > n-1) return null;
  const dbA = pos - 1, dbB = pos;
  const atoms = [], bonds = [];
  // C-Backbone: dbA und dbB sind sp², die anderen sp³.
  // Wir bauen einen Zickzack, bei dem die Doppelbindung horizontal liegt:
  // Schritt: jedes C bekommt eine x-Position um Bindungslänge 1 versetzt.
  // sp²-C (dbA, dbB) liegen auf y=0; ihre weiteren Bindungen sind 120°.
  // Wir setzen alle Cs zickzackförmig: Index i bei x = i*SIN60 (also Bindungslänge 1).
  // y-Wert: die Doppelbindung liegt auf y=0; benachbarte sp³-Cs zickzacken nach oben/unten.
  // Vereinfachung: alle Cs auf y=0, alle CC-Bindungen Länge 1 (horizontal äquidistant).
  for (let i=0; i<n; i++) atoms.push({e:"C", x:i, y:0, lp:0});
  for (let i=0; i<n-1; i++) {
    bonds.push({a:i, b:i+1, o: (i===dbA ? 2 : 1)});
  }
  // Hs
  for (let i=0; i<n; i++) {
    const isLeft = (i===0), isRight = (i===n-1);
    const isSp2 = (i===dbA || i===dbB);
    if (isSp2) {
      // sp²: Anzahl der Hs = 4 - (Σ Bindungsordnungen zu Nachbar-Cs)
      // dbA/dbB haben jeweils Doppelbindung (=2) zueinander; falls terminal, sonst 1 weitere
      // Einfachbindung zum nächsten C. Also Hs:
      //   terminal & sp²: 4 - 2 = 2 Hs (CH₂=)
      //   intern  & sp²: 4 - 2 - 1 = 1 H
      const isTerminal = (i===dbA && isLeft) || (i===dbB && isRight);
      // Richtung: weg von der Doppelbindung (i===dbA → nach -x; i===dbB → nach +x)
      const dx = (i===dbA) ? -COS60 : +COS60;
      // 1 H schräg nach oben (+SIN60 in y wegen Konvention y wächst nach unten)
      atoms.push({e:"H", x: i + dx, y: -SIN60, lp:0});
      bonds.push({a:i, b: atoms.length-1, o:1});
      if (isTerminal) {
        // 2. H schräg nach unten
        atoms.push({e:"H", x: i + dx, y:  SIN60, lp:0});
        bonds.push({a:i, b: atoms.length-1, o:1});
      }
      // intern: kein 2. H
    } else {
      // sp³: terminal-C bekommt 3 Hs, intern 2 Hs
      atoms.push({e:"H", x:i, y:-1, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1});
      atoms.push({e:"H", x:i, y: 1, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1});
      if (isLeft)  { atoms.push({e:"H", x:i-1, y:0, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1}); }
      if (isRight) { atoms.push({e:"H", x:i+1, y:0, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1}); }
    }
  }
  return {atoms, bonds, name, formula: "C"+(n===1?"":sub(n))+"H"+sub(2*n)};
}

function nAlkeneSkeletal(n, pos, name) {
  if (n < 4) return null; // unter 4 Cs zu kurz für Skelett-Mehrwert
  const sk = nAlkaneSkeletal(n, name);
  // Bindung pos-1 → pos zur Doppelbindung machen
  for (const b of sk.bonds) {
    if ((b.a === pos-1 && b.b === pos) || (b.a === pos && b.b === pos-1)) {
      b.o = 2; break;
    }
  }
  sk.formula = "C"+(n===1?"":sub(n))+"H"+sub(2*n);
  return sk;
}

function nAlkyneFull(n, pos, name) {
  if (n < 2 || pos < 1 || pos > n-1) return null;
  const dbA = pos - 1, dbB = pos;
  const atoms = [], bonds = [];
  // Bei sp ist es linear; alle Cs auf y=0
  for (let i=0; i<n; i++) atoms.push({e:"C", x:i, y:0, lp:0});
  for (let i=0; i<n-1; i++) {
    bonds.push({a:i, b:i+1, o: (i===dbA ? 3 : 1)});
  }
  for (let i=0; i<n; i++) {
    const isLeft = (i===0), isRight = (i===n-1);
    const isSp = (i===dbA || i===dbB);
    if (isSp) {
      // sp: nur 1 H/Bindung. Wenn terminal: H außen.
      if (i===dbA && isLeft)  { atoms.push({e:"H", x:-1, y:0, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1}); }
      if (i===dbB && isRight) { atoms.push({e:"H", x:n,  y:0, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1}); }
    } else {
      // sp³
      atoms.push({e:"H", x:i, y:-1, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1});
      atoms.push({e:"H", x:i, y:1, lp:0});  bonds.push({a:i, b:atoms.length-1, o:1});
      if (isLeft)  { atoms.push({e:"H", x:-1, y:0, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1}); }
      if (isRight) { atoms.push({e:"H", x:n,  y:0, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1}); }
    }
  }
  return {atoms, bonds, name, formula: "C"+(n===1?"":sub(n))+"H"+sub(2*n-2)};
}

function nAlkyneSkeletal(n, pos, name) {
  if (n < 4) return null;
  // Skelett mit linearem C≡C-Segment.
  // Wir bauen die Kette Schritt für Schritt mit Richtungsvektoren.
  // Normale Bindung: Zickzack (Winkel ±30° zur Horizontalen).
  // Um eine Dreifachbindung (zwischen pos-1 und pos): das Segment davor, die
  // Dreifachbindung selbst und das Segment danach sind kollinear (horizontal).
  const atoms = [], bonds = [];
  let x = 0, y = 0;
  atoms.push({e:"C", x, y, lp:0, hidden:true});
  // Richtung: Zickzack startet nach rechts-unten (+30°) / rechts-oben (-30°)
  let dirUp = true; // nächstes Segment geht nach oben?
  for (let i = 1; i < n; i++) {
    const bondIdxA = i-1, bondIdxB = i;
    const isTripleBond = (bondIdxA === pos-1 && bondIdxB === pos);
    const prevWasTriple = (i-1 === pos);     // Segment direkt nach der Dreifachb.
    const nextIsTriple = (i === pos-1);      // Segment direkt vor der Dreifachb.
    let dx, dy;
    if (isTripleBond || prevWasTriple || nextIsTriple) {
      // linear (horizontal)
      dx = 1; dy = 0;
    } else {
      // Zickzack
      dx = SIN60;
      dy = dirUp ? -COS60 : COS60;
      dirUp = !dirUp;
    }
    x += dx; y += dy;
    atoms.push({e:"C", x, y, lp:0, hidden:true});
    bonds.push({a: bondIdxA, b: bondIdxB, o: isTripleBond ? 3 : 1});
  }
  return {atoms, bonds, name, formula: "C"+(n===1?"":sub(n))+"H"+sub(2*n-2)};
}

/* ============================================================
   9. ESTER  R-CO-O-R'
   nA = Säurekettenlänge incl. Carbonyl-C
   nB = Alkohol-Rest-Länge
   ============================================================ */
function esterFull(nA, nB, name) {
  if (nA < 1 || nB < 1) return null;
  const atoms = [], bonds = [];
  // R-Kette nA Cs (links): C0..C_{nA-1}, letztes ist Carbonyl-C
  for (let i=0; i<nA; i++) atoms.push({e:"C", x:i, y:0, lp:0});
  for (let i=0; i<nA-1; i++) bonds.push({a:i, b:i+1, o:1});
  // Alkyl-Hs an C0..C_{nA-2}
  for (let i=0; i<nA-1; i++) {
    atoms.push({e:"H", x:i, y:-1, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1});
    atoms.push({e:"H", x:i, y:1, lp:0});  bonds.push({a:i, b:atoms.length-1, o:1});
    if (i===0) { atoms.push({e:"H", x:-1, y:0, lp:0}); bonds.push({a:i, b:atoms.length-1, o:1}); }
  }
  if (nA === 1) {
    // Methansäureester: H an Carbonyl-C
    atoms.push({e:"H", x:-1, y:0, lp:0});
    bonds.push({a:0, b:atoms.length-1, o:1});
  }
  const cc = nA - 1;
  // =O oben-rechts vom Carbonyl-C
  const iOdb = atoms.length;
  atoms.push({e:"O", x: cc + COS60, y: -SIN60, lp:2});
  bonds.push({a:cc, b:iOdb, o:2});
  // -O- nach rechts
  const iOe = atoms.length;
  atoms.push({e:"O", x: cc + 1, y: 0, lp:2});
  bonds.push({a:cc, b:iOe, o:1});
  // R'-Kette nB Cs nach rechts vom Ether-O
  const offsetX = cc + 2;
  const cRStart = atoms.length;
  for (let j=0; j<nB; j++) atoms.push({e:"C", x: offsetX + j, y:0, lp:0});
  bonds.push({a:iOe, b:cRStart, o:1});
  for (let j=0; j<nB-1; j++) bonds.push({a:cRStart+j, b:cRStart+j+1, o:1});
  // Hs an C R'-Kette
  for (let j=0; j<nB; j++) {
    const idx = cRStart + j;
    atoms.push({e:"H", x: offsetX + j, y:-1, lp:0}); bonds.push({a:idx, b:atoms.length-1, o:1});
    atoms.push({e:"H", x: offsetX + j, y:1, lp:0});  bonds.push({a:idx, b:atoms.length-1, o:1});
    if (j===nB-1) { atoms.push({e:"H", x: offsetX + j + 1, y:0, lp:0}); bonds.push({a:idx, b:atoms.length-1, o:1}); }
  }
  // Formel: C_{nA+nB} H_{2(nA+nB)} O₂
  const totalC = nA + nB;
  const totalH = 2*nA + 2*nB;
  return {atoms, bonds, name, formula: "C"+sub(totalC)+"H"+sub(totalH)+"O₂"};
}

function esterSkeletal(nA, nB, name) {
  // Skelett ab nA+nB >= 3
  if (nA + nB < 3) return null;
  const atoms = [], bonds = [];
  // Zickzack der R-Kette (links)
  for (let i=0; i<nA; i++) {
    atoms.push({e:"C", x: i*SIN60, y: (i%2===0 ? 0 : COS60), lp:0, hidden:true});
  }
  for (let i=0; i<nA-1; i++) bonds.push({a:i, b:i+1, o:1});
  const ccIdx = nA - 1;
  const ccAt = atoms[ccIdx];
  // =O am Carbonyl-C, nach oben
  atoms.push({e:"O", x: ccAt.x, y: ccAt.y - 1, lp:2});
  bonds.push({a: ccIdx, b: atoms.length-1, o:2});
  // -O- in Kettenfortsetzung (zickzack)
  const oeAt = {e:"O", x: ccAt.x + SIN60, y: (nA % 2 === 0) ? 0 : COS60, lp:2};
  // einfach nächste Zickzack-Position:
  const nextY = (nA % 2 === 0) ? 0 : COS60;
  oeAt.y = nextY;
  oeAt.x = nA * SIN60;
  const oeIdx = atoms.length;
  atoms.push(oeAt);
  bonds.push({a: ccIdx, b: oeIdx, o:1});
  // R'-Kette
  for (let j=0; j<nB; j++) {
    const totalI = nA + 1 + j; // gesamtindex in zickzack
    atoms.push({e:"C", x: totalI * SIN60, y: (totalI % 2 === 0) ? 0 : COS60, lp:0, hidden:true});
    bonds.push({a: (j===0 ? oeIdx : atoms.length-2), b: atoms.length-1, o:1});
  }
  const totalC = nA + nB;
  const totalH = 2*nA + 2*nB;
  return {atoms, bonds, name, formula: "C"+sub(totalC)+"H"+sub(totalH)+"O₂"};
}

/* ============================================================
   10. SPEZIAL-STRUKTUREN (anorg./aromatisch)
   Alle Bindungslängen = 1; geometrische Hilfsmittel:
   - 120° Spreizung um eine Achse:  (±SIN60, ±COS60)
   - 90°-Kreuz:                     (±1, 0), (0, ±1)
   - linear:                        (±1, 0)
   ============================================================ */
function ozoneStruct() {
  // O=O+-O-  gewinkelt (120°), mittleres O sp²
  return {
    atoms:[
      {e:"O", x:-SIN60, y:COS60, lp:2},                    // =O links-unten
      {e:"O", x:0, y:0, lp:1, charge:"+"},                  // O+ Spitze
      {e:"O", x:SIN60,  y:COS60, lp:3, charge:"−"}         // -O- rechts-unten
    ],
    bonds:[{a:0,b:1,o:2},{a:1,b:2,o:1}],
    name:"Ozon", formula:"O₃"
  };
}
function so2Struct() {
  return {
    atoms:[
      {e:"S", x:0, y:0, lp:1},
      {e:"O", x:-SIN60, y:COS60, lp:2},
      {e:"O", x:SIN60,  y:COS60, lp:2}
    ],
    bonds:[{a:0,b:1,o:2},{a:0,b:2,o:2}],
    name:"Schwefeldioxid", formula:"SO₂"
  };
}
function so3Struct() {
  // Oktett-konforme Resonanzform: S²⁺ mit 1 Doppelbindung (=O) und 2 Einfachbindungen (−O⁻)
  // S: 4 Bindungen = Oktett, Formalladung +2; =O neutral (2 LP); 2× −O⁻ (3 LP)
  return {
    atoms:[
      {e:"S", x:0, y:0, lp:0, charge:"2+"},
      {e:"O", x:0, y:-1, lp:2},                       // =O oben
      {e:"O", x:SIN60, y:COS60, lp:3, charge:"−"},    // −O⁻ rechts-unten
      {e:"O", x:-SIN60, y:COS60, lp:3, charge:"−"}    // −O⁻ links-unten
    ],
    bonds:[{a:0,b:1,o:2},{a:0,b:2,o:1},{a:0,b:3,o:1}],
    name:"Schwefeltrioxid", formula:"SO₃"
  };
}
function coStruct() {
  // ⁻C≡O⁺ ; beide haben Edelgaskonfiguration: C 1 LP + 6 in DB-Region; O 1 LP + 6 in DB-Region
  return {
    atoms:[
      {e:"C", x:-0.5, y:0, lp:1, charge:"−"},
      {e:"O", x:0.5,  y:0, lp:1, charge:"+"}
    ],
    bonds:[{a:0,b:1,o:3}],
    name:"Kohlenmonoxid", formula:"CO"
  };
}

function noStruct() {
  // N=O mit 1 ungepaartes Elektron am N (Edelgasregel: 11 Valenz, 5+6=11)
  // Doppelbindung + 2 LPs am N + 1 ungepaart (insgesamt 5 Valenz an N: 4 in DB-Region + 1 LP + 1 unpaired? 
  // Korrekt: N=O, N hat 1 LP + 1 ungepaartes; O hat 2 LPs.)
  return {
    atoms:[
      {e:"N", x:-0.5, y:0, lp:1, unpaired:1},
      {e:"O", x:0.5,  y:0, lp:2}
    ],
    bonds:[{a:0,b:1,o:2}],
    name:"Stickstoffmonoxid", formula:"NO"
  };
}
function no2Struct() {
  // 17 Valenz-Elektronen: Schul-Resonanzform mit Ladungstrennung.
  // N: 1 ungepaart, formal +; =O (2 LPs); -O⁻ (3 LPs)
  // 1 + 4 + 4 + 6 + 2 = 17 ✓
  return {
    atoms:[
      {e:"N", x:0, y:0, lp:0, unpaired:1, charge:"+"},
      {e:"O", x:-SIN60, y:COS60, lp:2},                     // =O links-unten
      {e:"O", x: SIN60, y:COS60, lp:3, charge:"−"}          // -O⁻ rechts-unten
    ],
    bonds:[{a:0,b:1,o:2},{a:0,b:2,o:1}],
    name:"Stickstoffdioxid", formula:"NO₂"
  };
}
function n2oStruct() {
  // ⁻N=N⁺=O linear; alle Bindungen Länge 1
  return {
    atoms:[
      {e:"N", x:-1, y:0, lp:2, charge:"−"},
      {e:"N", x:0,  y:0, lp:0, charge:"+"},
      {e:"O", x:1,  y:0, lp:2}
    ],
    bonds:[{a:0,b:1,o:2},{a:1,b:2,o:2}],
    name:"Distickstoffmonoxid", formula:"N₂O"
  };
}
function hno3Struct() {
  // HO-N⁺(=O)-O⁻; N sp², drei Bindungen 120°
  // N im Ursprung, =O nach oben (-y), -O- 120° nach unten-rechts, OH-Sauerstoff 120° nach unten-links
  // Anschließend H und O- jeweils mit Bindungslänge 1
  const ng = [
    {e:"N", x:0, y:0, lp:0, charge:"+"},                    // 0 N
    {e:"O", x:0, y:-1, lp:2},                                // 1 =O oben
    {e:"O", x:-SIN60, y:COS60, lp:2},                        // 2 OH-O links-unten
    {e:"O", x: SIN60, y:COS60, lp:3, charge:"−"},            // 3 O- rechts-unten
    // H an O Nr.2 — in Verlängerung der N-O-Achse (= weg von N)
    {e:"H", x:-2*SIN60, y:2*COS60, lp:0}                     // 4 H
  ];
  return {
    atoms: ng,
    bonds:[{a:0,b:1,o:2},{a:0,b:2,o:1},{a:0,b:3,o:1},{a:2,b:4,o:1}],
    name:"Salpetersäure", formula:"HNO₃"
  };
}
function h2so4Struct() {
  // S tetraedrisch (Schul-Kreuz). Bindungen S-O alle Länge 1.
  // 2× =O senkrecht (oben/unten), 2× -OH waagerecht, je H weiter außen.
  return {
    atoms:[
      {e:"S", x:0, y:0, lp:0},
      {e:"O", x:0, y:-1, lp:2},               // 1 =O oben
      {e:"O", x:0, y: 1, lp:2},               // 2 =O unten
      {e:"O", x:-1, y:0, lp:2},               // 3 -O- links
      {e:"H", x:-2, y:0, lp:0},               // 4 H links
      {e:"O", x: 1, y:0, lp:2},               // 5 -O- rechts
      {e:"H", x: 2, y:0, lp:0}                // 6 H rechts
    ],
    bonds:[
      {a:0,b:1,o:2},{a:0,b:2,o:2},
      {a:0,b:3,o:1},{a:3,b:4,o:1},
      {a:0,b:5,o:1},{a:5,b:6,o:1}
    ],
    name:"Schwefelsäure", formula:"H₂SO₄"
  };
}
function h3po4Struct() {
  // P tetraedrisch (Schul-Kreuz). 1× =O oben, 3× -OH (rechts, unten, links).
  return {
    atoms:[
      {e:"P", x:0, y:0, lp:0},
      {e:"O", x:0, y:-1, lp:2},               // 1 =O oben
      {e:"O", x:1, y:0, lp:2},                // 2 -O- rechts
      {e:"H", x:2, y:0, lp:0},                // 3 H rechts
      {e:"O", x:0, y:1, lp:2},                // 4 -O- unten
      {e:"H", x:0, y:2, lp:0},                // 5 H unten
      {e:"O", x:-1, y:0, lp:2},               // 6 -O- links
      {e:"H", x:-2, y:0, lp:0}                // 7 H links
    ],
    bonds:[
      {a:0,b:1,o:2},
      {a:0,b:2,o:1},{a:2,b:3,o:1},
      {a:0,b:4,o:1},{a:4,b:5,o:1},
      {a:0,b:6,o:1},{a:6,b:7,o:1}
    ],
    name:"Phosphorsäure", formula:"H₃PO₄"
  };
}
function naohStruct() {
  // Na⁺ ··· ⁻O-H (Ionenpaar); O sp³ mit 3 LPs
  return {
    atoms:[
      {e:"Na", x:-1.7, y:0, lp:0, charge:"+"},
      {e:"O", x:0, y:0, lp:3, charge:"−"},
      {e:"H", x:1, y:0, lp:0}
    ],
    bonds:[{a:1,b:2,o:1}],
    name:"Natriumhydroxid", formula:"NaOH"
  };
}
function naclStruct() {
  return {
    atoms:[
      {e:"Na", x:-1, y:0, lp:0, charge:"+"},
      {e:"Cl", x:1,  y:0, lp:4, charge:"−"}
    ],
    bonds:[],
    name:"Natriumchlorid", formula:"NaCl"
  };
}
function hcnStruct() {
  // H-C≡N linear, alle Bindungen Länge 1
  return {
    atoms:[
      {e:"H", x:-1, y:0, lp:0},
      {e:"C", x:0,  y:0, lp:0},
      {e:"N", x:1,  y:0, lp:1}
    ],
    bonds:[{a:0,b:1,o:1},{a:1,b:2,o:3}],
    name:"Cyanwasserstoff (Blausäure)", formula:"HCN"
  };
}
function h2o2Struct() {
  // H-O-O-H mit Bindungslängen 1 und Winkeln um 120° an jedem O.
  // O₁ bei (-COS60, 0), O₂ bei (+COS60, 0) → O-O-Bindung = 1
  // H₁ bei O₁ + (cos 120°, sin 120°) = (-COS60-0.5, SIN60) = (-1, +0.866)
  // H₂ bei O₂ + (cos -60°, sin -60°)  = (+COS60+0.5, -SIN60) = (+1, -0.866)
  // Dadurch: H₁-O₁-O₂ Winkel = 120°, O₁-O₂-H₂ Winkel = 120°, Hs trans
  return {
    atoms:[
      {e:"H", x:-1, y: SIN60, lp:0},                  // 0
      {e:"O", x:-COS60, y:0, lp:2},                   // 1
      {e:"O", x: COS60, y:0, lp:2},                   // 2
      {e:"H", x: 1, y:-SIN60, lp:0}                   // 3
    ],
    bonds:[{a:0,b:1,o:1},{a:1,b:2,o:1},{a:2,b:3,o:1}],
    name:"Wasserstoffperoxid", formula:"H₂O₂"
  };
}
function benzeneStruct() {
  const atoms=[], bonds=[];
  const r = 1;
  for (let i=0; i<6; i++) {
    const ang = -Math.PI/2 + i*Math.PI/3;
    atoms.push({e:"C", x: r*Math.cos(ang), y: r*Math.sin(ang), lp:0});
  }
  for (let i=0; i<6; i++) bonds.push({a:i, b:(i+1)%6, o: (i%2===0?2:1)});
  for (let i=0; i<6; i++) {
    const ang = -Math.PI/2 + i*Math.PI/3;
    const hr = r+1;
    atoms.push({e:"H", x: hr*Math.cos(ang), y: hr*Math.sin(ang), lp:0});
    bonds.push({a:i, b:atoms.length-1, o:1});
  }
  return {atoms, bonds, name:"Benzol", formula:"C₆H₆"};
}
function benzeneSkeletal() {
  const atoms=[], bonds=[];
  const r = 1;
  for (let i=0; i<6; i++) {
    const ang = -Math.PI/2 + i*Math.PI/3;
    atoms.push({e:"C", x: r*Math.cos(ang), y: r*Math.sin(ang), lp:0, hidden:true});
  }
  for (let i=0; i<6; i++) bonds.push({a:i, b:(i+1)%6, o: (i%2===0?2:1)});
  return {atoms, bonds, name:"Benzol", formula:"C₆H₆"};
}

function sub(n){ const m="₀₁₂₃₄₅₆₇₈₉"; return String(n).split('').map(d=>m[+d]).join(''); }

/* ---------- Summenformel aus Struktur ableiten (Punkt I) ---------- */
/* Zählt alle Atome einer Strukturformel (inkl. implizit/versteckter sowie
   solcher mit Ladung) und liefert ein Map-Objekt {element: anzahl}. */
function countAtoms(struct) {
  const counts = {};
  if (!struct || !struct.atoms) return counts;
  for (const a of struct.atoms) {
    const e = a.e;
    counts[e] = (counts[e] || 0) + 1;
  }
  return counts;
}

/* Hill-Notation: C zuerst, dann H, dann übrige Elemente alphabetisch.
   Bei reinen Anorganika ohne C: alle Elemente alphabetisch. */
function toHillFormula(counts) {
  const elems = Object.keys(counts);
  if (elems.length === 0) return "";
  const ordered = [];
  if (counts["C"]) { ordered.push("C"); }
  if (counts["H"]) { ordered.push("H"); }
  const rest = elems.filter(e => e !== "C" && e !== "H").sort();
  // Falls kein C vorhanden, H ganz normal alphabetisch einsortieren
  if (!counts["C"]) {
    ordered.length = 0;
    elems.sort().forEach(e => ordered.push(e));
  } else {
    rest.forEach(e => ordered.push(e));
  }
  return ordered.map(e => e + (counts[e] > 1 ? sub(counts[e]) : "")).join("");
}

/* Aggregatzustand bei Standard-Laborbedingungen (1013 hPa, 25 °C).
   Englische Kurzform als Index: (s) solid, (l) liquid, (g) gas, (aq) aqueous.
   Keyed nach Substanz-key; Default-Heuristik greift, falls nicht gelistet. */
const STATE_AT_STP = {
  // Elemente / Gase
  h2:"g", o2:"g", n2:"g", f2:"g", cl2:"g", o3:"g",
  br2:"l", i2:"s",
  he:"g", ne:"g", ar:"g",
  c_atom:"s", p_atom:"s", s_atom:"s",
  // Metalle (alle fest)
  li_metal:"s", na_metal:"s", k_metal:"s", mg_metal:"s", ca_metal:"s", al_metal:"s",
  // Übergangsmetalle
  fe_tm:"s", cu_tm:"s", zn_tm:"s", ag_tm:"s", au_tm:"s",
  // Salze (fest)
  nacl:"s", kcl:"s", mgo:"s", cao:"s", caf2:"s", k2o:"s", na2o:"s",
  // anorganische Molekülverbindungen
  h2o:"l", co2:"g", co:"g", so2:"g", so3:"l", no:"g", no2:"g", n2o:"g",
  nh3:"g", ch4:"g", h2s:"g", hcl_gas:"g", h2o2:"l",
  // Säuren (wässrig/flüssig)
  hcl:"aq", hbr:"aq", hf:"aq", hi:"aq", hno3:"l", h2so4:"l", h3po4:"l", hcn:"l", h2co3:"aq",
  // Basen
  naoh:"s", koh:"s", caoh2:"s", nh3aq:"aq",
  // organische Sonderfälle (Siedepunkt nahe 25 °C)
  neopentane:"g",   // 2,2-Dimethylpropan, Sdp. 9,5 °C → gasförmig
};

/* Default-Heuristik für nicht gelistete Substanzen (v.a. Organik):
   kleine Alkane/Alkene/Alkine gasförmig, mittlere flüssig, große fest. */
function defaultState(subst, counts) {
  const klass = subst.sub || subst.klass;
  let nC = counts["C"] || 0;
  // Fallback: C-Zahl aus der Formelzeichenkette lesen, falls Struktur fehlt
  if (!nC && subst.formula) {
    const m = subst.formula.match(/C([₀₁₂₃₄₅₆₇₈₉]*)/);
    if (m) {
      if (m[1]) {
        const digits = {"₀":0,"₁":1,"₂":2,"₃":3,"₄":4,"₅":5,"₆":6,"₇":7,"₈":8,"₉":9};
        nC = 0; for (const ch of m[1]) nC = nC*10 + digits[ch];
      } else {
        nC = 1; // "C" ohne Index = 1 Kohlenstoff
      }
    }
  }
  // organische Stoffe grob nach C-Zahl
  if (nC > 0) {
    if (["alkan","alken","alkin","alkan_iso","alken_iso","alkin_iso"].includes(klass)) {
      if (nC <= 4) return "g";
      if (nC <= 16) return "l";
      return "s";
    }
    // Alkohole, Aldehyde, Ketone, Säuren, Ester: meist flüssig im Schulkontext
    if (["alkanol","alkanal","alkanon","alkansaeure","ester","aromat"].includes(klass)) {
      if (nC >= 13) return "s";
      return "l";
    }
  }
  return "s";
}

/* Liefert die Summenformel inkl. Aggregatzustand-Index, z.B. "H₂(g)".
   Reihenfolge: hinterlegte (didaktisch korrekte) Formel aus full()/subst,
   nur als letzter Fallback aus Struktur abgeleitete Hill-Formel. */
function formulaWithState(subst) {
  let base = "";
  let struct = null;
  try {
    if (typeof subst.full === "function") {
      struct = subst.full();
      if (struct && struct.formula) base = struct.formula;
    }
  } catch(e) { struct = null; }
  if (!base && subst.formula) base = subst.formula;
  if (!base && struct && struct.atoms && struct.atoms.length) {
    base = toHillFormula(countAtoms(struct));
  }
  // Zustand bestimmen
  let state = STATE_AT_STP[subst.key];
  if (!state) {
    const counts = struct && struct.atoms ? countAtoms(struct) : {};
    state = defaultState(subst, counts);
  }
  return base + "(" + state + ")";
}

/* Hilfs-Funktion: Iso-Alkan mit zentralem Carbon als Verzweigung */

/* Hilfsfunktion: hängt ein CH3 an Position (mx,my) an Atom-Index parentIdx an.
   Die 3 H-Atome werden radial nach außen (weg vom Parent) gefächert,
   sodass keine Überlappung mit Nachbargruppen entsteht.
   bondLen-normiert: H-Abstand = 1. */
function attachMethylRadial(atoms, bonds, parentIdx, px, py, mx, my, fanSpread) {
  const cIdx = atoms.length;
  atoms.push({e:"C", x: mx, y: my, lp:0});
  bonds.push({a: parentIdx, b: cIdx, o:1});
  // Außenrichtung (vom Parent zum Methyl, normiert)
  const dx = mx - px, dy = my - py;
  const len = Math.hypot(dx, dy) || 1;
  const ux = dx/len, uy = dy/len;
  const baseAng = Math.atan2(uy, ux);
  // 3 Hs: einer radial nach außen, zwei seitlich um ±fanSpread (Default 120°).
  const spread = (typeof fanSpread === "number") ? fanSpread : 2*Math.PI/3;
  for (const off of [0, spread, -spread]) {
    const a = baseAng + off;
    atoms.push({e:"H", x: mx + Math.cos(a), y: my + Math.sin(a), lp:0});
    bonds.push({a: cIdx, b: atoms.length-1, o:1});
  }
}

/* Globale Hilfsfunktion: fügt 'count' H-Atome an Atom cIdx (Position cx,cy) hinzu,
   platziert an den freiesten Winkeln (maximaler Mindestabstand zu Nachbarn).
   Bindungslänge 1, keine Überlappung. */
function addHsRadial(atoms, bonds, cIdx, cx, cy, neighborIdxs, count) {
  const occ = neighborIdxs.map(ni => Math.atan2(atoms[ni].y - cy, atoms[ni].x - cx));
  for (let n=0;n<count;n++){
    let bestAng=0,bestMin=-1;
    for(let deg=0;deg<360;deg+=4){
      const a=deg*Math.PI/180;
      let mind=Infinity;
      for(const o of occ){let d=Math.abs(Math.atan2(Math.sin(a-o),Math.cos(a-o)));if(d<mind)mind=d;}
      if(mind>bestMin){bestMin=mind;bestAng=a;}
    }
    atoms.push({e:"H", x:cx+Math.cos(bestAng), y:cy+Math.sin(bestAng), lp:0});
    bonds.push({a:cIdx, b:atoms.length-1, o:1});
    occ.push(bestAng);
  }
}

/* Isobutan: (CH3)3CH — zentrales C mit 3 Methylresten und 1 H */
function isobutaneFull() {
  // Zentrales C bei (0,0). 4 Substituenten tetraedrisch projiziert:
  // 3 CH3 bei 90°/210°/330° (gleichmäßig), 1 H bei der 4. Position (oben).
  const atoms = [], bonds = [];
  atoms.push({e:"C", x:0, y:0, lp:0});                  // 0 zentral
  // H nach oben
  atoms.push({e:"H", x:0, y:-1, lp:0});                 // 1 H oben
  bonds.push({a:0,b:1,o:1});
  // 3 Methyle bei 30°, 150°, 270° (also unten-rechts, unten-links, unten) — gefächert
  const methylAngles = [Math.PI/6, 5*Math.PI/6, 3*Math.PI/2];  // 30°,150°,270°
  for (const ang of methylAngles) {
    const mx = Math.cos(ang), my = Math.sin(ang);
    attachMethylRadial(atoms, bonds, 0, 0, 0, mx, my);
  }
  return {atoms, bonds, name:"2-Methylpropan (Isobutan)", formula:"C₄H₁₀"};
}

      {e:"C", x:SIN60,     y:COS60,  lp:0, hidden:true}, // 1 CH branched
      {e:"C", x:SIN60,     y:COS60+1,lp:0, hidden:true}, // 2 CH3 zweig nach unten
      {e:"C", x:2*SIN60,   y:0,      lp:0, hidden:true}, // 3 CH2

function methylbutaneFull() {
  // 2-Methylbutan: Zickzack-Hauptkette C0-C1-C2-C3, Methyl an C1.
  // Wir nutzen denselben Renderer-tauglichen Ansatz: Kette im Zickzack,
  // Hs radial nach außen gefächert für saubere Trennung.
  const atoms = [], bonds = [];
  // Hauptkette als Zickzack
  const chain = [
    {x:0,        y:0},        // C0 (CH3)
    {x:SIN60,    y:COS60},    // C1 (CH, Verzweigung)
    {x:2*SIN60,  y:0},        // C2 (CH2)
    {x:3*SIN60,  y:COS60}     // C3 (CH3)
  ];
  for (const c of chain) atoms.push({e:"C", x:c.x, y:c.y, lp:0});
  bonds.push({a:0,b:1,o:1},{a:1,b:2,o:1},{a:2,b:3,o:1});
  // Methyl-Verzweigung an C1, nach oben (freie 120°-Richtung)
  const cBr = atoms.length;
  atoms.push({e:"C", x:SIN60, y:COS60-1, lp:0});  // nach oben
  bonds.push({a:1, b:cBr, o:1});

  addHsRadial(atoms, bonds, 0, chain[0].x, chain[0].y, [1], 3);          // C0: 3 Hs
  addHsRadial(atoms, bonds, 1, chain[1].x, chain[1].y, [0,2,cBr], 1);    // C1: 1 H
  addHsRadial(atoms, bonds, 2, chain[2].x, chain[2].y, [1,3], 2);        // C2: 2 Hs
  addHsRadial(atoms, bonds, 3, chain[3].x, chain[3].y, [2], 3);          // C3: 3 Hs
  addHsRadial(atoms, bonds, cBr, atoms[cBr].x, atoms[cBr].y, [1], 3);    // Methyl: 3 Hs
  return {atoms, bonds, name:"2-Methylbutan (Isopentan)", formula:"C₅H₁₂"};
}

/* Neopentan: C(CH3)4 — zentrales C mit 4 Methylresten im Kreuz, Hs radial gefächert */
function neopentaneFull() {
  const atoms = [], bonds = [];
  atoms.push({e:"C", x:0, y:0, lp:0});  // 0 zentral
  // 4 Methyle bei 45°, 135°, 225°, 315° (diagonales Kreuz). Methyl-C etwas weiter
  // außen (1.5) und H-Fächer enger (95°), damit die nach innen zeigenden H-Atome
  // nicht ins Zentrum ragen.
  const angles = [Math.PI/4, 3*Math.PI/4, 5*Math.PI/4, 7*Math.PI/4];
  for (const ang of angles) {
    const mx = Math.cos(ang)*1.5, my = Math.sin(ang)*1.5;
    attachMethylRadial(atoms, bonds, 0, 0, 0, mx, my, 95*Math.PI/180);
  }
  return {atoms, bonds, name:"2,2-Dimethylpropan (Neopentan)", formula:"C₅H₁₂"};
}
function neopentaneSkeletal() {
  return {
    atoms:[
      {e:"C", x:0, y:0, lp:0, hidden:true},
      {e:"C", x:-1, y:0, lp:0, hidden:true},
      {e:"C", x:1, y:0, lp:0, hidden:true},
      {e:"C", x:0, y:-1, lp:0, hidden:true},
      {e:"C", x:0, y:1, lp:0, hidden:true}
    ],
    bonds:[{a:0,b:1,o:1},{a:0,b:2,o:1},{a:0,b:3,o:1},{a:0,b:4,o:1}],
    name:"2,2-Dimethylpropan (Neopentan)", formula:"C₅H₁₂"
  };
}

/* Generisch: wandelt eine reine C-Skelett-Definition in eine volle
   Strukturformel um, indem an jedem C die fehlenden H (4 − Σ Bindungsordnung)
   radial gefächert ergänzt werden. */
function skeletalToFull(skel, name) {
  const atoms = skel.atoms.map(a => ({e:a.e, x:a.x, y:a.y, lp:(a.lp||0)}));
  const bonds = skel.bonds.map(b => ({a:b.a, b:b.b, o:b.o}));
  const nC = atoms.length;
  const order = new Array(nC).fill(0);
  const neighbors = Array.from({length:nC}, () => []);
  for (const b of bonds) {
    order[b.a] += b.o; order[b.b] += b.o;
    neighbors[b.a].push(b.b); neighbors[b.b].push(b.a);
  }
  for (let i=0;i<nC;i++){
    if (atoms[i].e !== "C") continue;
    const nH = 4 - order[i];
    if (nH > 0) addHsRadial(atoms, bonds, i, atoms[i].x, atoms[i].y, neighbors[i], nH);
  }
  return {atoms, bonds, name, formula: skel.formula};
}
