D(101,"Md","Mendelevium","Mendelevium",7,3,1.3,258,"f","Metall","\uD83D\uDCCA","Mendelevium ehrt Dmitri Mendelejew, den Erfinder des Periodensystems. Nur einzelne Atome wurden je erzeugt.","Mendelevium honors Dmitri Mendeleev, creator of the periodic table. Only single atoms have been produced.");
D(102,"No","Nobelium","Nobelium",7,3,1.3,259,"f","Metall","\uD83C\uDFC6","Nobelium ehrt Alfred Nobel, den Erfinder des Dynamits und Stifter der Nobelpreise.","Nobelium honors Alfred Nobel, inventor of dynamite and founder of the Nobel Prizes.");
D(103,"Lr","Lawrencium","Lawrencium",7,3,1.3,262,"f","Metall","\uD83D\uDD2C","Lawrencium ehrt Ernest Lawrence, den Erfinder des Zyklotrons (Teilchenbeschleuniger).","Lawrencium honors Ernest Lawrence, inventor of the cyclotron (particle accelerator).");
D(104,"Rf","Rutherfordium","Rutherfordium",7,4,0,261,"f","Metall","\u269B\uFE0F","Rutherfordium ehrt Ernest Rutherford, der den Atomkern entdeckte. Es existiert nur Sekundenbruchteile.","Rutherfordium honors Ernest Rutherford, discoverer of the atomic nucleus. Exists only for fractions of seconds.");
D(105,"Db","Dubnium","Dubnium",7,5,0,262,"f","Metall","\uD83C\uDFED","Dubnium ist nach Dubna in Russland benannt, wo ein grosses Kernforschungszentrum steht.","Dubnium is named after Dubna, Russia, home to a major nuclear research center.");
D(106,"Sg","Seaborgium","Seaborgium",7,6,0,266,"f","Metall","\uD83D\uDC68\u200D\uD83D\uDD2C","Seaborgium ehrt Glenn Seaborg, der 10 Elemente mitentdeckte. Es wurde zu seinen Lebzeiten benannt.","Seaborgium honors Glenn Seaborg, co-discoverer of 10 elements. Named during his lifetime.");
D(107,"Bh","Bohrium","Bohrium",7,7,0,264,"f","Metall","\u269B\uFE0F","Bohrium ehrt Niels Bohr, der das Atommodell mit Elektronenschalen entwickelte.","Bohrium honors Niels Bohr, who developed the atomic model with electron shells.");
D(108,"Hs","Hassium","Hassium",7,8,0,277,"f","Metall","\uD83C\uDDE9\uD83C\uDDEA","Hassium ist nach Hessen benannt, wo die GSI in Darmstadt viele superschwere Elemente erzeugte.","Hassium is named after Hesse, where GSI Darmstadt created many superheavy elements.");
D(109,"Mt","Meitnerium","Meitnerium",7,9,0,268,"f","Metall","\uD83D\uDC69\u200D\uD83D\uDD2C","Meitnerium ehrt Lise Meitner, die die Kernspaltung erklaerte, aber keinen Nobelpreis erhielt.","Meitnerium honors Lise Meitner, who explained nuclear fission but never received a Nobel Prize.");
D(110,"Ds","Darmstadtium","Darmstadtium",7,10,0,271,"f","Metall","\uD83C\uDFD9\uFE0F","Darmstadtium ist nach Darmstadt benannt. Das dortige Kongresszentrum heisst auch darmstadtium.","Darmstadtium is named after Darmstadt. The convention center there is also called darmstadtium.");
D(111,"Rg","Roentgenium","Roentgenium",7,11,0,272,"f","Metall","\uD83E\uDE7B","Roentgenium ehrt Wilhelm Roentgen, den Entdecker der Roentgenstrahlen und ersten Nobelpreistraeger.","Roentgenium honors Wilhelm Roentgen, discoverer of X-rays and first Nobel Prize winner.");
D(112,"Cn","Copernicium","Copernicium",7,12,0,285,"f","Metall","\uD83C\uDF0D","Copernicium ehrt Nikolaus Kopernikus, der erkannte, dass die Erde um die Sonne kreist.","Copernicium honors Nicolaus Copernicus, who realized Earth orbits the Sun.");
D(113,"Nh","Nihonium","Nihonium",7,13,0,284,"f","Metall","\uD83C\uDDEF\uD83C\uDDF5","Nihonium kommt von Nihon = Japan. Es war das erste in Asien entdeckte und benannte Element.","Nihonium comes from Nihon = Japan. First element discovered and named in Asia.");
D(114,"Fl","Flerovium","Flerovium",7,14,0,289,"f","Metall","\uD83D\uDD2C","Flerovium ehrt das Flerov-Labor in Dubna und koennte auf einer Insel der Stabilitaet liegen.","Flerovium honors the Flerov Lab in Dubna and may lie on an island of stability.");
D(115,"Mc","Moscovium","Moscovium",7,15,0,288,"f","Metall","\uD83C\uDFF0","Moscovium ist nach der Oblast Moskau benannt, wo das Forschungslabor liegt.","Moscovium is named after Moscow Oblast, where the research lab is located.");
D(116,"Lv","Livermorium","Livermorium",7,16,0,293,"f","Metall","\uD83D\uDD2D","Livermorium ist nach dem Lawrence Livermore National Laboratory in Kalifornien benannt.","Livermorium is named after Lawrence Livermore National Laboratory in California.");
D(117,"Ts","Tenness","Tennessine",7,17,0,294,"f","Metall","\uD83C\uDFDB\uFE0F","Tenness ist nach Tennessee benannt, wo das Oak Ridge National Laboratory steht.","Tennessine is named after Tennessee, home of Oak Ridge National Laboratory.");
D(118,"Og","Oganesson","Oganesson",7,18,0,294,"f","Metall","\uD83E\uDDEA","Oganesson ehrt den lebenden Physiker Juri Oganessian. Es ist das schwerste bekannte Element und moeglicherweise ein festes Edelgas. Fun Fact: Oganesson wurde nur 5 mal je erzeugt.","Oganesson honors living physicist Yuri Oganessian. The heaviest known element, possibly a solid noble gas. Fun fact: Only 5 atoms of oganesson have ever been produced.");

/* ========== HELPERS ========== */
function getGrpM(el){return EL.filter(function(e){return e.group===el.group&&e.z!==el.z;});}
function getOuterE(g){if(g<=2)return g;if(g>=13)return g-10;return g-2;}
function mkN(a,b){var r=[];for(var i=a;i<=b;i++)r.push(String(i));return r;}
function elN(el){return lang==='en'?el.nameEn:el.name;}
function elCtx(el){return lang==='en'?el.ctxEn:el.ctxDe;}
function tTy(ty){if(ty==='Metall')return t('tMet');if(ty==='Halbmetall')return t('tHalb');return t('tNmet');}
function isMainGP16(el){return el.period<=6&&(el.group<=2||el.group>=13);}
var PH1T=10;
function ph1Done(){var c=0;for(var z in trained){if(isMainGP16(EL[parseInt(z)-1]))c++;}return c>=PH1T;}
function ph1Count(){var c=0;for(var z in trained){if(isMainGP16(EL[parseInt(z)-1]))c++;}return c;}

/* ========== STATE ========== */
var allNames=[],availNames=[],usedNames=[];
var trained={},curEl=null,sOk=0,sNo=0,curPlayer="",gridQid="",gridVal="",checked=false;

/* ========== PARTICLES ========== */
function initP(){var c=document.getElementById('bgP');var cols=['#4fc3f7','#7c4dff','#00e5ff','#b388ff','#4caf50'];for(var i=0;i<20;i++){var p=document.createElement('div');p.className='particle';var sz=Math.random()*4+2;p.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;background:'+cols[i%5]+';animation-duration:'+(Math.random()*15+10)+'s;animation-delay:'+(Math.random()*10)+'s';c.appendChild(p);}}
initP();

function showScreen(id){var ss=document.querySelectorAll('.screen');for(var i=0;i<ss.length;i++)ss[i].classList.remove('active');document.getElementById(id).classList.add('active');}

/* ========== CSV ========== */
function findVnCol(lines){if(!lines.length)return{col:0,hdr:false,sep:null};var fl=lines[0],sep=null;if(fl.indexOf(';')!==-1)sep=';';else if(fl.indexOf('\t')!==-1)sep='\t';else if(fl.indexOf(',')!==-1&&fl.split(',').length>=2)sep=',';if(!sep)return{col:0,hdr:false,sep:null};var hs=fl.split(sep).map(function(h){return h.trim().toLowerCase().replace(/^["']|["']$/g,'');});for(var i=0;i<hs.length;i++){if(hs[i]==='vorname'||hs[i]==='firstname'||hs[i]==='first name'||hs[i]==='first_name')return{col:i,hdr:true,sep:sep};}if(lines.length>1){var tp=lines[1].split(sep);if(tp.length>=2&&/^\d+$/.test(tp[0].trim()))return{col:1,hdr:true,sep:sep};}return{col:0,hdr:false,sep:sep};}
function extractNames(text){var lines=text.split(/\r?\n/).filter(function(l){return l.trim().length>0;});if(!lines.length)return[];var info=findVnCol(lines);var start=info.hdr?1:0;var res=[];for(var i=start;i<lines.length;i++){var val;if(info.sep){var parts=lines[i].split(info.sep);val=(parts[info.col]||'').trim().replace(/^["']|["']$/g,'');}else{val=lines[i].trim().split(/\s+/)[0].replace(/^["']|["']$/g,'');}if(val&&val.length>0&&!/^\d+$/.test(val))res.push(val);}return res;}
function previewCSV(){var f=document.getElementById('csvFile');if(!f.files.length)return;var reader=new FileReader();reader.onload=function(e){var names=extractNames(e.target.result);var pre=document.getElementById('csvPreview');if(names.length>0){var show=names.slice(0,5).join(', ');if(names.length>5)show+=' ... (+'+(names.length-5)+' '+t('more')+')';pre.textContent=t('recognized')+' '+show;pre.style.color='var(--ok)';}else{pre.textContent=t('noNames');pre.style.color='var(--no)';}};reader.readAsText(f.files[0]);}
function startApp(){var f=document.getElementById('csvFile');if(f.files.length>0){var reader=new FileReader();reader.onload=function(e){allNames=extractNames(e.target.result);availNames=allNames.slice();usedNames=[];if(allNames.length>0)document.getElementById('wheelBtn').style.display='inline-block';showPSE();};reader.readAsText(f.files[0]);}else showPSE();}
function showPSE(){showScreen('pseScreen');if(!document.querySelector('#pseSvgC svg'))renderPSE();updateTrained();updatePhase();var ct=0;for(var k in trained)ct++;document.getElementById('pseStats').innerHTML=t('trained')+': <span>'+ct+'/118</span> '+t('elements');}

function updatePhase(){var p1=ph1Done();var info=document.getElementById('phaseInfo');if(!p1){info.innerHTML=t('phase1')+' <strong>'+(PH1T-ph1Count())+'</strong> '+t('phase1b');}else{info.innerHTML=t('phase2');}for(var i=0;i<EL.length;i++){var cell=document.getElementById('el-'+EL[i].z);if(cell){if(!p1&&!isMainGP16(EL[i]))cell.classList.add('locked-el');else cell.classList.remove('locked-el');}}}

/* ========== WHEEL ========== */
var wA=0,wS=false;
function showWheel(){if(availNames.length===0){availNames=allNames.slice();usedNames=[];}document.getElementById('wheelOverlay').classList.add('show');updateUsedD();drawWheel();}
function closeWheel(){document.getElementById('wheelOverlay').classList.remove('show');}
function updateUsedD(){var h='';if(usedNames.length>0){h=t('alreadyPicked')+' ';for(var i=0;i<usedNames.length;i++)h+='<s>'+usedNames[i]+'</s> ';}h+='<br>'+t('remaining')+' <span style="color:var(--ok)">'+availNames.length+'</span>';document.getElementById('usedNamesD').innerHTML=h;}
function drawWheel(){var cv=document.getElementById('wheelCanvas'),ctx=cv.getContext('2d'),cx=140,cy=140,r=130,n=availNames.length;if(!n)return;ctx.clearRect(0,0,280,280);var cols=['#4fc3f7','#7c4dff','#66bb6a','#ef5350','#ffca28','#ff7043','#ab47bc','#26a69a','#ec407a','#5c6bc0'];for(var i=0;i<n;i++){var s=(2*Math.PI/n)*i+wA,e=(2*Math.PI/n)*(i+1)+wA;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,s,e);ctx.fillStyle=cols[i%cols.length];ctx.fill();ctx.strokeStyle='#0a0d14';ctx.lineWidth=2;ctx.stroke();ctx.save();ctx.translate(cx,cy);ctx.rotate((s+e)/2);ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font='bold 11px Outfit';ctx.fillText(availNames[i].length>10?availNames[i].slice(0,9)+'..':availNames[i],r-10,4);ctx.restore();}}
function spinWheel(){if(wS||!availNames.length)return;wS=true;document.getElementById('wheelResult').textContent='';var tot=Math.PI*(8+Math.random()*8),dur=3000,t0=performance.now(),a0=wA;function go(now){var p=Math.min((now-t0)/dur,1);wA=a0+tot*(1-Math.pow(1-p,3));drawWheel();if(p<1)requestAnimationFrame(go);else{wS=false;var n=availNames.length;var na=(((-wA-Math.PI/2)%(2*Math.PI))+(2*Math.PI))%(2*Math.PI);var idx=Math.floor(na/(2*Math.PI/n))%n;curPlayer=availNames[idx];usedNames.push(curPlayer);availNames.splice(idx,1);document.getElementById('wheelResult').textContent=curPlayer+' '+t('isTurn');document.getElementById('nameResult').textContent=curPlayer;document.getElementById('currentPlayer').textContent=curPlayer;updateUsedD();if(availNames.length>0)drawWheel();}}requestAnimationFrame(go);}

/* ========== PSE RENDER (with EN, mass, legend) ========== */
function renderPSE(){
  var c=document.getElementById('pseSvgC');
  var W=58,H=62,g=2,tW=18*(W+g)+30,tH=10*(H+g)+100;
  function gp(el){var r=el.period-1,co=el.group-1;if(el.z>=57&&el.z<=71){r=8;co=el.z-57+2;}if(el.z>=89&&el.z<=103){r=9;co=el.z-89+2;}return{x:15+co*(W+g),y:30+r*(H+g)};}
  function gc(el){return el.type==='Metall'?'#2c4a72':el.type==='Halbmetall'?'#6d5a2e':'#2e6e46';}
  var s='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+tW+' '+tH+'" style="width:100%;height:auto;">';
  s+='<defs><filter id="glo"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>';

  /* === CENTERED LEGEND over transition metals (columns 3-12, row ~2) === */
  var legendY=22;
  var legendCX=15+9*(W+g);/* center of columns 3-12 */
  s+='<rect x="'+(legendCX-110)+'" y="'+(legendY-10)+'" width="220" height="22" rx="6" fill="#141824" stroke="#2a3050" stroke-width="1"/>';
  s+='<rect x="'+(legendCX-100)+'" y="'+(legendY-3)+'" width="12" height="12" rx="3" fill="#2c4a72"/>';
  s+='<text x="'+(legendCX-85)+'" y="'+(legendY+7)+'" fill="#e8eaf0" font-family="Outfit,sans-serif" font-size="7.5" font-weight="600">'+t('tMet')+'</text>';
  s+='<rect x="'+(legendCX-30)+'" y="'+(legendY-3)+'" width="12" height="12" rx="3" fill="#6d5a2e"/>';
  s+='<text x="'+(legendCX-15)+'" y="'+(legendY+7)+'" fill="#e8eaf0" font-family="Outfit,sans-serif" font-size="7.5" font-weight="600">'+t('tHalb')+'</text>';
  s+='<rect x="'+(legendCX+50)+'" y="'+(legendY-3)+'" width="12" height="12" rx="3" fill="#2e6e46"/>';
  s+='<text x="'+(legendCX+65)+'" y="'+(legendY+7)+'" fill="#e8eaf0" font-family="Outfit,sans-serif" font-size="7.5" font-weight="600">'+t('tNmet')+'</text>';

  /* === EXAMPLE ELEMENT LEGEND (next to color legend) === */
  var exX=legendCX+130,exY=legendY-12;
  var exW=50,exH=52;
  s+='<rect x="'+exX+'" y="'+exY+'" width="'+exW+'" height="'+exH+'" rx="5" fill="#2c4a72" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="2,2"/>';
  s+='<text x="'+(exX+4)+'" y="'+(exY+9)+'" fill="#ffffffaa" font-family="JetBrains Mono,monospace" font-size="5">OZ</text>';
  s+='<text x="'+(exX+exW-4)+'" y="'+(exY+9)+'" text-anchor="end" fill="#ffffffaa" font-family="JetBrains Mono,monospace" font-size="5">Masse</text>';
  s+='<text x="'+(exX+exW/2)+'" y="'+(exY+28)+'" text-anchor="middle" fill="#fff" font-family="Outfit,sans-serif" font-size="14" font-weight="900">Sym</text>';
  s+='<text x="'+(exX+exW/2)+'" y="'+(exY+38)+'" text-anchor="middle" font-size="7">&#9883;</text>';
  s+='<text x="'+(exX+exW/2)+'" y="'+(exY+48)+'" text-anchor="middle" fill="#ffffffaa" font-family="JetBrains Mono,monospace" font-size="4.5">EN</text>';
  /* Labels */
  s+='<line x1="'+(exX-1)+'" y1="'+(exY+6)+'" x2="'+(exX-8)+'" y2="'+(exY+2)+'" stroke="#4fc3f7" stroke-width=".5"/>';
  s+='<line x1="'+(exX+exW+1)+'" y1="'+(exY+6)+'" x2="'+(exX+exW+8)+'" y2="'+(exY+2)+'" stroke="#4fc3f7" stroke-width=".5"/>';
  s+='<line x1="'+(exX+exW/2)+'" y1="'+(exY+exH+1)+'" x2="'+(exX+exW/2)+'" y2="'+(exY+exH+6)+'" stroke="#4fc3f7" stroke-width=".5"/>';

  /* Connectors */
  s+='<line x1="'+(15+2*(W+g))+'" y1="'+(30+5*(H+g)+H)+'" x2="'+(15+2*(W+g))+'" y2="'+(30+8*(H+g))+'" stroke="#2a3050" stroke-width="1" stroke-dasharray="3,2"/>';
  s+='<line x1="'+(15+2*(W+g))+'" y1="'+(30+6*(H+g)+H)+'" x2="'+(15+2*(W+g))+'" y2="'+(30+9*(H+g))+'" stroke="#2a3050" stroke-width="1" stroke-dasharray="3,2"/>';

  /* Elements */
  for(var i=0;i<EL.length;i++){
    var el=EL[i],p=gp(el),f=gc(el);
    var sn=el.name.length>8?el.name.slice(0,7)+'.':el.name;
    var massStr=el.mass>=100?Math.round(el.mass).toString():el.mass.toFixed(1);
    s+='<g class="el-cell" id="el-'+el.z+'" onclick="selEl('+el.z+')">';
    s+='<rect class="el-bg" x="'+p.x+'" y="'+p.y+'" width="'+W+'" height="'+H+'" rx="5" fill="'+f+'" stroke="#0a0d14" stroke-width="1"/>';
    s+='<text x="'+(p.x+4)+'" y="'+(p.y+10)+'" fill="#ffffff88" font-family="JetBrains Mono,monospace" font-size="5">'+el.z+'</text>';
    s+='<text x="'+(p.x+W-4)+'" y="'+(p.y+10)+'" text-anchor="end" fill="#ffffff55" font-family="JetBrains Mono,monospace" font-size="4.5">'+massStr+'</text>';
    s+='<text x="'+(p.x+W/2)+'" y="'+(p.y+28)+'" text-anchor="middle" fill="#fff" font-family="Outfit,sans-serif" font-size="15" font-weight="900">'+el.sym+'</text>';
    s+='<text x="'+(p.x+W/2)+'" y="'+(p.y+40)+'" text-anchor="middle" font-size="9">'+el.emoji+'</text>';
    s+='<text x="'+(p.x+W/2)+'" y="'+(p.y+50)+'" text-anchor="middle" fill="#ffffffbb" font-family="Outfit,sans-serif" font-size="4">'+sn+'</text>';
    if(el.en>0)s+='<text x="'+(p.x+W/2)+'" y="'+(p.y+58)+'" text-anchor="middle" fill="#ffffff44" font-family="JetBrains Mono,monospace" font-size="4">'+el.en.toFixed(1)+'</text>';
    s+='<text class="trm" x="'+(p.x+W-9)+'" y="'+(p.y+11)+'" fill="#4caf50" font-size="8" font-weight="900" filter="url(#glo)">&#10003;</text>';
    s+='</g>';
  }
  s+='</svg>';c.innerHTML=s;
}
function updateTrained(){for(var z in trained){var c=document.getElementById('el-'+z);if(c)c.classList.add('trained');}}

/* ========== ELEMENT SELECTION (elegant shuffle) ========== */
var shT=null,shFrame=0;
function selEl(z){
  curEl=EL[z-1];
  var cells=document.querySelectorAll('.el-cell');for(var i=0;i<cells.length;i++)cells[i].classList.remove('selected');
  var cell=document.getElementById('el-'+z);if(cell){cell.classList.add('selected');cell.classList.add('flash');setTimeout(function(){cell.classList.remove('flash');},400);}
  showQuiz();
}
function shuffleElement(){
  var pool=[];var p1=ph1Done();
  for(var i=0;i<EL.length;i++){if(p1||isMainGP16(EL[i]))pool.push(EL[i].z);}
  var info=document.getElementById('shuffleInfo');
  var totalFrames=40,frame=0,fz;
  if(shT){cancelAnimationFrame(shT);shT=null;}
  function step(){
    fz=pool[Math.floor(Math.random()*pool.length)];
    // Flash the current element
    var cells=document.querySelectorAll('.el-cell');for(var j=0;j<cells.length;j++)cells[j].classList.remove('flash','selected');
    var cell=document.getElementById('el-'+fz);if(cell)cell.classList.add('flash');
    // Show only symbol, not full name
    info.textContent=EL[fz-1].emoji+' '+EL[fz-1].sym;
    frame++;
    // Ease out: increasing delay towards end
    var delay=40+Math.pow(frame/totalFrames,3)*400;
    if(frame<totalFrames){
      shT=setTimeout(function(){requestAnimationFrame(step);},delay);
    }else{
      shT=null;selEl(fz);
    }
  }
  requestAnimationFrame(step);
}

/* ========== GRID PICKER ========== */
function openGrid(qid,title,from,to){gridQid=qid;gridVal="";document.getElementById('gridTitle').textContent=title;document.getElementById('gridFrom').value=from;document.getElementById('gridTo').value=to;document.getElementById('gridHint').innerHTML=qid==='mass'?t('gridMassHint'):t('gridENHint');document.getElementById('gridOverlay').classList.add('show');renderGrid();}
function renderGrid(){var from=parseFloat(document.getElementById('gridFrom').value)||1;var to=parseFloat(document.getElementById('gridTo').value)||294;var step=(to-from>50)?1.0:0.1;var c=document.getElementById('gridCells');c.innerHTML='';for(var v=from;v<=to+0.001;v+=step){var val=v.toFixed(step>=1?0:1);var d=document.createElement('div');d.className='grid-cell';if(val===gridVal)d.className+=' picked';d.textContent=val;(function(value,elem){elem.onclick=function(){var old=c.querySelector('.picked');if(old)old.classList.remove('picked');elem.classList.add('picked');gridVal=value;};})(val,d);c.appendChild(d);}}
function closeGrid(){document.getElementById('gridOverlay').classList.remove('show');}
function confirmGrid(){if(gridVal&&gridQid){var btn=document.querySelector('.grid-picker-btn[data-qid="'+gridQid+'"]');if(btn){btn.textContent=gridVal;btn.setAttribute('data-value',gridVal);btn.classList.add('has-value');}}closeGrid();}

/* ========== SPOILER ========== */
function toggleSpoiler(){var c=document.getElementById('spoilerContent');var b=document.getElementById('spoilerBtn');c.classList.toggle('show');b.textContent=c.classList.contains('show')?t('spoilerHide'):t('spoilerShow');}

/* ========== QUIZ ========== */
function showQuiz(){
  showScreen('quizScreen');checked=false;
  document.getElementById('retryBtn').style.display='none';document.getElementById('checkBtn').style.display='';
  var el=curEl;if(!el)return;
  document.getElementById('quizEmoji').textContent=el.emoji;
  document.getElementById('quizTitle').textContent='Element #'+el.z+' - '+el.sym;
  document.getElementById('spoilerBtn').textContent=t('spoilerShow');
  document.getElementById('spoilerContent').textContent=elCtx(el);
  document.getElementById('spoilerContent').classList.remove('show');
  document.getElementById('scoreOk').textContent=sOk;document.getElementById('scoreNo').textContent=sNo;

  /* Element card (right side) - no labels, just raw values to be recognized */
  var card=document.getElementById('elCard');
  var cardClass=el.type==='Metall'?'el-card-met':el.type==='Halbmetall'?'el-card-halb':'el-card-nmet';
  card.className='el-card '+cardClass;
  card.innerHTML='<div class="ec-z">'+el.z+'</div><div class="ec-mass">'+el.mass.toFixed(1)+'</div><div class="ec-sym">'+el.sym+'</div><div class="ec-emoji">'+el.emoji+'</div>'+(el.en>0?'<div class="ec-en">'+el.en.toFixed(1)+'</div>':'')+'<div class="ec-bar"></div>';

  var outerE=getOuterE(el.group);
  var stMap={f:t('stF'),l:t('stL'),g:t('stG')};
  var QS=[
    {id:'name',lb:t('qName'),tp:'text',correct:elN(el)},
    {id:'oz',lb:t('qOZ'),tp:'select',vals:mkN(1,118),correct:String(el.z)},
    {id:'ecount',lb:t('qElec'),tp:'select',vals:mkN(1,118),correct:String(el.z)},
    {id:'period',lb:t('qPeriod'),tp:'select',vals:['1','2','3','4','5','6','7'],correct:String(el.period)},
    {id:'shell',lb:t('qShell'),tp:'select',vals:['1','2','3','4','5','6','7'],correct:String(el.period)},
    {id:'outer',lb:t('qOuter'),tp:'select',vals:mkN(1,18),correct:String(outerE)},
    {id:'related',lb:t('qRelated'),tp:'text',correct:getGrpM(el).map(function(e){return elN(e).toLowerCase();})},
    {id:'en',lb:t('qEN'),tp:'grid',from:0.7,to:4.0,correct:el.en.toFixed(1)},
    {id:'mass',lb:t('qMass'),tp:'grid',from:1.0,to:294.0,correct:el.mass.toFixed(1)},
    {id:'state',lb:t('qState'),tp:'select',vals:[t('stF'),t('stL'),t('stG')],correct:stMap[el.state]},
    {id:'type',lb:t('qType'),tp:'select',vals:[t('tMet'),t('tHalb'),t('tNmet')],correct:tTy(el.type)}
  ];
  var cont=document.getElementById('quizRows');cont.innerHTML='';
  for(var q=0;q<QS.length;q++){
    var Q=QS[q],row=document.createElement('div');row.className='quiz-row';
    row.setAttribute('data-id',Q.id);row.setAttribute('data-correct',Array.isArray(Q.correct)?JSON.stringify(Q.correct):Q.correct);row.setAttribute('data-tp',Q.tp);
    var inp='';
    if(Q.tp==='text')inp='<input type="text" class="text-input" placeholder="'+t('enter')+'" data-qid="'+Q.id+'">';
    else if(Q.tp==='grid'){row.setAttribute('data-from',Q.from);row.setAttribute('data-to',Q.to);inp='<button class="grid-picker-btn" data-qid="'+Q.id+'" data-value="" onclick="openGrid(\''+Q.id+'\',\''+Q.lb+'\','+Q.from+','+Q.to+')">'+t('choose')+'</button>';}
    else{inp='<select class="sel-picker" data-qid="'+Q.id+'"><option value="">'+t('choose')+'</option>';for(var v=0;v<Q.vals.length;v++)inp+='<option value="'+Q.vals[v]+'">'+Q.vals[v]+'</option>';inp+='</select>';}
    row.innerHTML='<div class="quiz-label">'+Q.lb+'</div><div class="quiz-input-area">'+inp+'<div class="quiz-feedback" data-fb="'+Q.id+'"></div></div>';
    cont.appendChild(row);
  }
}

function gv(qid){var sel=document.querySelector('select[data-qid="'+qid+'"]');if(sel)return sel.value;var txt=document.querySelector('.text-input[data-qid="'+qid+'"]');if(txt)return txt.value.trim();var btn=document.querySelector('.grid-picker-btn[data-qid="'+qid+'"]');if(btn)return(btn.getAttribute('data-value')||'').trim();return '';}

function getH(qid,el){var k={name:'hName',oz:'hOZ',ecount:'hElec',period:'hPeriod',shell:'hShell',outer:'hOuter',related:'hRelated',en:'hEN',mass:'hMass',state:'hState',type:'hType'};var s=t(k[qid])||'';return s.replace('SYM',el.sym).replace('PER',el.period).replace('GRP',el.group).replace('Z',el.z).replace('ROUND',Math.round(el.mass));}

function checkAnswers(){
  var rows=document.querySelectorAll('.quiz-row'),allOk=true,el=curEl;
  for(var r=0;r<rows.length;r++){
    var row=rows[r];if(row.classList.contains('correct'))continue;
    var id=row.getAttribute('data-id'),cR=row.getAttribute('data-correct'),uV=gv(id);
    var fb=document.querySelector('[data-fb="'+id+'"]'),ok=false;
    if(!uV||uV==='')ok=false;
    else if(id==='name')ok=uV.toLowerCase()===cR.toLowerCase();
    else if(id==='related'){try{ok=JSON.parse(cR).indexOf(uV.toLowerCase())!==-1;}catch(e){ok=false;}}
    else if(id==='mass'){var uN=parseFloat(uV),cN=parseFloat(cR);ok=!isNaN(uN)&&!isNaN(cN)&&Math.abs(uN-cN)<0.55;}
    else if(id==='en'){var uE=parseFloat(uV),cE=parseFloat(cR);ok=!isNaN(uE)&&!isNaN(cE)&&Math.abs(uE-cE)<0.15;}
    else ok=uV===cR;
    row.classList.remove('correct','wrong','locked');
    if(ok){row.classList.add('correct','locked');fb.innerHTML='<span style="color:var(--ok)">&#10003; '+t('correct')+'</span>';var sel=row.querySelector('select');if(sel)sel.disabled=true;var inp=row.querySelector('input');if(inp)inp.disabled=true;var btn=row.querySelector('.grid-picker-btn');if(btn){btn.style.pointerEvents='none';btn.style.opacity='.6';}}
    else{row.classList.add('wrong');allOk=false;var h=getH(id,el);if(!uV||uV==='')fb.innerHTML='<span style="color:var(--no)">&#9888; '+t('notyet')+'</span><div class="hint-text">'+h+'</div>';else fb.innerHTML='<span style="color:var(--no)">&#10007; '+t('correctIs')+' '+cR+'</span><div class="hint-text">'+h+'</div>';}
  }
  if(!checked){if(allOk)sOk++;else sNo++;checked=true;}
  document.getElementById('scoreOk').textContent=sOk;document.getElementById('scoreNo').textContent=sNo;
  trained[el.z]=true;
  document.getElementById('retryBtn').style.display=allOk?'none':'';
  if(allOk)document.getElementById('checkBtn').style.display='none';
  updateTrained();updatePhase();
}
function retryWrong(){var rows=document.querySelectorAll('.quiz-row.wrong');for(var i=0;i<rows.length;i++){rows[i].classList.remove('wrong');var id=rows[i].getAttribute('data-id');var fb=document.querySelector('[data-fb="'+id+'"]');if(fb)fb.innerHTML='';}document.getElementById('retryBtn').style.display='none';}

applyLang();
