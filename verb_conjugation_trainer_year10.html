<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Verb Conjugation Trainer — Year 10</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--card:#161b22;--card2:#0f1520;--accent:#58a6ff;--accent2:#1f3a5f;--green:#3fb950;--gold:#e3b341;--pink:#f778ba;--blue:#79c0ff;--purple:#d2a8ff;--orange:#ffa657;--text:#e6edf3;--dim:#7d8590;--radius:16px}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:40px}
.app{max-width:840px;margin:0 auto;padding:16px}
h1{font-family:'Fredoka',sans-serif;text-align:center;font-size:2rem;margin:16px 0;background:linear-gradient(135deg,var(--accent),var(--blue),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.csv-area{text-align:center;margin:10px 0 6px}.csv-row{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}.csv-label{font-size:.85rem;color:var(--dim)}.csv-btn{padding:8px 20px;border-radius:10px;border:1px dashed var(--blue);background:rgba(121,192,255,.08);color:var(--blue);cursor:pointer;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:600;transition:all .2s}.csv-btn:hover{background:rgba(121,192,255,.18);border-style:solid}.csv-info{font-size:.8rem;color:var(--green);margin-top:4px}.csv-names-list{font-size:.75rem;color:var(--dim);margin-top:2px;max-width:600px;display:inline-block}.csv-clear{font-size:.75rem;color:var(--pink);cursor:pointer;text-decoration:underline;margin-left:8px}
.stats-bar{display:flex;justify-content:center;gap:10px;margin:12px 0;flex-wrap:wrap}.stat{background:var(--card);padding:8px 14px;border-radius:30px;font-size:.85rem;display:flex;align-items:center;gap:6px;border:1px solid #ffffff10}.stat-bonus{background:linear-gradient(135deg,rgba(227,179,65,.18),rgba(255,166,87,.12));border-color:var(--gold)!important;color:var(--gold)}.streak-fire{animation:pulse .6s infinite alternate}@keyframes pulse{0%{transform:scale(1)}100%{transform:scale(1.2)}}
.verb-display{text-align:center;margin:16px 0;padding:20px;background:linear-gradient(135deg,var(--card),var(--card2));border-radius:var(--radius);border:2px solid var(--accent2);position:relative;overflow:hidden}.verb-display::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(transparent,rgba(88,166,255,.08),transparent,rgba(247,120,186,.08),transparent);animation:rotateBg 10s linear infinite}@keyframes rotateBg{to{transform:rotate(360deg)}}.verb-display *{position:relative;z-index:1}.verb-name{font-family:'Fredoka',sans-serif;font-size:2.2rem;font-weight:700;color:var(--gold)}.verb-tip-btn{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:8px 18px;border-radius:10px;border:1px dashed var(--blue);background:rgba(121,192,255,.08);color:var(--blue);cursor:pointer;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:600;transition:all .25s;user-select:none}.verb-tip-btn:hover{background:rgba(121,192,255,.18);border-style:solid}.verb-tip-reveal{margin-top:8px;padding:10px 18px;border-radius:10px;background:rgba(121,192,255,.1);border:1px solid rgba(121,192,255,.25);color:var(--gold);font-family:'Fredoka',sans-serif;font-size:1rem;font-weight:600;animation:popIn .3s ease}
.section{margin:14px 0}.section-title{font-family:'Fredoka',sans-serif;font-size:1.05rem;color:var(--orange);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.spinner-container{display:flex;align-items:center;gap:14px;flex-wrap:wrap}.spin-btn{padding:12px 28px;border-radius:14px;border:2px solid var(--accent);background:var(--card);color:var(--accent);cursor:pointer;font-family:'Fredoka',sans-serif;font-size:1rem;font-weight:600;transition:all .25s;user-select:none;white-space:nowrap;animation:glowPulse 1.5s ease-in-out infinite;flex-shrink:0}.spin-btn:hover{background:var(--accent);color:#000;transform:scale(1.06);box-shadow:0 4px 20px rgba(88,166,255,.4)}@keyframes glowPulse{0%,100%{box-shadow:0 0 8px rgba(88,166,255,.2)}50%{box-shadow:0 0 20px rgba(88,166,255,.5)}}.spin-btn.disabled{opacity:.35;pointer-events:none;animation:none}
.wheel-window{width:280px;height:54px;border-radius:14px;border:2px solid var(--accent2);background:var(--card);overflow:hidden;position:relative;flex-shrink:0}.wheel-window::before,.wheel-window::after{content:'';position:absolute;left:0;right:0;height:16px;z-index:2;pointer-events:none}.wheel-window::before{top:0;background:linear-gradient(to bottom,var(--card) 30%,transparent)}.wheel-window::after{bottom:0;background:linear-gradient(to top,var(--card) 30%,transparent)}.wheel-pointer{position:absolute;right:-2px;top:50%;transform:translateY(-50%);width:0;height:0;border-top:10px solid transparent;border-bottom:10px solid transparent;border-right:14px solid var(--accent);z-index:3;filter:drop-shadow(-2px 0 4px rgba(88,166,255,.5))}.wheel-track{position:absolute;left:0;right:0;top:0}.wheel-item{height:54px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-size:1.05rem;font-weight:600;color:var(--text);white-space:nowrap;padding:0 12px}
.done-badge{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:14px;background:linear-gradient(135deg,rgba(88,166,255,.12),rgba(121,192,255,.06));border:2px solid var(--accent);color:var(--gold);font-family:'Fredoka',sans-serif;font-size:1.05rem;font-weight:600;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}.waiting-badge{color:var(--dim);font-size:.9rem;font-style:italic;padding:8px 0}
.summary-box{background:var(--card);border-radius:var(--radius);padding:18px;margin:16px 0;border:2px solid var(--accent2);text-align:center;font-size:1rem;line-height:1.8}.summary-box .label{color:var(--dim);font-size:.8rem;text-transform:uppercase;letter-spacing:1px}.summary-box .value{color:var(--gold);font-weight:700;font-size:1.1rem}.bonus-indicator{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;background:linear-gradient(135deg,rgba(227,179,65,.2),rgba(255,166,87,.15));border:1px solid var(--gold);color:var(--gold);font-size:.8rem;font-weight:700;font-family:'Fredoka',sans-serif;margin-top:8px}
.input-area{margin:10px 0}.input-area input{width:100%;padding:16px 20px;border-radius:var(--radius);border:2px solid var(--accent2);background:var(--card);color:var(--text);font-family:'Nunito',sans-serif;font-size:1.1rem;outline:none;transition:border-color .3s}.input-area input:focus{border-color:var(--accent)}.input-area input::placeholder{color:var(--dim)}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:12px 0}.action-btn{padding:14px 32px;border-radius:14px;border:none;font-family:'Fredoka',sans-serif;font-size:1.1rem;font-weight:600;cursor:pointer;transition:all .25s}.btn-check{background:linear-gradient(135deg,var(--green),#56d364);color:#000}.btn-check:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(63,185,80,.4)}.btn-skip{background:var(--card);color:var(--dim);border:2px solid #ffffff15}.btn-skip:hover{border-color:var(--accent);color:var(--text)}.btn-next{background:linear-gradient(135deg,var(--blue),var(--purple));color:#000}.btn-next:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(121,192,255,.4)}
.feedback{margin:12px 0;padding:16px;border-radius:var(--radius);font-size:1rem;text-align:center;animation:slideIn .3s ease}@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}.feedback.correct{background:linear-gradient(135deg,rgba(63,185,80,.15),rgba(86,211,100,.1));border:2px solid var(--green);color:var(--green)}.feedback.wrong{background:linear-gradient(135deg,rgba(247,120,186,.15),rgba(247,120,186,.1));border:2px solid var(--pink);color:var(--pink)}.feedback.reveal{background:linear-gradient(135deg,rgba(227,179,65,.12),rgba(255,166,87,.08));border:2px solid var(--gold);color:var(--gold)}
.hint{color:var(--dim);font-size:.85rem;text-align:center;margin:8px 0}.progress-ring{display:flex;justify-content:center;margin:10px 0}.step-dots{display:flex;gap:6px;align-items:center}.step-dot{width:12px;height:12px;border-radius:50%;background:#ffffff15;transition:all .3s}.step-dot.active{background:var(--accent);transform:scale(1.3);box-shadow:0 0 10px var(--accent)}.step-dot.done{background:var(--green)}
.formula-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border-radius:12px;border:1px dashed var(--purple);background:rgba(210,168,255,.08);color:var(--purple);cursor:pointer;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:600;transition:all .25s;user-select:none;margin-top:6px}.formula-btn:hover{background:rgba(210,168,255,.18);border-style:solid}.formula-box{margin:10px 0;padding:16px 20px;border-radius:var(--radius);background:linear-gradient(135deg,rgba(210,168,255,.06),rgba(121,192,255,.04));border:1px solid rgba(210,168,255,.2);animation:slideIn .3s ease}.formula-title{font-family:'Fredoka',sans-serif;font-size:.9rem;color:var(--purple);margin-bottom:10px;display:flex;align-items:center;gap:6px}.formula-rule{font-family:'Fredoka',sans-serif;font-size:.95rem;line-height:2;padding:10px 14px;background:rgba(0,0,0,.15);border-radius:10px;margin-bottom:10px;display:flex;flex-wrap:wrap;align-items:center;gap:4px}.formula-example{font-size:.9rem;line-height:2;padding:10px 14px;background:rgba(0,0,0,.1);border-radius:10px;display:flex;flex-wrap:wrap;align-items:center;gap:4px}.formula-example-label{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}.fp{padding:3px 10px;border-radius:6px;font-weight:700;font-size:.9rem;white-space:nowrap}.fp-subj{background:rgba(121,192,255,.2);color:var(--blue)}.fp-aux{background:rgba(227,179,65,.2);color:var(--gold)}.fp-not{background:rgba(247,120,186,.2);color:var(--pink)}.fp-verb{background:rgba(63,185,80,.2);color:var(--green)}.fp-wh{background:rgba(210,168,255,.2);color:var(--purple)}.fp-plain{color:var(--dim);font-size:.85rem;font-weight:400}.fp-plus{color:var(--dim);font-size:.75rem}.formula-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}.legend-item{display:flex;align-items:center;gap:4px;font-size:.7rem;color:var(--dim)}.legend-dot{width:10px;height:10px;border-radius:3px}
.tracker{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:4px 0}.tracker-pill{font-size:.65rem;padding:2px 8px;border-radius:8px;background:#ffffff08;color:var(--dim);border:1px solid #ffffff08}.tracker-pill.used{opacity:.3;text-decoration:line-through}.tracker-pill.current{background:rgba(88,166,255,.2);border-color:var(--accent);color:var(--gold);opacity:1;text-decoration:none}
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}.confetti span{position:absolute;width:10px;height:10px;border-radius:50%;animation:cfall linear forwards;opacity:0}@keyframes cfall{0%{opacity:1;transform:translateY(-10vh) rotate(0)}100%{opacity:0;transform:translateY(110vh) rotate(720deg)}}.footer{position:fixed;bottom:8px;left:16px;font-size:.7rem;color:#ffffff20;font-family:'Nunito',sans-serif;letter-spacing:.5px}
@media(max-width:600px){h1{font-size:1.5rem}.verb-name{font-size:1.6rem}.wheel-window{width:200px;height:48px}.wheel-item{height:48px;font-size:.9rem}.spin-btn{padding:10px 20px;font-size:.9rem}.done-badge{font-size:.9rem;padding:8px 14px}.action-btn{padding:12px 24px;font-size:1rem}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="footer">Poremski</div>
<input type="file" id="csv-file-input" accept=".csv,.txt" style="display:none" onchange="handleCSV(event)">
<script>
const IRREGULAR_VERBS=[
  {base:"be",past:"was/were",pp:"been",s3:"is"},{base:"beat",past:"beat",pp:"beaten"},{base:"become",past:"became",pp:"become"},
  {base:"begin",past:"began",pp:"begun"},{base:"bend",past:"bent",pp:"bent"},{base:"blow",past:"blew",pp:"blown"},
  {base:"break",past:"broke",pp:"broken"},{base:"bring",past:"brought",pp:"brought"},{base:"build",past:"built",pp:"built"},
  {base:"buy",past:"bought",pp:"bought"},{base:"catch",past:"caught",pp:"caught"},{base:"choose",past:"chose",pp:"chosen"},
  {base:"come",past:"came",pp:"come"},{base:"cost",past:"cost",pp:"cost"},{base:"cut",past:"cut",pp:"cut"},
  {base:"deal",past:"dealt",pp:"dealt"},{base:"do",past:"did",pp:"done",s3:"does"},{base:"draw",past:"drew",pp:"drawn"},
  {base:"drive",past:"drove",pp:"driven"},{base:"drink",past:"drank",pp:"drunk"},{base:"eat",past:"ate",pp:"eaten"},
  {base:"fall",past:"fell",pp:"fallen"},{base:"feed",past:"fed",pp:"fed"},{base:"feel",past:"felt",pp:"felt"},
  {base:"fight",past:"fought",pp:"fought"},{base:"find",past:"found",pp:"found"},{base:"fly",past:"flew",pp:"flown",s3:"flies"},
  {base:"forget",past:"forgot",pp:"forgotten"},{base:"get",past:"got",pp:"got"},{base:"give",past:"gave",pp:"given"},
  {base:"go",past:"went",pp:"gone",s3:"goes"},{base:"hang",past:"hung",pp:"hung"},{base:"have",past:"had",pp:"had",s3:"has"},
  {base:"hear",past:"heard",pp:"heard"},{base:"hide",past:"hid",pp:"hidden"},{base:"hit",past:"hit",pp:"hit"},
  {base:"hold",past:"held",pp:"held"},{base:"hurt",past:"hurt",pp:"hurt"},{base:"keep",past:"kept",pp:"kept"},
  {base:"know",past:"knew",pp:"known"},{base:"lay",past:"laid",pp:"laid"},{base:"leave",past:"left",pp:"left"},
  {base:"lend",past:"lent",pp:"lent"},{base:"let",past:"let",pp:"let"},{base:"lie",past:"lay",pp:"lain"},
  {base:"light",past:"lit",pp:"lit"},{base:"lose",past:"lost",pp:"lost"},{base:"make",past:"made",pp:"made"},
  {base:"mean",past:"meant",pp:"meant"},{base:"meet",past:"met",pp:"met"},{base:"pay",past:"paid",pp:"paid"},
  {base:"put",past:"put",pp:"put"},{base:"read",past:"read",pp:"read"},{base:"ride",past:"rode",pp:"ridden"},
  {base:"rise",past:"rose",pp:"risen"},{base:"ring",past:"rang",pp:"rung"},{base:"run",past:"ran",pp:"run"},
  {base:"say",past:"said",pp:"said",s3:"says"},{base:"see",past:"saw",pp:"seen"},{base:"sell",past:"sold",pp:"sold"},
  {base:"send",past:"sent",pp:"sent"},{base:"set",past:"set",pp:"set"},{base:"shake",past:"shook",pp:"shaken"},
  {base:"shoot",past:"shot",pp:"shot"},{base:"show",past:"showed",pp:"shown"},{base:"sing",past:"sang",pp:"sung"},
  {base:"sit",past:"sat",pp:"sat"},{base:"sleep",past:"slept",pp:"slept"},{base:"speak",past:"spoke",pp:"spoken"},
  {base:"spread",past:"spread",pp:"spread"},{base:"spend",past:"spent",pp:"spent"},{base:"stand",past:"stood",pp:"stood"},
  {base:"swim",past:"swam",pp:"swum"},{base:"swing",past:"swung",pp:"swung"},{base:"take",past:"took",pp:"taken"},
  {base:"teach",past:"taught",pp:"taught"},{base:"tear",past:"tore",pp:"torn"},{base:"tell",past:"told",pp:"told"},
  {base:"think",past:"thought",pp:"thought"},{base:"throw",past:"threw",pp:"thrown"},
  {base:"understand",past:"understood",pp:"understood"},{base:"wear",past:"wore",pp:"worn"},
  {base:"win",past:"won",pp:"won"},{base:"write",past:"wrote",pp:"written"}
];
const REGULAR_VERBS=[
  {base:"walk",past:"walked",pp:"walked"},{base:"learn",past:"learned",pp:"learned"},
  {base:"play",past:"played",pp:"played"},{base:"talk",past:"talked",pp:"talked"},
  {base:"jump",past:"jumped",pp:"jumped"},{base:"clean",past:"cleaned",pp:"cleaned"},
  {base:"cook",past:"cooked",pp:"cooked"},{base:"fix",past:"fixed",pp:"fixed"},
  {base:"help",past:"helped",pp:"helped"},{base:"open",past:"opened",pp:"opened"},
  {base:"paint",past:"painted",pp:"painted"},{base:"use",past:"used",pp:"used"},
  {base:"visit",past:"visited",pp:"visited"},{base:"watch",past:"watched",pp:"watched"}
];
const ALL_VERBS=[...REGULAR_VERBS,...IRREGULAR_VERBS];
const PERSONS=["1st person","2nd person","3rd person"];
const NUMBERS=["singular","plural"];
const TENSES=["simple present","present progressive","present perfect","present perfect progressive","simple past","past progressive","past perfect","past perfect progressive","will-future","going to-future","future progressive","future perfect","future perfect progressive"];
const POLARITIES=["👍 positive","👎 negative"];
const SENTENCE_TYPES=["statement","Yes/No-question","Wh-question"];
const STYPE_DISPLAY={"statement":"📝 statement","Yes/No-question":"✋ Yes/No-question","Wh-question":"❓ Wh-question"};
const PRONOUNS={"1st_singular":"I","2nd_singular":"you","3rd_singular":"he","1st_plural":"we","2nd_plural":"you","3rd_plural":"they"};
const PERSON_DESC={"1st_singular":"1st person singular","2nd_singular":"2nd person singular","3rd_singular":"3rd person singular","1st_plural":"1st person plural","2nd_plural":"2nd person plural","3rd_plural":"3rd person plural"};
const WH_WORDS=["why","what","when","where","who","whom","which","how"];
const EMOJIS_C=["🎉","🌟","💪","🔥","✨","🏆","👏","💎","🚀","⭐","🎯","👑","💥","🎊","🥳"];
const EMOJIS_W=["😅","🤔","💭","🧐","📝","🔄","💡","🤓"];
const VE={beat:"🥊",become:"🦋",begin:"🚀",bend:"🔄",blow:"💨",break:"💥",bring:"📦",build:"🏗️",buy:"🛒",catch:"🤲",choose:"🎯",come:"🚶",cost:"💰",cut:"✂️",deal:"🤝",do:"✅",draw:"✏️",drive:"🚗",drink:"🥤",eat:"🍽️",fall:"⬇️",feed:"🍼",feel:"❤️",fight:"⚔️",find:"🔍",fly:"✈️",forget:"😶‍🌫️",get:"🎁",give:"🎁",go:"🚶",hang:"🪝",have:"🫳",hear:"👂",hide:"🙈",hit:"👊",hold:"🤜",hurt:"🤕",keep:"🔒",know:"🧠",lay:"🛏️",leave:"🚪",lend:"💳",let:"👐",lie:"🛋️",light:"💡",lose:"😓",make:"🔨",mean:"💭",meet:"🤝",pay:"💳",put:"📥",read:"📖",ride:"🐴",ring:"🔔",rise:"🌅",run:"🏃",say:"💬",see:"👁️",sell:"🏷️",send:"📨",set:"⚙️",shake:"🫨",shoot:"🎯",show:"🎭",sing:"🎤",sit:"🪑",sleep:"😴",speak:"🗣️",spread:"🌊",spend:"💸",stand:"🧍",swim:"🏊",swing:"🎢",take:"✋",teach:"📚",tear:"😢",tell:"🗣️",think:"💭",throw:"🏹",understand:"💡",wear:"👗",win:"🏆",write:"✍️",walk:"🚶",learn:"📚",play:"🎮",talk:"💬",jump:"🦘",clean:"🧹",cook:"👨‍🍳",fix:"🔧",help:"🤝",open:"🚪",paint:"🖌️",use:"🛠️",visit:"✈️",watch:"📺"};

let playerNames=[],usedNames=[],usedTenses=[],usedSTypes=[];
let state={step:0,playerName:null,person:null,number:null,tense:null,polarity:null,sentenceType:null,verb:null,verbEmoji:"📝",
  attempts:0,score:0,streak:0,highStreak:0,bonusTotal:0,
  b_noTip:true,b_noFormula:true,b_firstTry:true,
  feedback:null,revealed:false,spinning:false,tipShown:false,proShown:false,formulaShown:false,formulaVerb:null};

function pick(a){return a[Math.floor(Math.random()*a.length)];}
function isReg(v){return REGULAR_VERBS.some(r=>r.base===v.base);}
function proLC(p){return p==="I"?"I":p.toLowerCase();}
function hasNames(){return playerNames.length>0;}
function totalSteps(){return hasNames()?7:6;}
function inputStep(){return hasNames()?6:5;}
function pickTracked(pool,used){let av=pool.filter(x=>!used.includes(x));if(!av.length){used.length=0;av=[...pool];}const c=av[Math.floor(Math.random()*av.length)];used.push(c);return c;}

window.handleCSV=function(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=function(ev){const t=ev.target.result,names=[];const lines=t.split(/\r?\n/).filter(l=>l.trim());if(!lines.length)return;const sep=lines[0].includes(";")?";":lines[0].includes("\t")?"\t":",";const hdr=lines[0].split(sep).map(c=>c.trim().replace(/^["']|["']$/g,""));const pat=/^(name|first.?name|vorname|prename|schüler|student|player|spieler|firstname)$/i;let ci=hdr.findIndex(h=>pat.test(h));const sr=ci>=0?1:0;if(ci<0)ci=0;for(const l of lines.slice(sr)){const cols=l.split(sep).map(c=>c.trim().replace(/^["']|["']$/g,""));if(cols[ci]&&cols[ci].length>0&&cols[ci].length<50){const n=cols[ci].trim();if(n&&!/^\d+$/.test(n))names.push(n);}}if(names.length){playerNames=[...new Set(names)];usedNames=[];newRound();}};r.readAsText(file);e.target.value="";};
window.clearNames=function(){playerNames=[];usedNames=[];newRound();};
window.triggerCSV=function(){document.getElementById("csv-file-input").click();};

function s3Form(v){if(v.s3)return v.s3;const b=v.base;if(b.endsWith("y")&&!"aeiou".includes(b[b.length-2]))return b.slice(0,-1)+"ies";if(/(?:s|sh|ch|x|z|o)$/.test(b))return b+"es";return b+"s";}
function ingForm(v){const b=v.base;if(b==="lie")return"lying";if(b==="die")return"dying";if(b==="tie")return"tying";if(b.endsWith("ie"))return b.slice(0,-2)+"ying";if(b.endsWith("e")&&!/(?:ee|ye|oe)$/.test(b))return b.slice(0,-1)+"ing";const dbl="begin,forget,get,hit,cut,put,run,set,sit,swim,win,let,stop,plan,drop,shut,spin,trip,wrap,drag,grab,hop,hug,jog,mop,nod,pat,rub,tap,tug".split(",");if(b.length>=3){const c=b.slice(-3);if(!"aeiou".includes(c[0])&&"aeiou".includes(c[1])&&!"aeiouvwxy".includes(c[2])&&(b.length<=4||dbl.includes(b)))return b+b[b.length-1]+"ing";}return b+"ing";}
const DBL=new Set("stop,plan,drop,step,slip,trip,grip,wrap,drag,grab,hop,nod,pat,rub,tap,hug,jog,mop,tug".split(","));
function edForm(v){const b=typeof v==="string"?v:v.base;if(b.endsWith("e"))return b+"d";if(b.endsWith("y")&&!"aeiou".includes(b[b.length-2]))return b.slice(0,-1)+"ied";if(DBL.has(b))return b+b[b.length-1]+"ed";return b+"ed";}
function ppOf(v){return isReg(v)?edForm(v):v.pp;}

// ══════ CONJUGATION ══════
function conjugate(v,person,number,tense,sType,neg){
  const pk=person+"_"+number,pro=PRONOUNS[pk],is3s=person==="3rd"&&number==="singular";
  const base=v.base,pp=ppOf(v),s3=s3Form(v),ing=ingForm(v),pst=isReg(v)?edForm(v):v.past;
  const beP=pk==="1st_singular"?"am":pk==="3rd_singular"?"is":"are";
  const bePst=(pk==="1st_singular"||pk==="3rd_singular")?"was":"were";
  const hP=is3s?"has":"have",d=is3s?"does":"do",P=proLC(pro),n=neg?"not":"";
  let pw=[],ex="";const mPW=(...w)=>w.filter(Boolean);
  if(tense==="simple present"){
    if(base==="be"){pw=mPW(beP,n);if(sType==="statement")ex=`${pro} ${beP}${neg?" not":""} happy.`;else if(sType==="Wh-question")ex=`Why ${beP} ${P}${neg?" not":""} happy?`;else ex=`${beP[0].toUpperCase()+beP.slice(1)} ${P}${neg?" not":""} happy?`;}
    else{if(sType==="statement"){pw=neg?mPW(d,n,base):mPW(is3s?s3:base);ex=neg?`${pro} ${d} not ${base}.`:`${pro} ${is3s?s3:base} every day.`;}else{pw=mPW(d,n,base);if(sType==="Wh-question")ex=`Why ${d} ${P}${neg?" not":""} ${base}?`;else ex=`${d[0].toUpperCase()+d.slice(1)} ${P}${neg?" not":""} ${base}?`;}}
  }else if(tense==="present progressive"){pw=mPW(beP,n,ing);if(sType==="statement")ex=`${pro} ${beP}${neg?" not":""} ${ing} right now.`;else if(sType==="Wh-question")ex=`What ${beP} ${P}${neg?" not":""} ${ing}?`;else ex=`${beP[0].toUpperCase()+beP.slice(1)} ${P}${neg?" not":""} ${ing}?`;
  }else if(tense==="present perfect"){pw=mPW(hP,n,pp);if(sType==="statement")ex=`${pro} ${hP}${neg?" not":""} ${pp} yet.`;else if(sType==="Wh-question")ex=`Why ${hP} ${P}${neg?" not":""} ${pp}?`;else ex=`${hP[0].toUpperCase()+hP.slice(1)} ${P}${neg?" not":""} ${pp}?`;
  }else if(tense==="present perfect progressive"){pw=mPW(hP,n,"been",ing);if(sType==="statement")ex=`${pro} ${hP}${neg?" not":""} been ${ing} all day.`;else if(sType==="Wh-question")ex=`How long ${hP} ${P}${neg?" not":""} been ${ing}?`;else ex=`${hP[0].toUpperCase()+hP.slice(1)} ${P}${neg?" not":""} been ${ing}?`;
  }else if(tense==="simple past"){
    if(base==="be"){pw=mPW(bePst,n);if(sType==="statement")ex=`${pro} ${bePst}${neg?" not":""} there.`;else if(sType==="Wh-question")ex=`Where ${bePst} ${P}${neg?" not":""}?`;else ex=`${bePst[0].toUpperCase()+bePst.slice(1)} ${P}${neg?" not":""} there?`;}
    else{if(sType==="statement"){pw=neg?mPW("did",n,base):mPW(pst);ex=neg?`${pro} did not ${base} yesterday.`:`${pro} ${pst} yesterday.`;}else{pw=mPW("did",n,base);if(sType==="Wh-question")ex=`When did ${P}${neg?" not":""} ${base}?`;else ex=`Did ${P}${neg?" not":""} ${base}?`;}}
  }else if(tense==="past progressive"){pw=mPW(bePst,n,ing);if(sType==="statement")ex=`${pro} ${bePst}${neg?" not":""} ${ing}.`;else if(sType==="Wh-question")ex=`What ${bePst} ${P}${neg?" not":""} ${ing}?`;else ex=`${bePst[0].toUpperCase()+bePst.slice(1)} ${P}${neg?" not":""} ${ing}?`;
  }else if(tense==="past perfect"){pw=mPW("had",n,pp);if(sType==="statement")ex=`${pro} had${neg?" not":""} ${pp} before.`;else if(sType==="Wh-question")ex=`Why had ${P}${neg?" not":""} ${pp}?`;else ex=`Had ${P}${neg?" not":""} ${pp}?`;
  }else if(tense==="past perfect progressive"){pw=mPW("had",n,"been",ing);if(sType==="statement")ex=`${pro} had${neg?" not":""} been ${ing} for hours.`;else if(sType==="Wh-question")ex=`How long had ${P}${neg?" not":""} been ${ing}?`;else ex=`Had ${P}${neg?" not":""} been ${ing}?`;
  }else if(tense==="will-future"){pw=mPW("will",n,base);if(sType==="statement")ex=`${pro} will${neg?" not":""} ${base} tomorrow.`;else if(sType==="Wh-question")ex=`When will ${P}${neg?" not":""} ${base}?`;else ex=`Will ${P}${neg?" not":""} ${base}?`;
  }else if(tense==="going to-future"){pw=mPW(beP,n,"going","to",base);if(sType==="statement")ex=`${pro} ${beP}${neg?" not":""} going to ${base} soon.`;else if(sType==="Wh-question")ex=`What ${beP} ${P}${neg?" not":""} going to ${base}?`;else ex=`${beP[0].toUpperCase()+beP.slice(1)} ${P}${neg?" not":""} going to ${base}?`;
  }else if(tense==="future progressive"){pw=mPW("will",n,"be",ing);if(sType==="statement")ex=`${pro} will${neg?" not":""} be ${ing} tomorrow.`;else if(sType==="Wh-question")ex=`What will ${P}${neg?" not":""} be ${ing}?`;else ex=`Will ${P}${neg?" not":""} be ${ing}?`;
  }else if(tense==="future perfect"){pw=mPW("will",n,"have",pp);if(sType==="statement")ex=`${pro} will${neg?" not":""} have ${pp} by then.`;else if(sType==="Wh-question")ex=`What will ${P}${neg?" not":""} have ${pp}?`;else ex=`Will ${P}${neg?" not":""} have ${pp}?`;
  }else if(tense==="future perfect progressive"){pw=mPW("will",n,"have","been",ing);if(sType==="statement")ex=`${pro} will${neg?" not":""} have been ${ing} for a year.`;else if(sType==="Wh-question")ex=`How long will ${P}${neg?" not":""} have been ${ing}?`;else ex=`Will ${P}${neg?" not":""} have been ${ing}?`;}
  return{predicateWords:pw,predicate:pw.join(" "),example:ex};
}

const CTR={"don't":"do not",dont:"do not","doesn't":"does not",doesnt:"does not","didn't":"did not",didnt:"did not","won't":"will not",wont:"will not","wasn't":"was not",wasnt:"was not","weren't":"were not",werent:"were not","isn't":"is not",isnt:"is not","aren't":"are not",arent:"are not","haven't":"have not",havent:"have not","hasn't":"has not",hasnt:"has not","hadn't":"had not",hadnt:"had not"};
function expC(t){t=t.replace(/[\u2018\u2019\u2032\u0060]/g,"'");for(const[c,e]of Object.entries(CTR))t=t.replace(new RegExp(c.replace("'","[']?"),"gi"),e);return t;}
function chkPred(input,ew){const tk=expC(input).trim().split(/\s+/).map(t=>t.replace(/[^a-zA-Z']/g,"").toLowerCase());let si=0;for(const w of ew){const wl=w.toLowerCase();let f=false;while(si<tk.length){if(tk[si]===wl){f=true;si++;break;}si++;}if(!f)return false;}return true;}
function valSType(input,sType){const tr=input.trim(),eq=tr.endsWith("?"),fw=tr.split(/\s+/)[0].replace(/[^a-zA-Z]/g,"").toLowerCase(),wh=WH_WORDS.includes(fw);if(sType==="statement"){if(eq)return{ok:false,reason:"📝 A statement should not end with ?"};return{ok:true};}if(sType==="Yes/No-question"){if(!eq)return{ok:false,reason:"✋ Must end with ?"};if(wh)return{ok:false,reason:"✋ Start with auxiliary, not a Wh-word"};return{ok:true};}if(sType==="Wh-question"){if(!eq)return{ok:false,reason:"❓ Must end with ?"};if(!wh)return{ok:false,reason:"❓ Must start with a Wh-word"};return{ok:true};}return{ok:true};}

// ══════ FORMULA ══════
function getFormula(fv,person,number,tense,neg,sType){
  const pk=person+"_"+number,pro=PRONOUNS[pk],is3s=person==="3rd"&&number==="singular";
  const base=fv.base,pp=ppOf(fv),s3=s3Form(fv),ing=ingForm(fv),pst=isReg(fv)?edForm(fv):fv.past;
  const hP=is3s?"has":"have",doP=is3s?"does":"do",beP=pk==="1st_singular"?"am":pk==="3rd_singular"?"is":"are",bePst=(pk==="1st_singular"||pk==="3rd_singular")?"was":"were",P=proLC(pro);
  const Sb=t=>`<span class="fp fp-subj">${t}</span>`,A=t=>`<span class="fp fp-aux">${t}</span>`,N=t=>`<span class="fp fp-not">${t}</span>`,V=t=>`<span class="fp fp-verb">${t}</span>`,Wh=t=>`<span class="fp fp-wh">${t}</span>`,X=t=>`<span class="fp fp-plain">${t}</span>`,PL=`<span class="fp-plus">+</span>`;
  let r=[],e=[];
  const isYN=sType==="Yes/No-question",isWh=sType==="Wh-question",isQ=isYN||isWh;

  // Helper: build rule+example from parts {aux, auxEx, verb, verbEx, needsDo}
  // needsDo: in positive statements some tenses have no auxiliary (simple present/past)
  function build(o){
    const aux=o.aux||"",auxEx=o.auxEx||"",vr=o.verb||"",vrEx=o.verbEx||"",needsDo=o.needsDo||false;
    if(sType==="statement"){
      if(needsDo&&!neg){r=[Sb("Subject"),PL,V(vr)];e=[Sb(pro),V(vrEx)];}
      else if(needsDo&&neg){r=[Sb("Subject"),PL,A(aux),PL,N("not"),PL,V(vr)];e=[Sb(pro),A(auxEx),N("not"),V(vrEx)];}
      else{r=[Sb("Subject"),PL,A(aux),neg?PL+""+N("not"):"",PL,V(vr)];e=[Sb(pro),A(auxEx),neg?N("not"):"",V(vrEx)];}
    }else if(isYN){
      if(needsDo){r=[A(aux),PL,Sb("subject"),neg?PL+""+N("not"):"",PL,V(vr),X("?")];e=[A(auxEx[0].toUpperCase()+auxEx.slice(1)),Sb(P),neg?N("not"):"",V(vrEx),X("?")];}
      else{const ac=auxEx[0].toUpperCase()+auxEx.slice(1);r=[A(aux),PL,Sb("subject"),neg?PL+""+N("not"):"",PL,V(vr),X("?")];e=[A(ac),Sb(P),neg?N("not"):"",V(vrEx),X("?")];}
    }else{// Wh
      if(needsDo){r=[Wh("Wh-word"),PL,A(aux),PL,Sb("subject"),neg?PL+""+N("not"):"",PL,V(vr),X("?")];e=[Wh("Why"),A(auxEx),Sb(P),neg?N("not"):"",V(vrEx),X("?")];}
      else{r=[Wh("Wh-word"),PL,A(aux),PL,Sb("subject"),neg?PL+""+N("not"):"",PL,V(vr),X("?")];e=[Wh("Why"),A(auxEx),Sb(P),neg?N("not"):"",V(vrEx),X("?")];}
    }
  }

  if(tense==="simple present"){
    if(fv.base==="be"){build({aux:"am/is/are",auxEx:beP,verb:"…",verbEx:"happy",needsDo:false});}
    else{build({aux:"do/does",auxEx:doP,verb:isQ?"base form":"verb(-s/-es)",verbEx:isQ?base:(is3s?s3:base),needsDo:true});}
  }else if(tense==="present progressive"){build({aux:"am/is/are",auxEx:beP,verb:"-ing form",verbEx:ing});}
  else if(tense==="present perfect"){build({aux:"have/has",auxEx:hP,verb:"past participle",verbEx:pp});}
  else if(tense==="present perfect progressive"){
    r=[];e=[];
    if(sType==="statement"){r=[Sb("Subject"),PL,A("have/has"),neg?PL+""+N("not"):"",PL,A("been"),PL,V("-ing")];e=[Sb(pro),A(hP),neg?N("not"):"",A("been"),V(ing)];}
    else if(isYN){r=[A("Have/Has"),PL,Sb("subject"),neg?PL+""+N("not"):"",PL,A("been"),PL,V("-ing"),X("?")];e=[A(hP[0].toUpperCase()+hP.slice(1)),Sb(P),neg?N("not"):"",A("been"),V(ing),X("?")];}
    else{r=[Wh("Wh-word"),PL,A("have/has"),PL,Sb("subject"),neg?PL+""+N("not"):"",PL,A("been"),PL,V("-ing"),X("?")];e=[Wh("How long"),A(hP),Sb(P),neg?N("not"):"",A("been"),V(ing),X("?")];}
  }else if(tense==="simple past"){
    if(fv.base==="be"){build({aux:"was/were",auxEx:bePst,verb:"…",verbEx:"there",needsDo:false});}
    else{build({aux:"did",auxEx:"did",verb:isQ?"base form":"past form",verbEx:isQ?base:pst,needsDo:true});}
  }else if(tense==="past progressive"){build({aux:"was/were",auxEx:bePst,verb:"-ing form",verbEx:ing});}
  else if(tense==="past perfect"){build({aux:"had",auxEx:"had",verb:"past participle",verbEx:pp});}
  else if(tense==="past perfect progressive"){
    r=[];e=[];
    if(sType==="statement"){r=[Sb("Subject"),PL,A("had"),neg?PL+""+N("not"):"",PL,A("been"),PL,V("-ing")];e=[Sb(pro),A("had"),neg?N("not"):"",A("been"),V(ing)];}
    else if(isYN){r=[A("Had"),PL,Sb("subject"),neg?PL+""+N("not"):"",PL,A("been"),PL,V("-ing"),X("?")];e=[A("Had"),Sb(P),neg?N("not"):"",A("been"),V(ing),X("?")];}
    else{r=[Wh("Wh-word"),PL,A("had"),PL,Sb("subject"),neg?PL+""+N("not"):"",PL,A("been"),PL,V("-ing"),X("?")];e=[Wh("How long"),A("had"),Sb(P),neg?N("not"):"",A("been"),V(ing),X("?")];}
  }else if(tense==="will-future"){build({aux:"will",auxEx:"will",verb:"base form",verbEx:base});}
  else if(tense==="going to-future"){
    r=[];e=[];
    if(sType==="statement"){r=[Sb("Subject"),PL,A("am/is/are"),neg?PL+""+N("not"):"",PL,A("going to"),PL,V("base")];e=[Sb(pro),A(beP),neg?N("not"):"",A("going to"),V(base)];}
    else if(isYN){r=[A("Am/Is/Are"),PL,Sb("subject"),neg?PL+""+N("not"):"",PL,A("going to"),PL,V("base"),X("?")];e=[A(beP[0].toUpperCase()+beP.slice(1)),Sb(P),neg?N("not"):"",A("going to"),V(base),X("?")];}
    else{r=[Wh("Wh-word"),PL,A("am/is/are"),PL,Sb("subject"),neg?PL+""+N("not"):"",PL,A("going to"),PL,V("base"),X("?")];e=[Wh("What"),A(beP),Sb(P),neg?N("not"):"",A("going to"),V(base),X("?")];}
  }else if(tense==="future progressive"){
    r=[];e=[];
    if(sType==="statement"){r=[Sb("Subject"),PL,A("will"),neg?PL+""+N("not"):"",PL,A("be"),PL,V("-ing")];e=[Sb(pro),A("will"),neg?N("not"):"",A("be"),V(ing)];}
    else if(isYN){r=[A("Will"),PL,Sb("subject"),neg?PL+""+N("not"):"",PL,A("be"),PL,V("-ing"),X("?")];e=[A("Will"),Sb(P),neg?N("not"):"",A("be"),V(ing),X("?")];}
    else{r=[Wh("Wh-word"),PL,A("will"),PL,Sb("subject"),neg?PL+""+N("not"):"",PL,A("be"),PL,V("-ing"),X("?")];e=[Wh("What"),A("will"),Sb(P),neg?N("not"):"",A("be"),V(ing),X("?")];}
  }else if(tense==="future perfect"){
    r=[];e=[];
    if(sType==="statement"){r=[Sb("Subject"),PL,A("will"),neg?PL+""+N("not"):"",PL,A("have"),PL,V("pp")];e=[Sb(pro),A("will"),neg?N("not"):"",A("have"),V(pp)];}
    else if(isYN){r=[A("Will"),PL,Sb("subject"),neg?PL+""+N("not"):"",PL,A("have"),PL,V("pp"),X("?")];e=[A("Will"),Sb(P),neg?N("not"):"",A("have"),V(pp),X("?")];}
    else{r=[Wh("Wh-word"),PL,A("will"),PL,Sb("subject"),neg?PL+""+N("not"):"",PL,A("have"),PL,V("pp"),X("?")];e=[Wh("What"),A("will"),Sb(P),neg?N("not"):"",A("have"),V(pp),X("?")];}
  }else if(tense==="future perfect progressive"){
    r=[];e=[];
    if(sType==="statement"){r=[Sb("Subject"),PL,A("will"),neg?PL+""+N("not"):"",PL,A("have been"),PL,V("-ing")];e=[Sb(pro),A("will"),neg?N("not"):"",A("have been"),V(ing)];}
    else if(isYN){r=[A("Will"),PL,Sb("subject"),neg?PL+""+N("not"):"",PL,A("have been"),PL,V("-ing"),X("?")];e=[A("Will"),Sb(P),neg?N("not"):"",A("have been"),V(ing),X("?")];}
    else{r=[Wh("Wh-word"),PL,A("will"),PL,Sb("subject"),neg?PL+""+N("not"):"",PL,A("have been"),PL,V("-ing"),X("?")];e=[Wh("How long"),A("will"),Sb(P),neg?N("not"):"",A("have been"),V(ing),X("?")];}
  }
  const rf=a=>a.filter(Boolean).join(" ");
  const legend=`<div class="formula-legend"><div class="legend-item"><div class="legend-dot" style="background:rgba(121,192,255,.4)"></div>Subject</div><div class="legend-item"><div class="legend-dot" style="background:rgba(227,179,65,.4)"></div>Auxiliary</div>${neg?'<div class="legend-item"><div class="legend-dot" style="background:rgba(247,120,186,.4)"></div>Negation</div>':''}<div class="legend-item"><div class="legend-dot" style="background:rgba(63,185,80,.4)"></div>Main verb</div>${isQ?'<div class="legend-item"><div class="legend-dot" style="background:rgba(210,168,255,.4)"></div>Wh-word</div>':''}</div>`;
  return{rule:rf(r),example:rf(e),legend};
}

function spawnConfetti(gold){const c=document.createElement("div");c.className="confetti";document.body.appendChild(c);const cols=gold?["#e3b341","#ffa657","#ffd700","#fff5aa"]:["#58a6ff","#e3b341","#79c0ff","#3fb950","#d2a8ff","#f778ba"];for(let i=0;i<(gold?70:45);i++){const s=document.createElement("span");s.style.left=Math.random()*100+"%";s.style.background=pick(cols);const sz=(6+Math.random()*8)+"px";s.style.width=sz;s.style.height=sz;s.style.borderRadius=Math.random()>.5?"50%":"2px";s.style.animationDuration=(1.5+Math.random()*2)+"s";s.style.animationDelay=Math.random()*.5+"s";c.appendChild(s);}setTimeout(()=>c.remove(),4000);}

function spinWheel(id,opts,cb){state.spinning=true;document.querySelectorAll('.spin-btn').forEach(b=>b.classList.add('disabled'));const ct=document.getElementById(id);if(!ct){state.spinning=false;return;}const w=ct.querySelector('.wheel-window'),tr=ct.querySelector('.wheel-track');if(!w||!tr){state.spinning=false;return;}const ih=w.offsetHeight,wi=Math.floor(Math.random()*opts.length),wn=opts[wi];const st=[];for(let c=0;c<4;c++)for(const o of opts)st.push(o);for(let i=0;i<=wi;i++)st.push(opts[i]);tr.innerHTML="";st.forEach(it=>{const d=document.createElement("div");d.className="wheel-item";d.textContent=it;tr.appendChild(d);});const fo=-(st.length-1)*ih;tr.style.transition="none";tr.style.transform="translateY(0)";requestAnimationFrame(()=>requestAnimationFrame(()=>{tr.style.transition="transform 1.6s cubic-bezier(0.08,0.82,0.17,1)";tr.style.transform=`translateY(${fo}px)`;}));setTimeout(()=>{state.spinning=false;cb(wn);},1700);}
function spinWheelF(id,opts,forced,cb){state.spinning=true;document.querySelectorAll('.spin-btn').forEach(b=>b.classList.add('disabled'));const ct=document.getElementById(id);if(!ct){state.spinning=false;return;}const w=ct.querySelector('.wheel-window'),tr=ct.querySelector('.wheel-track');if(!w||!tr){state.spinning=false;return;}const ih=w.offsetHeight,wi=opts.indexOf(forced);if(wi<0){state.spinning=false;cb(forced);return;}const st=[];for(let c=0;c<4;c++)for(const o of opts)st.push(o);for(let i=0;i<=wi;i++)st.push(opts[i]);tr.innerHTML="";st.forEach(it=>{const d=document.createElement("div");d.className="wheel-item";d.textContent=it;tr.appendChild(d);});const fo=-(st.length-1)*ih;tr.style.transition="none";tr.style.transform="translateY(0)";requestAnimationFrame(()=>requestAnimationFrame(()=>{tr.style.transition="transform 1.6s cubic-bezier(0.08,0.82,0.17,1)";tr.style.transform=`translateY(${fo}px)`;}));setTimeout(()=>{state.spinning=false;cb(forced);},1700);}

window.doSpin=function(id){
  if(state.spinning)return;const HN=hasNames(),map={};
  if(HN)map["spin-player"]={opts:playerNames,cb:v=>{state.playerName=v;state.step=1;},tracked:true,pickFn:()=>pickTracked(playerNames,usedNames)};
  map["spin-person"]={opts:PERSONS,cb:v=>{state.person=v.replace(" person","");state.step=HN?2:1;}};
  map["spin-number"]={opts:NUMBERS,cb:v=>{state.number=v;state.step=HN?3:2;}};
  map["spin-tense"]={opts:TENSES,cb:v=>{state.tense=v;state.step=HN?4:3;},tracked:true,pickFn:()=>pickTracked(TENSES,usedTenses)};
  map["spin-polarity"]={opts:POLARITIES,cb:v=>{state.polarity=v.includes("negative")?"negative":"positive";state.step=HN?5:4;}};
  map["spin-stype"]={opts:SENTENCE_TYPES.map(s=>STYPE_DISPLAY[s]),cb:v=>{const cl=SENTENCE_TYPES.find(s=>STYPE_DISPLAY[s]===v)||"statement";state.sentenceType=cl;state.step=HN?6:5;},tracked:true,pickFn:()=>{const raw=pickTracked(SENTENCE_TYPES,usedSTypes);return STYPE_DISPLAY[raw];}};
  const cfg=map[id];if(!cfg)return;
  if(cfg.tracked){const f=cfg.pickFn();spinWheelF(id,cfg.opts,f,r=>{cfg.cb(r);render();});}
  else spinWheel(id,cfg.opts,r=>{cfg.cb(r);render();});
};

// ══════ CHECK ══════
window.checkAnswer=function(){
  const inp=document.getElementById("answer-input");if(!inp)return;const ua=inp.value.trim();if(!ua)return;
  const neg=state.polarity==="negative",sT=state.sentenceType;
  const res=conjugate(state.verb,state.person,state.number,state.tense,sT,neg);
  const stC=valSType(ua,sT);
  if(!stC.ok){if(state.b_firstTry)state.b_firstTry=false;state.attempts++;
    if(state.attempts>=3){state.streak=0;state.feedback={type:"reveal",msg:`📖 The correct predicate was: <strong>${res.predicate}</strong><br><small>Example: <em>${res.example}</em></small><br><small>You'll get it next time! 💪</small>`};state.revealed=true;render();}
    else{state.feedback={type:"wrong",msg:`${pick(EMOJIS_W)} ${stC.reason}<br><small>Try again! (${state.attempts}/3)</small>`};render();setTimeout(()=>{const i=document.getElementById("answer-input");if(i){i.value=ua;i.focus();i.select();}},60);}return;}
  const ok=chkPred(ua,res.predicateWords);
  if(ok){
    const bd=[];let bp=0;
    if(state.b_noTip){bp++;bd.push("+1 no verb help");}
    if(state.b_noFormula){bp++;bd.push("+1 no formation rule");}
    if(state.b_firstTry){bp++;bd.push("+1 correct on first try");}
    state.score+=1+bp;state.bonusTotal+=bp;state.streak++;if(state.streak>state.highStreak)state.highStreak=state.streak;
    const e=pick(EMOJIS_C),nm=state.playerName?` Well done, ${state.playerName}!`:"";
    const bl=bp>0?`<br><small>⭐ ${bd.join(" · ")} = <strong>${1+bp} pts</strong></small>`:`<br><small>+1 pt</small>`;
    state.feedback={type:"correct",msg:`${e} Correct!${nm}${bl}<br><small>✅ Predicate: <strong>${res.predicate}</strong></small><br><small>📖 Example: <em>${res.example}</em></small>`};
    state.revealed=true;spawnConfetti(bp>=2);render();
  }else{
    if(state.b_firstTry)state.b_firstTry=false;state.attempts++;
    if(state.attempts>=3){state.streak=0;state.feedback={type:"reveal",msg:`📖 The correct predicate was: <strong>${res.predicate}</strong><br><small>Example: <em>${res.example}</em></small><br><small>You'll get it next time! 💪</small>`};state.revealed=true;render();}
    else{const h=state.attempts===1?`<br><small>💡 ${res.predicateWords.length} word(s). Tense: <strong>${state.tense}</strong>${neg?" (negative!)":""}!</small>`:`<br><small>💡 Starts with "<strong>${res.predicateWords[0]}</strong>"… (${res.predicateWords.length} words)</small>`;state.feedback={type:"wrong",msg:`${pick(EMOJIS_W)} Not quite!${h}<br><small>(${state.attempts}/3)</small>`};render();setTimeout(()=>{const i=document.getElementById("answer-input");if(i){i.value=ua;i.focus();i.select();}},60);}}
};
window.skipRound=function(){const neg=state.polarity==="negative",res=conjugate(state.verb,state.person,state.number,state.tense,state.sentenceType,neg);state.streak=0;state.feedback={type:"reveal",msg:`⏭️ Predicate: <strong>${res.predicate}</strong><br><small>${res.example}</small>`};state.revealed=true;render();};

// ══════ RENDER ══════
function render(){
  const app=document.getElementById("app"),v=state.verb,ir=!isReg(v);
  const HN=hasNames(),IS=inputStep(),TS=totalSteps();
  let h=`<h1>🎯 Verb Conjugation Trainer <span style="font-size:.55em;opacity:.6">Year 10</span></h1>`;
  h+=`<div class="csv-area"><div class="csv-row">`;
  if(!HN)h+=`<span class="csv-label">📋 Optional: load student names</span><button class="csv-btn" onclick="triggerCSV()">📂 Upload .CSV</button>`;
  else h+=`<span class="csv-info">👥 ${playerNames.length} names (${Math.max(0,playerNames.length-usedNames.length+1)} left)</span><span class="csv-clear" onclick="clearNames()">✕ clear</span>`;
  h+=`</div>`;if(HN){h+=`<div class="tracker csv-names-list">`;playerNames.forEach(n=>{const ic=state.playerName===n,iu=usedNames.includes(n)&&!ic;h+=`<span class="tracker-pill${iu?' used':''}${ic?' current':''}">${n}</span> `;});h+=`</div>`;}h+=`</div>`;
  h+=`<div class="stats-bar"><div class="stat">🏆 Score: <strong>${state.score}</strong></div><div class="stat"><span class="${state.streak>=3?'streak-fire':''}">🔥</span> Streak: <strong>${state.streak}</strong></div><div class="stat">📈 Highest: <strong>${state.highStreak}</strong></div><div class="stat stat-bonus">⭐ Extra: <strong>${state.bonusTotal}</strong></div></div>`;
  h+=`<div class="verb-display"><div class="verb-name">${state.verbEmoji} ${v.base}</div>`;
  if(state.tipShown)h+=`<div class="verb-tip-reveal">📖 ${ir?"⚡ Irregular":"📏 Regular"}: ${v.base} — ${v.past} — ${ppOf(v)}</div>`;
  else h+=`<button class="verb-tip-btn" onclick="showTip()">💡 Show verb type & forms <small style="opacity:.6">(−1 bonus pt)</small></button>`;
  h+=`</div>`;
  h+=`<div class="progress-ring"><div class="step-dots">`;for(let i=0;i<TS;i++)h+=`<div class="step-dot ${i<state.step?"done":i===state.step?"active":""}"></div>`;h+=`</div></div>`;
  if(HN){h+=`<div class="section"><div class="section-title">🙋 Player</div>`;if(state.playerName)h+=`<div class="done-badge">🎰 ${state.playerName} ✅</div>`;else if(state.step===0)h+=spinnerHTML("spin-player",playerNames);else h+=`<div class="waiting-badge">⏳</div>`;h+=`</div>`;}
  const ps=HN?1:0;h+=`<div class="section"><div class="section-title">👤 Person</div>`;if(state.person)h+=`<div class="done-badge">🎰 ${state.person} person ✅</div>`;else if(state.step===ps)h+=spinnerHTML("spin-person",PERSONS);else h+=`<div class="waiting-badge">⏳</div>`;h+=`</div>`;
  const ns=HN?2:1;h+=`<div class="section"><div class="section-title">🔢 Number</div>`;if(state.number)h+=`<div class="done-badge">🎰 ${state.number} ✅</div>`;else if(state.step===ns)h+=spinnerHTML("spin-number",NUMBERS);else h+=`<div class="waiting-badge">⏳</div>`;h+=`</div>`;
  const ts=HN?3:2;h+=`<div class="section"><div class="section-title">⏰ Tense</div>`;if(state.tense)h+=`<div class="done-badge">🎰 ${state.tense} ✅</div>`;else if(state.step===ts)h+=spinnerHTML("spin-tense",TENSES);else h+=`<div class="waiting-badge">⏳</div>`;h+=`<div class="tracker">`;TENSES.forEach(t=>{const ic=state.tense===t,iu=usedTenses.includes(t)&&!ic;h+=`<span class="tracker-pill${iu?' used':''}${ic?' current':''}">${t}</span> `;});h+=`</div></div>`;
  const pls=HN?4:3;h+=`<div class="section"><div class="section-title">➕➖ Polarity</div>`;if(state.polarity)h+=`<div class="done-badge">🎰 ${state.polarity==="negative"?"👎 negative":"👍 positive"} ✅</div>`;else if(state.step===pls)h+=spinnerHTML("spin-polarity",POLARITIES);else h+=`<div class="waiting-badge">⏳</div>`;h+=`</div>`;
  const ss=HN?5:4;h+=`<div class="section"><div class="section-title">💬 Sentence Type</div>`;if(state.sentenceType)h+=`<div class="done-badge">🎰 ${STYPE_DISPLAY[state.sentenceType]} ✅</div>`;else if(state.step===ss)h+=spinnerHTML("spin-stype",SENTENCE_TYPES.map(s=>STYPE_DISPLAY[s]));else h+=`<div class="waiting-badge">⏳</div>`;h+=`<div class="tracker">`;SENTENCE_TYPES.forEach(t=>{const ic=state.sentenceType===t,iu=usedSTypes.includes(t)&&!ic;h+=`<span class="tracker-pill${iu?' used':''}${ic?' current':''}">${STYPE_DISPLAY[t]}</span> `;});h+=`</div></div>`;

  if(state.step>=IS){
    const neg=state.polarity==="negative",pk=state.person+"_"+state.number,pro=PRONOUNS[pk],pd=PERSON_DESC[pk],polL=neg?"🚫 negative":"✅ positive",pL=state.playerName?`<span style="color:var(--pink)">${state.playerName}</span>: `:"",isQ=state.sentenceType.includes("question");
    h+=`<div class="summary-box"><div class="label">🎯 Your Challenge</div><div class="value">${pL}<em style="color:var(--orange)">${pd}</em> + <em style="color:var(--blue)">${v.base}</em> → ${state.tense} → ${polL} → ${STYPE_DISPLAY[state.sentenceType]}</div>`;
    if(!state.proShown&&!state.revealed)h+=`<div style="margin-top:6px"><button class="formula-btn" style="font-size:.78rem;padding:5px 12px" onclick="showPronoun()">👁 Reveal pronoun</button></div>`;
    else if(state.proShown)h+=`<div style="margin-top:6px;font-size:.9rem;color:var(--blue)">👁 Pronoun: <strong>${pro}</strong></div>`;
    if(!state.revealed){const bA=(state.b_noTip?1:0)+(state.b_noFormula?1:0)+(state.b_firstTry?1:0);h+=`<div><span class="bonus-indicator">⭐ Up to +${bA} bonus pts available</span></div>`;}
    h+=`</div>`;

    if(!state.revealed){
      h+=`<div class="section-title">✍️ ${state.playerName?state.playerName+", type":"Type"} a complete ${neg?"negative ":""}${isQ?"question":"sentence"}</div>`;
      h+=`<p class="hint">💡 Only the <strong>predicate</strong> is checked!${neg?" Negate! 🚫":""}</p>`;
      if(!state.formulaShown)h+=`<div style="text-align:center;margin:8px 0"><button class="formula-btn" onclick="showFormula()">📐 Show formation rule for <em>${state.tense}</em> <small style="opacity:.6">(−1 bonus)</small></button></div>`;
      else{const fv=state.formulaVerb||v,fm=getFormula(fv,state.person,state.number,state.tense,neg,state.sentenceType);h+=`<div class="formula-box"><div class="formula-title">📐 Formation Rule: ${state.tense}${neg?" (negative)":""} — ${STYPE_DISPLAY[state.sentenceType]}</div><div class="formula-rule">${fm.rule}</div><div class="formula-example-label">Example with <strong>${fv.base}</strong>:</div><div class="formula-example">${fm.example}</div>${fm.legend}</div>`;}
      h+=`<div class="input-area"><input type="text" id="answer-input" placeholder="Type your ${neg?"negative ":""}${isQ?"question":"sentence"} here..." onkeydown="if(event.key==='Enter')checkAnswer()"/></div>`;
      h+=`<div class="btn-row"><button class="action-btn btn-check" onclick="checkAnswer()">✅ Check</button><button class="action-btn btn-skip" onclick="skipRound()">⏭️ Skip</button></div>`;
      if(state.attempts>0&&state.attempts<3)h+=`<p class="hint">Attempt ${state.attempts}/3 — ${3-state.attempts} left ${pick(EMOJIS_W)}</p>`;
    }
    if(state.feedback)h+=`<div class="feedback ${state.feedback.type}">${state.feedback.msg}</div>`;
    if(state.revealed)h+=`<div class="btn-row"><button class="action-btn btn-next" onclick="newRound()">🎲 Next Verb</button></div>`;
  }
  app.innerHTML=h;
  if(state.step>=IS&&!state.revealed)setTimeout(()=>{const i=document.getElementById("answer-input");if(i)i.focus();},60);
}
newRound();
</script>
