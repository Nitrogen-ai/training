<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧪 Hypothesentrainer Chemie</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0f1a;--bg2:#141829;--bg3:#1a1f38;
  --card:#171c33;--card-hover:#1e2444;
  --accent:#6ee7b7;--accent2:#34d399;--accent3:#10b981;
  --warn:#fbbf24;--danger:#f87171;--info:#60a5fa;
  --purple:#a78bfa;--pink:#f472b6;--orange:#fb923c;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --border:#2a3058;
  --radius:16px;--radius-sm:10px;
  --shadow:0 8px 32px rgba(0,0,0,.4);
  --font-display:'Playfair Display',serif;
  --font-body:'Source Sans 3',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 20%,rgba(110,231,183,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(167,139,250,.04) 0%,transparent 50%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes flipIn{from{transform:rotateY(90deg);opacity:0}to{transform:rotateY(0);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(400px) rotate(720deg);opacity:0}}

.app{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:16px;min-height:100vh}
.header{text-align:center;padding:32px 0 24px;animation:fadeIn .6s ease}
.header h1{font-family:var(--font-display);font-size:clamp(1.6rem,5vw,2.2rem);font-weight:900;background:linear-gradient(135deg,var(--accent),var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.3}
.header p{color:var(--text2);margin-top:8px;font-size:.95rem;font-weight:300}
.stats-bar{display:flex;gap:8px;justify-content:center;margin:16px 0;flex-wrap:wrap}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;font-size:.8rem;color:var(--text2);display:flex;align-items:center;gap:6px}
.stat .num{font-weight:700;color:var(--accent);font-family:var(--font-mono)}
.grade-select{animation:slideUp .5s ease .1s both}
.grade-select h2{font-family:var(--font-display);font-size:1.3rem;text-align:center;margin-bottom:16px;color:var(--text)}
.grade-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.grade-btn{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius);padding:16px 12px;text-align:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.grade-btn:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 20px rgba(110,231,183,.15)}
.grade-btn .emoji{font-size:1.8rem;display:block;margin-bottom:6px}
.grade-btn .label{font-weight:600;font-size:.95rem}
.grade-btn .sub{font-size:.75rem;color:var(--text3);margin-top:4px}
.grade-btn.completed{border-color:var(--accent3)!important}
.grade-btn.completed::after{content:'✓';position:absolute;top:8px;right:8px;color:var(--accent);font-weight:700;font-size:1.1rem}
.card-container{perspective:1200px;min-height:520px;animation:slideUp .5s ease}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .4s}
.card-header{padding:20px 20px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card-category{font-size:.7rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;padding:4px 10px;border-radius:20px;display:inline-block}
.cat-alltag{background:rgba(110,231,183,.12);color:var(--accent)}
.cat-forensik{background:rgba(248,113,113,.12);color:var(--danger)}
.cat-pharma{background:rgba(167,139,250,.12);color:var(--purple)}
.cat-pyro{background:rgba(251,191,36,.12);color:var(--warn)}
.card-grade{font-size:.7rem;color:var(--text3);font-family:var(--font-mono);white-space:nowrap;padding-top:3px}
.card-body{padding:20px}
.phenomenon-title{font-family:var(--font-display);font-size:1.25rem;font-weight:700;margin-bottom:8px;line-height:1.35}
.phenomenon-desc{color:var(--text2);font-size:.92rem;line-height:1.6;margin-bottom:16px}
.funfact{background:var(--bg);border-left:3px solid var(--warn);padding:12px 14px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-bottom:16px;font-size:.85rem;color:var(--text2);line-height:1.5}
.funfact .ff-label{color:var(--warn);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.hypo-section{padding:0 20px 20px}
.hypo-label{font-weight:600;font-size:.9rem;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.hypo-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;color:var(--text);font-family:var(--font-body);font-size:.92rem;resize:vertical;min-height:90px;transition:border-color .2s;line-height:1.5}
.hypo-input:focus{outline:none;border-color:var(--accent)}
.hypo-input::placeholder{color:var(--text3)}
.hint-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1px dashed var(--warn);color:var(--warn);padding:8px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:.82rem;margin-top:10px;transition:all .2s;font-family:var(--font-body)}
.hint-btn:hover{background:rgba(251,191,36,.08)}
.hint-box{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);border-radius:var(--radius-sm);padding:14px;margin-top:10px;font-size:.88rem;color:var(--warn);line-height:1.5;animation:fadeIn .3s ease}
.reveal-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent3),var(--accent2));color:var(--bg);font-weight:700;font-size:1rem;border:none;border-radius:0 0 var(--radius) var(--radius);cursor:pointer;transition:all .2s;font-family:var(--font-body);letter-spacing:.5px}
.reveal-btn:hover{filter:brightness(1.1)}
.reveal-btn:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(.5)}
.explanation-section{animation:fadeIn .4s ease}
.explanation-title{font-family:var(--font-display);font-size:1.1rem;font-weight:700;margin-bottom:12px;color:var(--accent)}
.explanation-text{font-size:.92rem;line-height:1.65;color:var(--text2);margin-bottom:14px}
.particle-level{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:16px}
.particle-level .pl-label{font-size:.75rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--purple);font-weight:600;margin-bottom:6px}
.particle-level p{font-size:.88rem;line-height:1.6;color:var(--text2)}
.deep-dive{background:rgba(96,165,250,.06);border:1px solid rgba(96,165,250,.2);border-radius:var(--radius-sm);padding:14px;margin-bottom:16px}
.deep-dive .dd-label{font-size:.75rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--info);font-weight:600;margin-bottom:6px}
.deep-dive p{font-size:.85rem;line-height:1.6;color:var(--text2)}
.assessment{border-top:1px solid var(--border);padding:20px;animation:fadeIn .3s ease}
.assessment h3{font-size:.95rem;font-weight:600;margin-bottom:12px;text-align:center}
.thumb-row{display:flex;gap:12px;justify-content:center;margin-bottom:14px}
.thumb-btn{width:56px;height:56px;border-radius:50%;border:2px solid var(--border);background:var(--bg2);font-size:1.5rem;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center}
.thumb-btn:hover{transform:scale(1.15)}
.thumb-btn.up:hover,.thumb-btn.up.active{border-color:var(--accent);background:rgba(110,231,183,.12)}
.thumb-btn.down:hover,.thumb-btn.down.active{border-color:var(--danger);background:rgba(248,113,113,.12)}
.adjust-section{margin-top:12px}
.adjust-label{font-size:.82rem;color:var(--text3);margin-bottom:6px}
.adjust-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;color:var(--text);font-family:var(--font-body);font-size:.88rem;resize:vertical;min-height:60px;transition:border-color .2s}
.adjust-input:focus{outline:none;border-color:var(--purple)}
.next-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-weight:700;font-size:1rem;border:none;border-radius:var(--radius-sm);cursor:pointer;margin-top:14px;transition:all .2s;font-family:var(--font-body);letter-spacing:.5px}
.next-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:.85rem;padding:8px 0;margin-bottom:12px;transition:color .2s;font-family:var(--font-body)}
.back-btn:hover{color:var(--text)}
.completion{text-align:center;animation:slideUp .5s ease;padding:40px 20px}
.completion .big-emoji{font-size:4rem;animation:float 3s ease infinite}
.completion h2{font-family:var(--font-display);font-size:1.6rem;margin:16px 0 8px}
.completion p{color:var(--text2);font-size:.95rem;line-height:1.5}
.completion .score{font-family:var(--font-mono);font-size:2.5rem;font-weight:700;color:var(--accent);margin:20px 0}
.restart-btn{padding:14px 32px;background:linear-gradient(135deg,var(--accent3),var(--accent));color:var(--bg);font-weight:700;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:1rem;margin-top:16px;transition:all .2s;font-family:var(--font-body)}
.restart-btn:hover{filter:brightness(1.1);transform:translateY(-2px)}
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;animation:confetti 2s ease forwards;pointer-events:none;z-index:100}
.hypo-display{font-size:.9rem;color:var(--text2);line-height:1.5;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border);white-space:pre-wrap;word-wrap:break-word}
@media(max-width:480px){
  .app{padding:10px}
  .card-body{padding:16px}
  .hypo-section{padding:0 16px 16px}
  .phenomenon-title{font-size:1.1rem}
  .grade-grid{grid-template-columns:repeat(2,1fr)}
  .assessment{padding:16px}
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const PHENOMENA=[
{id:1,title:"🍊 Brennende Mandarinenschale",desc:"Quetscht man die Schale einer Mandarine über einer Kerzenflamme, schießen spektakuläre Stichflammen hervor.",grade:7,cat:"alltag",funfact:"💡 In der Parfümindustrie wird Limonen als Duftstoff in über 70 % aller Produkte verwendet – und gleichzeitig ist es hochentzündlich!",hint:"Denke an die Inhaltsstoffe ätherischer Öle und ihre Molekülstruktur. Was könnte sie so brennbar machen?",explanation:"In der Schale steckt das Terpen Limonen (C₁₀H₁₆), ein Kohlenwasserstoff mit hohem Dampfdruck. Beim Quetschen wird es als feiner Nebel freigesetzt.",particle:"Limonen besteht aus einem Cyclohexanring mit Isopropenyl-Gruppe. Die vielen C-H-Bindungen und das unverzweigte Kohlenstoffgerüst machen es extrem leicht entzündlich. Als fein verteilter Nebel (große Oberfläche!) erreicht das Gemisch mit Luft die Zündtemperatur sofort – ähnlich einer Staubexplosion.",deepdive:"In der Lebensmittelchemie nutzt man Limonen als natürliches Lösungsmittel. (R)-Limonen riecht nach Orange, (S)-Limonen nach Zitrone – ein Beispiel für Chiralität im Alltag!"},
{id:2,title:"🖊️ Tintenkiller-Chemie",desc:"Der Tintenkiller lässt blaue Tinte verschwinden – aber wie genau?",grade:8,cat:"alltag",funfact:"💡 Hält man das Papier über eine Heizung, erscheint die 'gelöschte' Tinte manchmal als bräunlicher Fleck wieder – der Farbstoff ist nur maskiert, nicht zerstört!",hint:"Die blaue Farbe der Tinte kommt von einem konjugierten π-System. Was passiert, wenn man dieses System chemisch unterbricht?",explanation:"Natriumsulfit (Na₂SO₃) im Tintenkiller addiert nucleophil an eine Doppelbindung des Triphenylmethan-Farbstoffs und unterbricht das konjugierte System.",particle:"Der Farbstoff (z. B. Löschblau) besitzt ein ausgedehntes System konjugierter Doppelbindungen, das Licht im orange-roten Bereich absorbiert → wir sehen Blau. Die SO₃²⁻-Addition wandelt ein sp²-C-Atom in sp³ um, die Konjugation bricht ab, die Absorption verschiebt sich aus dem sichtbaren Bereich.",deepdive:"In der Forensik ist das ein Problem: Mit UV-Licht oder chemischen Reagenzien lassen sich 'gelöschte' Texte auf Dokumenten oft wieder sichtbar machen – Urkundenfälschung scheitert häufig daran!"},
{id:3,title:"🪷 Selbstreinigung des Lotusblattes",desc:"Auf Lotusblättern perlt Wasser mit allen Schmutzpartikeln einfach ab. Warum?",grade:8,cat:"alltag",funfact:"💡 Die Autoindustrie entwickelt Lacke nach dem Lotus-Prinzip. Mercedes-Benz testete in den 2000ern einen 'Nano-Lack', der Autos bei Regen selbst reinigt!",hint:"Denke an die Oberflächenstruktur im Nanometer-Bereich. Wie verändert Rauheit den Kontaktwinkel eines Wassertropfens?",explanation:"Mikroskopische Wachskristalle auf der Blattoberfläche erzeugen eine doppelte Rauheitsstruktur (Mikro- und Nanoebene), die den Kontaktwinkel über 150° treibt.",particle:"Die epikutikulären Wachse bestehen aus langkettigen Alkanderivaten (C₂₆–C₃₂), die unpolar und damit hydrophob sind. Durch die hierarchische Nano-Struktur berührt ein Wassertropfen nur ca. 2–3 % der Oberfläche – der Rest ist Luft. Der Tropfen 'schwebt' quasi und nimmt beim Abrollen Schmutzpartikel mit (Adhäsion Schmutz-Wasser > Adhäsion Schmutz-Oberfläche).",deepdive:"Der Kontaktwinkel auf glattem Wachs beträgt ca. 110°. Erst die Nano-Strukturierung steigert ihn auf über 150° – superhydrophob! Das Cassie-Baxter-Modell beschreibt diesen Effekt mathematisch."},
{id:4,title:"🍬 Knallbonbons & Pop Rocks",desc:"Im Mund knistern und knallen kleine Zuckerstückchen. Was steckt dahinter?",grade:8,cat:"alltag",funfact:"💡 In den 1970ern kursierte das Gerücht, man könne an Pop Rocks sterben, wenn man dazu Cola trinkt. General Foods musste sogar eine Hotline einrichten – komplett unbegründet!",hint:"Unter welchen Bedingungen könnte ein Gas in Zucker eingeschlossen und dann wieder freigesetzt werden?",explanation:"CO₂ wird bei ca. 40 bar in geschmolzenen Zucker gepresst. Beim Erstarren bleibt das Gas in winzigen Hohlräumen eingeschlossen.",particle:"Im amorphen Zuckerglas (nicht kristallin!) sind CO₂-Moleküle unter Druck in Bläschen von ca. 100 µm gefangen. Im Mund löst Speichel und Wärme die Zuckermatrix auf – die Bläschen platzen, CO₂ entweicht schlagartig. Jeder 'Knall' ist eine Miniatur-Druckwelle von ca. 0,1 bar Überdruck.",deepdive:"Amorpher vs. kristalliner Zucker: Normaler Kandis ist kristallin und hat eine geordnete Gitterstruktur. Pop Rocks sind amorph – ein 'eingefrorener' Zustand der Schmelze, ähnlich wie Glas. Nur diese Struktur kann Gas einschließen."},
{id:5,title:"🌧️ Geruch nach Regen (Petrichor)",desc:"Nach einem Regenschauer auf trockenem Boden liegt ein unverwechselbarer Geruch in der Luft.",grade:9,cat:"alltag",funfact:"💡 Menschen können Geosmin in Konzentrationen von nur 5 ppt (parts per trillion) riechen – ein Teelöffel in 200 olympischen Schwimmbecken! Empfindlicher als der Geruchssinn eines Hais für Blut.",hint:"Welche Organismen leben im Boden, und was könnten sie für Stoffwechselprodukte abgeben?",explanation:"Actinobakterien (Streptomyceten) im Boden produzieren Geosmin (C₁₂H₂₂O), einen bicyclischen Alkohol mit erdigem Geruch. Regentropfen schleudern die Moleküle als Aerosol in die Luft.",particle:"Geosmin ist ein Decalin-Derivat (zwei kondensierte Cyclohexanringe) mit einer Hydroxyl- und einer Methylgruppe. Der bicyclische Bau macht es strukturell starr und passt perfekt in unseren Geruchsrezeptor OR11H7. Schon 10⁻¹² mol/L reichen für die Wahrnehmung – eine der niedrigsten Geruchsschwellen überhaupt.",deepdive:"Geosmin ist auch verantwortlich für den 'modrigen' Geschmack von Roten Beten und manchen Weinen (Korkton). Winemaker fürchten es!"},
{id:6,title:"🪬 Henna-Färbung der Haut",desc:"Henna erzeugt rotbraune Muster auf der Haut, die wochenlang halten. Warum hält es so gut?",grade:9,cat:"alltag",funfact:"💡 Die ältesten Henna-Funde stammen aus dem alten Ägypten – selbst Mumien tragen Henna-Muster, über 5000 Jahre alt!",hint:"Der Farbstoff muss sich irgendwie an die Hautproteine binden. Welche Art von Bindung wäre langlebig genug?",explanation:"Lawson (2-Hydroxy-1,4-naphthochinon) aus der Henna-Pflanze reagiert als Michael-Akzeptor mit den freien Aminogruppen (und SH-Gruppen) des Keratins in der Haut.",particle:"Lawson besitzt ein Chinon-System – zwei C=O-Gruppen am Naphthalinring. Die elektronenziehende Wirkung der Carbonyle macht die benachbarte C=C-Bindung elektrophil. Nucleophile NH₂-Gruppen des Keratins greifen dort an (Michael-Addition) und bilden eine kovalente C-N-Bindung. Da Keratin in den oberen Hautschichten sitzt, 'wächst' das Muster mit der Hauterneuerung heraus (ca. 2–4 Wochen).",deepdive:"'Schwarzes Henna' enthält kein Henna, sondern para-Phenylendiamin (PPD) – ein starkes Kontaktallergen, das dauerhafte Ekzeme auslösen kann. Vorsicht bei Urlaubstattoos!"},
{id:7,title:"🥩 Karamellisierung vs. Maillard",desc:"Beim Braten und Backen bräunt Essen – aber auf zwei völlig verschiedene Weisen.",grade:9,cat:"alltag",funfact:"💡 Louis-Camille Maillard entdeckte die Reaktion 1912 – aber erst 1953 erkannte John Hodge den Mechanismus. Die Maillard-Reaktion ist auch für die Bräunung von Bier, Kaffee und Schokolade verantwortlich!",hint:"Der eine Weg braucht nur Zucker, der andere braucht Zucker UND etwas anderes. Was?",explanation:"Karamellisierung: Pyrolyse/Isomerisierung von Zucker ab ~170 °C. Maillard-Reaktion: Kondensation von reduzierenden Zuckern mit Aminosäuren ab ~140 °C → Amadori-Produkte → Melanoidine.",particle:"Maillard-Schritt 1: Die Carbonylgruppe (C=O) des Zuckers reagiert nucleophil mit der NH₂-Gruppe der Aminosäure zu einem Glykosylamin (Schiff-Base). Dieses lagert sich zum Amadori-Produkt um. In weiteren Schritten entstehen hunderte verschiedene Aromaverbindungen (Pyrazine, Furanone) und braune Melanoidin-Polymere. Karamellisierung fragmentiert Zucker thermisch in Diacetyl (butterig) und Maltol (malzig).",deepdive:"In der Medizin spielt die Maillard-Reaktion bei Diabetes eine Rolle: Glucose reagiert mit Hämoglobin zum HbA1c – ein Langzeit-Blutzuckermarker!"},
{id:8,title:"🌶️ Capsaicin – warum Chili 'brennt'",desc:"Chili ist nicht wirklich heiß – aber unser Körper ist felsenfest überzeugt davon.",grade:9,cat:"alltag",funfact:"💡 Die Carolina Reaper hat über 2,2 Millionen Scoville. Vögel spüren Capsaicin überhaupt nicht – sie verbreiten die Samen!",hint:"Es gibt einen Rezeptor, der normalerweise auf Temperaturen über 43 °C reagiert. Was passiert, wenn ein Molekül diesen Rezeptor aktiviert?",explanation:"Capsaicin bindet an den TRPV1-Ionenkanal (Vanilloid-Rezeptor 1), der normalerweise auf Hitze >43 °C reagiert. Das Gehirn interpretiert das Signal als Verbrennung.",particle:"Die Vanillyl-Kopfgruppe des Capsaicins bildet Wasserstoffbrücken mit spezifischen Aminosäuren (Tyr511, Ser512) in der Bindungstasche des TRPV1-Kanals. Dadurch öffnet sich der Ca²⁺/Na⁺-Kanal → Depolarisation → Schmerzsignal. Die lange, unpolare Alkylkette (C₉H₁₇) verankert das Molekül in der Lipid-Doppelschicht der Zellmembran.",deepdive:"Milch hilft gegen Schärfe, weil Casein Capsaicin bindet. Wasser hilft nicht – Capsaicin ist unpolar und wasserunlöslich! Capsaicin-Pflaster werden in der Schmerztherapie eingesetzt."},
{id:9,title:"🍷 Tränen des Weins",desc:"Schwenkt man ein Weinglas, bilden sich 'Beine', die langsam herunterlaufen.",grade:9,cat:"alltag",funfact:"💡 Entgegen der Weinkenner-Legende sagen die Tränen NICHTS über die Qualität aus – nur über den Alkoholgehalt!",hint:"Ethanol und Wasser haben unterschiedliche Oberflächenspannungen. Was passiert am dünnen Film oben am Glas?",explanation:"Am dünnen Film verdunstet Ethanol schneller als Wasser. Die Oberflächenspannung steigt dort (Wasser: 72 mN/m > Ethanol: 22 mN/m) → Marangoni-Effekt zieht Flüssigkeit nach oben.",particle:"Der Gradient der Oberflächenspannung (∂γ/∂c) erzeugt eine tangentiale Kraft entlang der Grenzfläche. Wein kriecht zum Bereich höherer Oberflächenspannung (weniger Ethanol). Die Flüssigkeit sammelt sich zu Tropfen, die gravitationsbedingt als 'Tränen' herunterlaufen. Je höher der Alkoholgehalt, desto stärker der Gradient.",deepdive:"Der Marangoni-Effekt ist auch in der Halbleiterfertigung wichtig: Beim Trocknen von Silizium-Wafern nutzt man ihn, um wasserfleckenfreie Oberflächen zu erzeugen."},
{id:10,title:"🥑 Bräunung von Avocados",desc:"Aufgeschnittene Avocados und Äpfel werden schnell braun – Zitronensaft verhindert das.",grade:10,cat:"alltag",funfact:"💡 Die gleiche Enzymreaktion erzeugt die Bräunung von Tee! Schwarzer Tee ist enzymatisch 'gebräunter' grüner Tee.",hint:"Ein Enzym oxidiert Phenole. Welche Rolle spielt der pH-Wert von Zitronensaft?",explanation:"Polyphenoloxidase (PPO) oxidiert Phenolgruppen zu Chinonen, die polymerisieren → braunes Melanin. Zitronensäure senkt den pH und hemmt das Enzym; Ascorbinsäure reduziert Chinone zurück.",particle:"PPO enthält ein Kupfer-Zentrum (Cu²⁺), das O₂ aktiviert und auf die Phenol-OH-Gruppe überträgt → o-Chinone (gelb). Diese polymerisieren spontan via Michael-Additionen zu braunen Melanin-Pigmenten. Ascorbinsäure (Vitamin C) reduziert Chinone schneller zurück zu Phenolen, als sie polymerisieren können.",deepdive:"Gentech-Äpfel ('Arctic Apple') wurden gezüchtet, bei denen das PPO-Gen stummgeschaltet ist – sie bräunen nicht!"},
{id:11,title:"🌿 Carvon: Kümmel vs. Krauseminze",desc:"Dasselbe Molekül, zwei Enantiomere – völlig verschiedener Geruch.",grade:10,cat:"alltag",funfact:"💡 Unsere Nase ist das empfindlichste 'Chiralitätslabor' der Natur. (R)-Linalool riecht nach Lavendel, (S)-Linalool nach Koriander!",hint:"Enantiomere sind Spiegelbilder. Geruchsrezeptoren sind Proteine – also selbst chiral. Was bedeutet das?",explanation:"(R)-Carvon riecht nach Krauseminze, (S)-Carvon nach Kümmel. Die chiralen Geruchsrezeptoren erkennen die räumliche Anordnung unterschiedlich.",particle:"Carvon (C₁₀H₁₄O) hat ein Stereozentrum am C-4. Das Rezeptorprotein (ein GPCR) hat eine chirale Bindungstasche. (R)-Carvon und (S)-Carvon binden an verschiedene Rezeptoren – verschiedene Signalkaskaden → verschiedene Gerüche. Wie linker und rechter Handschuh in derselben Hand.",deepdive:"Manche Menschen können Enantiomere nicht unterscheiden – eine Art 'chirale Anosmie'. Die Pharmaindustrie gibt Milliarden für enantioselektive Synthese aus."},
{id:12,title:"🧴 Sonnencreme auf Molekülebene",desc:"UV-Filter wandeln gefährliche UV-Strahlung in harmlose Wärme um.",grade:10,cat:"alltag",funfact:"💡 Avobenzon absorbiert UV-A, ist aber photolabil – es zerfällt im Licht! Deshalb wird es mit Octocrilen stabilisiert. Jede Sonnencreme ist ein photochemisches Kraftwerk.",hint:"UV-Licht hebt Elektronen in höhere Energieniveaus. Was muss ein UV-Filter tun, um die Energie 'unschädlich' abzuleiten?",explanation:"Organische UV-Filter wie Octylmethoxycinnamat besitzen konjugierte π-Systeme, die UV-Photonen absorbieren (π→π*). Die Energie wird durch interne Konversion als Wärme abgegeben.",particle:"Im angeregten S₁-Zustand durchläuft das Molekül eine cis-trans-Isomerisierung der C=C-Bindung. Diese Rotation verbraucht die Photonenenergie und wandelt sie über Schwingungsrelaxation in Wärme um. Das Molekül kehrt in den Grundzustand zurück und kann erneut absorbieren (~10⁻¹² s). Anorganische Filter (ZnO, TiO₂) reflektieren und streuen UV durch hohen Brechungsindex.",deepdive:"Nano-TiO₂ (<100 nm) erscheint transparent statt weiß (kein sichtbares Licht gestreut). Allerdings kann es reaktive Sauerstoffspezies erzeugen – deshalb Silica-Beschichtung."},
{id:13,title:"🌡️ Thermochrome Stimmungsringe",desc:"Stimmungsringe und Thermobecher ändern ihre Farbe mit der Temperatur.",grade:10,cat:"alltag",funfact:"💡 In den 1970ern wurde der Erfinder Marvin Wernick mit Stimmungsringen Millionär. Die Farben haben nichts mit Emotionen zu tun – nur mit der Hauttemperatur!",hint:"Manche Substanzen ändern ihre molekulare Struktur reversibel mit der Temperatur. Wie beeinflusst das die Farbe?",explanation:"Zwei Technologien: (1) Leukofarbstoffe – Lacton-Ring bricht bei Wärme → Konjugation unterbrochen → farblos. (2) Cholesterische Flüssigkristalle ändern ihre Helixganghöhe → andere Bragg-Reflexion.",particle:"Bei Leukofarbstoffen: Ein Triphenylmethan-Farbstoff liegt kalt als farbiges Lacton vor (konjugiertes System intakt). Beim Erwärmen bricht die Lacton-Bindung → farblos. Bei Flüssigkristallen: Die Pitch-Länge der cholesterischen Helix ändert sich mit T → andere Wellenlängen reflektiert. Kurze Pitch = blau (kalt), lange Pitch = rot (warm).",deepdive:"Thermochrome Tinten zeigen auf Bierdosen die perfekte Trinktemperatur an. Badewannenaufkleber warnen, wenn das Wasser zu heiß für Babys wird."},
{id:14,title:"🧪 Parfüm: Kopf, Herz & Basis",desc:"Ein Parfüm riecht anfangs anders als nach Stunden – es 'entwickelt sich'.",grade:11,cat:"alltag",funfact:"💡 Chanel No. 5 war 1921 das erste Parfüm mit synthetischen Aldehyden. Coco Chanel wollte 'ein Parfüm, das nach Frau riecht, nicht nach Rose'.",hint:"Molekülgröße, Siedepunkt, Dampfdruck – wie hängen diese mit der Verdunstungsgeschwindigkeit zusammen?",explanation:"Kopfnoten (kleine Moleküle, ~10 C-Atome, hoher Dampfdruck) verdunsten zuerst. Herznoten (mittelgroß) bleiben Stunden. Basisnoten (große Moleküle, 15+ C-Atome) halten tagelang.",particle:"Der Dampfdruck sinkt exponentiell mit der Molekülmasse (Clausius-Clapeyron). Kleine Terpene (MW ~150, ~1 hPa bei 25 °C) verdunsten schnell. Große Moschus-Makrolide (MW ~300, ~10⁻⁴ hPa) kaum. Vanillin bildet starke H-Brücken → niedriger Dampfdruck. Unpolare Terpene haben nur schwache Van-der-Waals-Kräfte → hoher Dampfdruck.",deepdive:"Synthetische Moschus-Verbindungen wie Galaxolide sind persistent in der Umwelt – sie finden sich in Fischen und Muttermilch, weil Klärwerke sie kaum abbauen."},
{id:15,title:"🧁 Süßstoffe – warum süß ohne Zucker?",desc:"Aspartam ist 200× süßer als Saccharose, hat aber eine völlig andere Struktur.",grade:11,cat:"alltag",funfact:"💡 Sucralose wurde zufällig entdeckt: Ein Forscher sollte eine chlorierte Saccharose 'testen' (test) – er verstand 'schmecken' (taste) und leckte dran. 600× süßer!",hint:"Der Süßrezeptor erkennt nicht ein Molekül, sondern ein Bindungsmuster. Was könnte dieses Muster sein?",explanation:"Shallenbergers AH-B-X-Modell: Der Süßrezeptor T1R2/T1R3 erkennt ein Muster aus H-Brücken-Donor (AH), Akzeptor (B) und hydrophober Region (X) in definiertem Abstand.",particle:"Aspartam (L-Asp-L-Phe-Methylester): NH₃⁺ als AH-Donor, COO⁻ als B-Akzeptor, Phenylring als hydrophobes X. Der Abstand AH–B ≈ 2,5–4 Å passt in die Venus-Flytrap-Domäne des Rezeptors. Saccharose nutzt OH-Gruppen für dasselbe Muster. Höhere Süßkraft = festere Bindung (niedrigerer Kd).",deepdive:"D-Aminosäuren schmecken oft süß, L-Aminosäuren bitter – der Rezeptor ist chiral! D-Tryptophan ist 35× süßer als Saccharose."},
{id:16,title:"💐 Blaue Hortensien durch Aluminium",desc:"Hortensien blühen je nach Boden rosa oder blau – dasselbe Genom, verschiedene Farbe!",grade:11,cat:"alltag",funfact:"💡 Japanische Tempel nutzen seit Jahrhunderten Hortensien (Ajisai). Mönche erkannten, dass der Boden die Farbe bestimmt – ohne von pH oder Aluminium zu wissen.",hint:"Al³⁺ ist bei saurem pH löslich. Der Blütenfarbstoff ist ein Anthocyan. Was passiert, wenn sie aufeinandertreffen?",explanation:"In saurem Boden (pH <5,5) löst sich Al³⁺ und bildet mit Delphinidin einen Chelatkomplex → Farbverschiebung von Rosa nach Blau.",particle:"Delphinidin-3-glucosid bildet mit Al³⁺ einen Chelatkomplex über die vicinalen Hydroxylgruppen am B-Ring (Catechol-Motiv). Die Koordination verschiebt die Elektronendichte im konjugierten System: Absorptionsmaximum wandert von ~520 nm (rosa) zu ~620 nm (blau). Drei Delphinidin-Moleküle umgeben ein Al³⁺ – ein supramolekularer Komplex!",deepdive:"Eine 'echte blaue Rose' gibt es natürlich nicht – Suntory gelang es erst 2004 per Gentechnik, Delphinidin in Rosen einzubringen."},
{id:17,title:"🔦 Luminol – Blut sichtbar machen",desc:"Ermittler sprühen Luminol am Tatort – selbst kleinste, gereinigte Blutspuren leuchten blau.",grade:9,cat:"forensik",funfact:"💡 Luminol weist Blut nach, das 10 Jahre zuvor gründlich weggeputzt wurde. Es funktioniert sogar nach Bleiche-Behandlung!",hint:"Im Blut ist ein Metall-Ion als Katalysator. Welches Element im Hämoglobin könnte eine Redoxreaktion beschleunigen?",explanation:"Fe²⁺/³⁺ im Hämoglobin katalysiert die Oxidation von Luminol durch H₂O₂ → angeregtes 3-Aminophthalat → blaue Chemilumineszenz bei 425 nm.",particle:"Fe²⁺ erzeugt via Fenton-Reaktion Hydroxylradikale (•OH) aus H₂O₂. Diese oxidieren Luminol zum Diazachinon → Endoperoxid → Zerfall setzt N₂ frei → 3-Aminophthalat im angeregten Singulett-Zustand (S₁) → Photon bei λ = 425 nm. Quantenausbeute: ca. 1 %.",deepdive:"Problem: Auch Kupfer, Meerrettichperoxidase oder Bleiche lösen Luminol aus → falsch positiv! Deshalb nur Vortest. Bestätigung durch DNA-Analyse."},
{id:18,title:"🖐️ Fingerabdrücke mit Ninhydrin",desc:"Auf Papier hinterlassene Fingerabdrücke werden mit Ninhydrin violett sichtbar.",grade:10,cat:"forensik",funfact:"💡 Jeder Mensch hinterlässt bei einer Berührung ca. 100 ng Aminosäuren. Ninhydrin hat sogar 20.000 Jahre alte Fingerabdrücke in Höhlenmalereien nachgewiesen!",hint:"Im Schweiß befinden sich Aminosäuren. Ninhydrin hat zwei Carbonylgruppen. Was entsteht?",explanation:"Ninhydrin reagiert mit α-Aminogruppen der Aminosäuren im Schweiß. Nach oxidativer Desaminierung und Kondensation entsteht 'Ruhemanns Purpur' – ein intensiv violetter Farbstoff.",particle:"(1) Ninhydrin oxidiert die Aminosäure zum Aldehyd + CO₂ + NH₃. (2) NH₃ kondensiert mit zwei Ninhydrin-Molekülen unter Wasserabspaltung. (3) Das Produkt hat ein ausgedehntes konjugiertes π-System über beide Indanringe und die N-Brücke → Absorption bei 570 nm. Reaktion ist unabhängig von der Seitenkette → universell.",deepdive:"Moderne Alternative: DFO (1,8-Diazafluoren-9-on) ist 3× empfindlicher und fluoresziert – ideal für mehrfarbiges Papier."},
{id:19,title:"💨 Sekundenkleber-Bedampfung",desc:"Kriminaltechniker legen Gegenstände in Sekundenkleber-Dampf – Fingerabdrücke erscheinen weiß.",grade:10,cat:"forensik",funfact:"💡 Die Methode wurde 1978 zufällig in Japan entdeckt, als ein Polizist Sekundenkleber benutzte und Fingerabdrücke auf einem Glas bemerkte!",hint:"Cyanacrylat polymerisiert auf bestimmten Oberflächen. Was in einem Fingerabdruck startet die Polymerisation?",explanation:"Ethyl-2-cyanacrylat-Dampf polymerisiert anionisch auf Aminosäuren, Fettsäuren und Wasserresten in Fingerabdrücken. Der weiße Polymerfilm bildet die Rillen exakt nach.",particle:"Die C=C-Doppelbindung ist extrem elektrophil (Cyano- UND Ester-Gruppe als Akzeptoren). Schon Spuren von Wasser oder Aminen starten die anionische Kettenpolymerisation: Nucleophil greift C=C an → Carbanion → nächstes Monomer → Kette. Der weiße Polycyanacrylat-Film streut Licht durch seine poröse Struktur.",deepdive:"Nach der Bedampfung werden die Abdrücke mit Fluoreszenzfarbstoffen (Rhodamin 6G) angefärbt – so sichtbar auf bunten Oberflächen. Auf Handyscreens funktioniert die Methode besonders gut!"},
{id:20,title:"🧬 DNA-Fingerprinting",desc:"Jeder Mensch hat ein einzigartiges DNA-Profil. Wie wird es sichtbar gemacht?",grade:10,cat:"forensik",funfact:"💡 Die Wahrscheinlichkeit zweier identischer 16-Locus-Profile bei Nichtverwandten: ca. 1 zu 10¹⁸ – mehr als alle Menschen, die je gelebten haben!",hint:"Bestimmte DNA-Abschnitte wiederholen sich unterschiedlich oft. Wie macht man die Unterschiede sichtbar?",explanation:"Short Tandem Repeats (STRs) werden per PCR vervielfältigt und durch Kapillarelektrophorese nach Größe getrennt. Das Muster ist individuell.",particle:"PCR: DNA-Polymerase kopiert STR-Regionen exponentiell (~10⁹ Kopien nach 30 Zyklen). Fluoreszenzmarkierte Primer ermöglichen Mehrfarben-Detektion. In der Kapillarelektrophorese wandern negativ geladene DNA-Fragmente (Phosphatgruppen!) im Gel zum Plus-Pol. Kürzere Fragmente = schneller → Trennung ± 1 Nukleotid.",deepdive:"Der 'Phantommörder von Heilbronn' (2009): Die DNA stammte von einer Fabrikmitarbeiterin, die Wattestäbchen verpackte – nicht von einem Täter! Ein berühmter forensischer Fehler."},
{id:21,title:"💊 Marquis-Reagenz: Drogen-Schnelltest",desc:"Ein Tropfen Reagenz auf eine Substanz – die Farbe verrät die Droge.",grade:11,cat:"forensik",funfact:"💡 In den Niederlanden können Festival-Besucher Substanzen anonym bei 'Drug Checking'-Stellen testen lassen – das senkt nachweislich die Zahl der Vergiftungen!",hint:"Formaldehyd und konz. H₂SO₄ – was könnten sie mit aromatischen Ringen anstellen?",explanation:"Formaldehyd + konz. H₂SO₄ reagiert mit aromatischen Aminen/Phenolen durch elektrophile aromatische Substitution → charakteristische Farben: MDMA → dunkelblau, Amphetamin → orange, Heroin → violett.",particle:"H₂SO₄ protoniert HCHO zum Hydroxymethylkation (⁺CH₂OH), einem starken Elektrophil. Angriff auf elektronenreiche Aromaten (Friedel-Crafts-ähnlich). Zwei aromatische Ringe kondensieren über CH₂-Brücke → ausgedehntes konjugiertes System → Farbe. Substituenten (NH₂, OH) verschieben λmax spezifisch.",deepdive:"Der Marquis-Test ist nur ein Vortest – er kann MDMA und MDA nicht unterscheiden. GC-MS ist der forensische Goldstandard."},
{id:22,title:"🔥 Brandbeschleuniger-Nachweis",desc:"War es Brandstiftung? Forensiker finden Benzinspuren sogar in der Asche.",grade:11,cat:"forensik",funfact:"💡 Brandermittlungshunde riechen 0,01 µL Benzin – empfindlicher als jedes Instrument! Aber vor Gericht zählt nur die GC-MS-Analyse.",hint:"Kohlenwasserstoffe haben unterschiedliche Siedepunkte. Welche Analysemethode trennt nach Flüchtigkeit?",explanation:"Brandschutt wird erhitzt, flüchtige Kohlenwasserstoffe adsorbieren an Aktivkohle, werden eluiert und per GC-MS analysiert. Benzin zeigt ein charakteristisches Chromatogramm-Muster.",particle:"In der GC-Säule (Polydimethylsiloxan) werden Kohlenwasserstoffe nach Siedepunkt getrennt: leichte Aliphaten (C₅–C₉) zuerst, dann Aromaten (Toluol, Xylole), zuletzt schwere Alkane (C₁₀–C₂₅). Das MS fragmentiert jedes Molekül → charakteristisches m/z-Muster. Benzin zeigt eine typische Gaussian-Envelope der n-Alkan-Peaks. 'Weathering' durch den Brand verschiebt das Muster erkennbar.",deepdive:"ASTM E1618 klassifiziert Brandbeschleuniger in 8 Klassen – jedes mit eigenem GC-Profil."},
{id:23,title:"🔫 Schmauchspuren (GSR)",desc:"Hat jemand geschossen? Mikropartikel auf der Hand verraten es.",grade:11,cat:"forensik",funfact:"💡 Ein einziger Schuss erzeugt ca. 100.000 GSR-Partikel! Sie fliegen bis zu 2 Meter weit und bleiben trotz Händewaschen stundenlang nachweisbar.",hint:"Zündhütchen enthalten bestimmte Metallsalze. Welche Elementkombination ist fast einzigartig für einen Schuss?",explanation:"Beim Abfeuern verdampfen Bleisteyphat, Bariumnitrat und Antimonpentasulfid (~1700 °C) und kondensieren als kugelförmige Mikropartikel (0,5–10 µm). Die Kombination Pb + Ba + Sb ist nahezu einzigartig.",particle:"Bei der Detonation verdampfen die Metallsalze. In der raschen Abkühlung kondensieren sie zu kugelförmigen Partikeln (Oberflächenspannung der Schmelze!). REM zeigt glatte Kugeln mit Satelliten, EDX die Elementzusammensetzung. Drei Elemente in einer Kugel = 'charakteristisches GSR'. Moderne bleifreie Munition verwendet Diazodinitrophenol + Zink/Titan → andere Marker.",deepdive:"GSR können durch Kontakt übertragen werden (sekundärer Transfer)! Deshalb analysieren Forensiker die Verteilung: Dicht an Daumen/Zeigefinger = Schütze, gleichmäßig = möglicherweise nur Kontakt."},
{id:24,title:"💶 Fälschungssichere Banknoten",desc:"Euro-Scheine leuchten unter UV in charakteristischen Farben – kaum nachahmbar.",grade:11,cat:"forensik",funfact:"💡 Die genauen Eu-Komplexe der EZB sind eines der bestgehüteten Chemie-Geheimnisse der Welt! Nur ca. 0,001 % aller Euro-Scheine werden gefälscht.",hint:"Europium-Ionen zeigen extrem schmale Emissionslinien. Warum sind Lanthanoide ideal für Sicherheitsmerkmale?",explanation:"Europium(III)-Komplexe absorbieren UV (~340 nm) und emittieren scharfes rotes Licht bei 611 nm (⁵D₀→⁷F₂). Die extrem schmalen Linien (<5 nm Halbwertsbreite) sind fast unmöglich nachzuahmen.",particle:"UV regt den organischen Liganden an (Antenna-Effekt: π→π*). Über Intersystem Crossing (S₁→T₁) und Dexter/Förster-Energietransfer wird die Energie auf Eu³⁺ übertragen. Der ⁵D₀→⁷F₂-Übergang ist Laporte-verboten im freien Ion, aber durch niedrige Symmetrie im Komplex erzwungen → Emission bei exakt 611 nm. Organische Farbstoffe emittieren breit (50–100 nm), Lanthanoide scharf → der Schlüssel zur Fälschungssicherheit.",deepdive:"Neben Eu³⁺ (rot) werden Tb³⁺ (grün, 545 nm) und Tm³⁺ (blau, 450 nm) verwendet – zusammen RGB! Der 50-€-Schein hat zusätzlich Phosphor-Fasern mit verschiedenen Abklingzeiten."},
{id:25,title:"📜 Tintenalter-Bestimmung",desc:"Forensiker bestimmen, wann ein Dokument geschrieben wurde – auf Monate genau.",grade:11,cat:"forensik",funfact:"💡 Der 'Hitler-Tagebücher'-Skandal (1983) wurde durch Tintenanalyse gelöst: Die Tinte enthielt optische Aufheller, die erst nach 1954 produziert wurden – die angeblichen 1940er-Tagebücher waren Fälschungen!",hint:"Tinte enthält Lösungsmittel, die nach dem Schreiben langsam verdunsten. Wie misst man, wie viel verdunstet ist?",explanation:"Frische Tinte enthält flüchtige Lösungsmittel (Phenoxyethanol), die über Jahre langsam diffundieren. GC misst den Restgehalt → je weniger, desto älter.",particle:"Phenoxyethanol (Siedepunkt 245 °C) diffundiert langsam aus dem Tintenfilm in die Cellulose-Matrix. Die Diffusionsrate folgt dem Fickschen Gesetz. GC-MS bestimmt den Quotienten [verbleibend]/[original]. Die Verdunstungskurve fällt logarithmisch → Alter ±6–12 Monate schätzbar.",deepdive:"Fälscher versuchen 'künstliches Altern' (Backofen, UV). Aber Papier-Cellulose-Marker (Lignin-Abbau) ändern sich dann nicht konsistent → die Methoden ergänzen sich."},
{id:26,title:"💊 Aspirin – wie es wirklich wirkt",desc:"Aspirin ist über 120 Jahre alt – der Mechanismus wurde erst 1971 aufgeklärt.",grade:10,cat:"pharma",funfact:"💡 John Vane erhielt 1982 den Nobelpreis dafür. Die Acetylgruppe ist der einzige wirkende Teil – der Rest ist nur das 'Taxi' zum Enzym!",hint:"Aspirin ist ein Ester. Ester können andere Moleküle acetylieren. Welches Enzym könnte das Ziel sein?",explanation:"Acetylsalicylsäure acetyliert irreversibel Serin-530 der Cyclooxygenase (COX-1/2). Keine Prostaglandin-Synthese → weniger Schmerz, Entzündung, Fieber.",particle:"Die Acetylgruppe (CH₃CO-) wird nucleophil auf die OH-Gruppe von Ser530 übertragen (Umesterung). Im COX-Kanal blockiert sie sterisch den Zugang von Arachidonsäure zum katalytischen Tyr385. Irreversibel – die Wirkung hält, bis das Enzym abgebaut wird. Thrombozyten haben keinen Zellkern → 7–10 Tage Wirkdauer!",deepdive:"Niedrig dosiertes Aspirin (75–100 mg/Tag) hemmt bevorzugt COX-1 in Thrombozyten → weniger Thromboxan A₂ → Herzinfarkt-Prophylaxe."},
{id:27,title:"👶 Contergan-Katastrophe",desc:"Ein Schlafmittel mit zwei Spiegelbildformen – die eine wirkt, die andere verursacht schwere Fehlbildungen.",grade:10,cat:"pharma",funfact:"💡 Thalidomid erlebt ein Comeback: zugelassen gegen Lepra und Multiples Myelom – unter strengsten Auflagen mit doppelter Verhütungspflicht!",hint:"Das Molekül racemisiert im Körper spontan. Was bedeutet das für die Sicherheit?",explanation:"(R)-Thalidomid wirkt sedierend, (S)-Thalidomid ist teratogen. Aber: Im Körper racemisiert das Molekül am chiralen Zentrum → selbst reines (R) wird zur Hälfte (S)!",particle:"Am C-3 des Glutarimid-Rings liegt ein acides H (pKa ~13, benachbarte Carbonyle). Unter physiologischem pH: Protonabstraktion → planares Enolat → Reprotonierung von beiden Seiten → Racemisierung (t₁/₂ ≈ 7h). (S)-Thalidomid bindet an Cereblon (E3-Ubiquitin-Ligase) → Transkriptionsfaktoren SALL4/TP63 werden für Abbau markiert → gestörte Gliedmaßenentwicklung.",deepdive:"Die Contergan-Tragödie (1957–1961) führte direkt zur modernen Arzneimittelzulassung. Das Kefauver-Harris Amendment (1962) war eine direkte Folge."},
{id:28,title:"🧠 Prodrugs – Medikamente mit Tarnkappe",desc:"Manche Wirkstoffe werden als inaktive Vorstufe geschluckt und erst im Körper aktiviert.",grade:11,cat:"pharma",funfact:"💡 Ca. 10 % aller zugelassenen Medikamente sind Prodrugs! Heroin ist ein Prodrug von Morphin – die Acetylgruppen machen es lipophiler für schnellere Hirngängigkeit.",hint:"Manche Wirkstoffe werden im Magen zerstört oder kommen nicht durch die Darmwand. Wie 'verpackt' man sie?",explanation:"Prodrugs werden durch Enzyme (oft Esterasen) zum aktiven Wirkstoff umgewandelt. L-Dopa überwindet als Aminosäure die Blut-Hirn-Schranke, wird dann zu Dopamin decarboxyliert.",particle:"L-Dopa nutzt den Aminosäure-Transporter LAT1 in der Blut-Hirn-Schranke (aktiver Transport!). Im Gehirn entfernt DOPA-Decarboxylase die COOH-Gruppe → Dopamin. Dopamin selbst ist zu polar (zwei OH, Amin, positiv geladen bei pH 7,4) → kann die Blut-Hirn-Schranke nicht passieren.",deepdive:"Remdesivir (COVID-19) ist ein Prodrug: Der Phosphoramidat-Promoiety wird schrittweise zum aktiven Triphosphat umgewandelt."},
{id:29,title:"🦠 Penicillin sprengt Bakterien",desc:"Das erste Antibiotikum nutzt einen gespannten Vierring, um Bakterien platzen zu lassen.",grade:11,cat:"pharma",funfact:"💡 Fleming entdeckte Penicillin 1928 per Zufall – Schimmelpilz auf seiner Bakterienkultur. Er sagte: 'That's funny.' Nobelpreis 1945!",hint:"Der β-Lactam-Ring ist extrem gespannt (Vierring mit N). Welches Enzym bei Bakterien könnte angegriffen werden?",explanation:"Der β-Lactam-Ring (Ringspannung ~112 kJ/mol!) acyliert irreversibel die Transpeptidase (PBP), die Zellwand-Quervernetzung macht. Ohne Quervernetzung → osmotischer Druck sprengt die Bakterienzelle.",particle:"Die Transpeptidase verknüpft D-Ala-D-Ala-Enden der Peptidoglykan-Ketten. Penicillin ähnelt diesem Dipeptid und bindet im aktiven Zentrum. Der gespannte β-Lactam-Ring ist ~1000× reaktiver als ein normales Amid → kovalentes Acylenzym. Bakterien ohne Zellwand platzen durch ~25 atm osmotischen Druck!",deepdive:"MRSA produziert PBP2a mit größerem aktivem Zentrum → Penicillin passt nicht mehr. β-Lactamasen spalten den Ring. Gegenmaßnahme: Clavulansäure + Amoxicillin = Augmentin."},
{id:30,title:"💊 Retardtabletten – Chemie der Zeit",desc:"Manche Tabletten wirken 12 oder 24 Stunden, obwohl der Wirkstoff eigentlich schnell zerfällt.",grade:11,cat:"pharma",funfact:"💡 OROS-Tabletten (z. B. Concerta®) haben ein lasergestanztes Loch! Durch osmotischen Druck wird der Wirkstoff wie aus einer Pumpe herausgedrückt – die leere Hülle wird unverändert ausgeschieden.",hint:"Wirkstoff in Polymermatrix – welches physikalische Gesetz beschreibt die Freisetzungsrate?",explanation:"Matrix-Systeme: Wirkstoff in Polymer (HPMC, Eudragit) → Diffusion folgt √t-Kinetik (Higuchi). Membrangesteuert: semipermeable Membran → Freisetzung nullter Ordnung.",particle:"Higuchi: M(t) = √(D·(2A-Cs)·Cs·t). Fick'sches Gesetz steuert die Diffusion: J = -D·(dc/dx). Bei Membransystemen: J = D·K·Δc/h (konstant). pH-abhängige Polymere (Eudragit L ab pH 6, S ab pH 7) lösen sich erst im Dünn-/Dickdarm → gezielter Wirkort.",deepdive:"Spritam® (2015): Erste 3D-gedruckte Tablette mit ultraporöser Struktur für schnellen Zerfall – das Gegenteil von Retard, aber dasselbe Prinzip der Polymerstruktur-Steuerung."},
{id:31,title:"💊 Ibuprofen – nur die Hälfte wirkt",desc:"Jede Ibuprofen-Tablette enthält zur Hälfte ein inaktives Enantiomer – oder doch nicht?",grade:11,cat:"pharma",funfact:"💡 Stewart Adams entwickelte Ibuprofen 1961 bei Boots in Nottingham. Er testete es an sich selbst – gegen seinen Kater!",hint:"(S)-Ibuprofen hemmt COX, (R) nicht. Aber ein Enzym wandelt (R) in (S) um...",explanation:"Nur (S)-Ibuprofen hemmt COX-1/2. (R) wird durch α-Methylacyl-CoA-Racemase unidirektional zu (S) konvertiert → Racemat wirkt, aber langsamer.",particle:"(S)-Ibuprofen: Carboxylgruppe bildet ionische Bindung + H-Brücke an Arg120/Tyr355 im COX-Kanal. Isobutylphenyl-Rest füllt die hydrophobe Tasche. (R) passt geometrisch nicht. AMR-Racemase: CoA-Thioester → Enolisierung am α-C → Reprotonierung bevorzugt (S)-seitig. t₁/₂ Konversion: ~2–3 h.",deepdive:"Dexibuprofen (reines S) ist in manchen Ländern als schneller wirksame Alternative verfügbar. Ökonomisch ist das Racemat attraktiver – die Natur erledigt die chirale Auflösung."},
{id:32,title:"🪞 Spiegelbild-Bakterien (Mirror Life)",desc:"Was, wenn Bakterien aus L-Zuckern und D-Aminosäuren bestünden? Unser Immunsystem wäre blind!",grade:10,cat:"pharma",funfact:"💡 2024/25 zeigten chinesische Forscher den ersten Spiegelbild-Ribosomen. 38 Nobelpreisträger forderten ein Moratorium – eine der beunruhigendsten Entdeckungen der Biotechnologie!",hint:"Unser Immunsystem erkennt Moleküle anhand ihrer 3D-Form. Wenn alles gespiegelt wäre...?",explanation:"Natürliches Leben nutzt D-Zucker und L-Aminosäuren. 'Spiegelleben' aus L-Zuckern und D-Aminosäuren wäre für Antikörper und T-Zell-Rezeptoren unsichtbar.",particle:"Antikörper-Paratope sind chirale Bindungstaschen aus L-Aminosäuren, optimiert für L-Peptide und D-Zucker. Ein Spiegel-Organismus hätte komplett gespiegelte Oberflächenantigene → MHC-Präsentation versagt (D-Peptide passen nicht). Toll-like-Rezeptoren erkennen L-LPS → D-LPS löst keine Immunantwort aus.",deepdive:"Gegenargument: Spiegelbakterien könnten unsere D-Zucker nicht verwerten. ABER: Photosynthetische Spiegelorganismen bräuchten nur CO₂ und Licht – die haben keine Chiralität!"},
{id:33,title:"🧬 Insulin-Analoga",desc:"Natürliches Insulin wirkt zu langsam. Ein paar Aminosäuretausche ändern alles.",grade:12,cat:"pharma",funfact:"💡 Insulin Lispro (Humalog®) unterscheidet sich nur in der Vertauschung zweier Aminosäuren – Pro-B28 ↔ Lys-B29. Wirkungseintritt 3× schneller!",hint:"Insulin bildet Hexamere (6er-Komplexe), die sich erst auflösen müssen. Wie verhindert man das?",explanation:"Lispro: Pro-Lys-Tausch stört die Dimerisierung → sofort Monomere → schnellere Resorption. Glargin: Zwei Arginine verschieben den isoelektrischen Punkt → Präzipitation im Gewebe → langsame Auflösung.",particle:"Natürliches Insulin: B28-Pro stabilisiert die β-Faltblatt-Dimer-Interaktion → 3 Dimere + 2 Zn²⁺ → Hexamer (36.000 Da, zu groß für Kapillaren). Lispro: Lys-B28 erzeugt sterischen Clash → kein Dimer → Monomer (5.800 Da) → schnelle Diffusion (t₁/₂ <15 min vs. 1–2 h).",deepdive:"Neueste Generation: Insulin Icodec – einmal wöchentlich durch Fettsäure-Seitenkette, die an Albumin bindet → Depot-Effekt."},
{id:34,title:"💊 Antibabypille – die Ethinyl-Gruppe",desc:"Natürliches Östradiol wird in der Leber sofort abgebaut. Eine C≡CH-Gruppe ändert alles.",grade:12,cat:"pharma",funfact:"💡 Carl Djerassi synthetisierte 1951 Norethisteron, das erste orale Gestagen. Er wird 'Vater der Pille' genannt.",hint:"Die Leber oxidiert Steroide am C-17 mit Cytochrom P450. Was, wenn dort eine Dreifachbindung sitzt?",explanation:"Die Ethinylgruppe (-C≡CH) an C-17 hemmt CYP3A4 irreversibel: Das Enzym oxidiert die Gruppe zum Keten, das kovalent im aktiven Zentrum bindet ('Suizid-Substrat'). Halbwertszeit steigt von ~1h auf ~24h.",particle:"CYP3A4 oxidiert normalerweise die 17β-OH-Gruppe von Östradiol → Estron → Glucuronidierung. Die terminale C≡CH wird zum Ketenintermediat oxidiert (Fe⁴⁺=O abstrahiert H → Radikal → Keten). Dieses alkyliert kovalent einen Aminosäure-Rest → irreversibler Inhibitor. Ergebnis: orale Bioverfügbarkeit.",deepdive:"Moderne Pillen verwenden Estradiolvalerat (natürliches Östrogen-Prodrug) → weniger Thromboserisiko als Ethinylestradiol."},
{id:35,title:"💉 Botox – Gift wird Medizin",desc:"Das tödlichste Gift der Welt wird in winzigen Dosen gegen Falten und Migräne eingesetzt.",grade:12,cat:"pharma",funfact:"💡 Letale Dosis: ~1–2 ng/kg! Theoretisch könnte 1 Gramm 1 Million Menschen töten. Eine Botox-Spritze enthält nur 0,73 ng.",hint:"Botox spaltet ein Protein, das Acetylcholin-Vesikel an die Membran bindet. Was passiert ohne ACh-Freisetzung?",explanation:"Botulinumtoxin Typ A spaltet SNAP-25 (ein SNARE-Protein). Ohne SNAP-25 können ACh-Vesikel nicht mit der Membran fusionieren → keine Muskelkontraktion.",particle:"Schwere Kette (100 kDa): Bindung an SV2-Rezeptor → Endozytose. Leichte Kette (50 kDa): Zink-Protease, spaltet SNAP-25 an Gln197-Arg198. Ohne SNAP-25 keine Vesikel-Exozytose (~10.000 ACh-Moleküle/Vesikel) → schlaffe Lähmung. Wirkdauer: 3–6 Monate (neue SNAP-25-Synthese + Nervenaussprossen).",deepdive:"7 Serotypen (A–G) spalten verschiedene SNARE-Proteine. In der Lebensmittelsicherheit ist Botulismus durch unsachgemäß eingemachte Konserven die Hauptgefahr."},
{id:36,title:"🎆 Feuerwerksfarben",desc:"Grün, Rot, Blau, Gold – die Farben am Himmel durch spezifische Metallsalze.",grade:9,cat:"pyro",funfact:"💡 Blaues Feuerwerk ist die schwierigste Farbe! CuCl emittiert nur bei 1000–1200 °C. Zu heiß → Zerfall, zu kalt → keine Emission. Pyrotechniker arbeiten jahrelang an perfektem Blau.",hint:"Angeregte Elektronen fallen in den Grundzustand zurück und senden Licht aus. Welche Metalle erzeugen welche Farben?",explanation:"Metallchloride in der Flamme (~1500 °C) emittieren beim Zurückfallen angeregter Elektronen charakteristisches Licht: Sr → rot (606 nm), Ba → grün (524 nm), Cu → blau (480 nm), Na → gelb (589 nm).",particle:"SrCl(g) in der Flamme: Elektronische Übergänge zwischen Molekülorbitalen bei 606/636 nm → Rot. Chlordonatoren (PVC, Hexachlorbenzol) erzeugen gasförmige Metallchloride. Mg/Al-Pulver verbrennt zu MgO/Al₂O₃ → weißes Plancksches Strahlungsspektrum für Funkeln.",deepdive:"Umweltfreundliche Pyrotechnik ersetzt KClO₄ durch Tetrazole/Triazine – weniger Perchlorate im Grundwasser. Drohnenshows ersetzen zunehmend klassisches Feuerwerk."},
{id:37,title:"✨ Wunderkerzen-Chemie",desc:"Goldene Funken, die sich nicht ausblasen lassen – wie funktioniert das?",grade:9,cat:"pyro",funfact:"💡 Wunderkerzen brennen bei 1000–1500 °C! Die Funken sind glühende Eisenpartikel (>1500 °C), die zu Fe₃O₄ oxidieren.",hint:"Metallpulver verbrennt an der Luft. Warum funktioniert Ausblasen nicht?",explanation:"Eisenpulver + Bariumnitrat (Oxidationsmittel) + Dextrin (Bindemittel) auf Eisendraht: selbsterhaltende Thermitreaktion. Genug Energie, um benachbartes Material zu entzünden – Ausblasen kühlt nur die Oberfläche.",particle:"Ba(NO₃)₂ → BaO + 2NO₂ + ½O₂ ab ~590 °C. Freigesetzter O₂ oxidiert Eisenpulver (~40 µm): 3Fe + 2O₂ → Fe₃O₄ (ΔH = -1118 kJ/mol). Funken = glühende Fe-Partikel, durch NO₂-Gasbildung herausgeschleudert. Reaktionswärme >> Konvektionskühlung → Ausblasen unmöglich.",deepdive:"Indoor-Wunderkerzen für Hochzeitstorten verwenden Titan statt Eisen – die Funken passivieren an der Oberfläche (TiO₂) und sind kühler."},
{id:38,title:"💥 Knallerbsen-Chemie",desc:"Winzige Erbsen, die beim Werfen laut knallen – mit nur 0,08 mg Sprengstoff.",grade:10,cat:"pyro",funfact:"💡 Alfred Nobel experimentierte mit Silberfulminat, bevor er auf Nitroglycerin umstieg – Fulminat war zu gefährlich, selbst für ihn!",hint:"Silberfulminat (AgCNO) hat eine instabile Bindung. Was macht sie so stoßempfindlich?",explanation:"Silberfulminat (AgCNO) ist ein primärer Sprengstoff: Die Ag-C≡N-O-Bindung ist thermodynamisch instabil. Minimale Reibung → exotherme Zersetzung zu Ag + CO + ½N₂. Sand in den Erbsen liefert die Reibfläche.",particle:"Die Fulminat-Gruppe (C≡N-O⁻): C an drei elektronegative Atome gebunden. Bindungsenergie der Produkte (CO: 1072 kJ/mol + ½N₂: 472 kJ/mol) >> Edukte → stark exotherm. Extrem niedrige Aktivierungsenergie – mechanische Schockwelle reicht. Sand konzentriert den Impuls auf Fulminat-Kristalle → lokale Druckspitze → Detonation. Geringe Menge (~0,08 mg) = ungefährlich.",deepdive:"Moderne Zündhütchen verwenden Bleisteyphat oder DDNP (Diazodinitrophenol) – weniger empfindlich, besser kontrollierbar als historisches Knallsilber."},
{id:39,title:"🌈 Glow Sticks (Knicklichter)",desc:"Knicken, schütteln, leuchten – ganz ohne Strom oder Hitze.",grade:10,cat:"pyro",funfact:"💡 Das US-Militär nutzt Knicklichter seit den 1970ern – wasserdicht, funkenlos, lautlos. Perfekt für Nachteinsätze!",hint:"Zwei Lösungen: Oxalat-Ester + H₂O₂. Ein energiereiches Zwischenprodukt überträgt Energie auf einen Farbstoff.",explanation:"TCPO + H₂O₂ → 1,2-Dioxetandion (hochenergetischer Vierring). Dessen Zerfall überträgt Energie auf einen Fluoreszenzfarbstoff → Licht.",particle:"Der Dioxetandion-Ring ist extrem gespannt (Ringspannung + schwache O-O-Bindung). Zerfall → 2 CO₂ + ~400 kJ/mol Energie. Dexter-Mechanismus (Elektronenaustausch bei <10 Å) überträgt auf Farbstoff → S₁ → Fluoreszenz. Farbe durch Farbstoff: Diphenylanthracen → blau, Rubrene → gelb, Rhodamin B → rot.",deepdive:"Leuchtstärke hängt von T ab: Kühlschrank → schwächer, aber länger. Heißes Wasser → heller, kürzer (Arrhenius: k = A·e^(-Ea/RT)). Warme Sommernächte = kürzere Leuchtdauer!"},
{id:40,title:"🚗 Airbag in 30 Millisekunden",desc:"Bei einem Crash bläht sich der Airbag schneller auf als ein Wimpernschlag dauert.",grade:10,cat:"pyro",funfact:"💡 Ein Wimpernschlag: ~300 ms. Airbag-Entfaltung: ~30 ms! 60 g Natriumazid erzeugen 60–80 L N₂.",hint:"NaN₃ enthält drei N-Atome in Reihe. Was passiert, wenn alle Bindungen gleichzeitig brechen?",explanation:"NaN₃ → Na + 3/2 N₂ (>300 °C). Natrium wird durch KNO₃ + SiO₂ zu Natriumsilicat (Glas!) oxidiert → ungefährlich. In <30 ms entstehen ~70 L Stickstoff.",particle:"2 NaN₃ → 2 Na + 3 N₂ (ΔH = -21,3 kJ/mol). Azid (N₃⁻) ist linear, isoelektronisch zu CO₂, mit delokalisierten π-Elektronen. Bei thermischer Zersetzung: N-Na-Bindungen brechen homolytisch → N₂ (Dreifachbindung, 945 kJ/mol = Triebkraft!). Folgereaktionen: 10 Na + 2 KNO₃ → K₂O + 5 Na₂O + N₂, dann Na₂O + SiO₂ → Natriumsilicat-Glas. Natrium sicher neutralisiert.",deepdive:"Moderne Gasgeneratoren verwenden Guanidinnitrat/Tetrazol statt NaN₃ – weniger toxisch. Erste Generation (1970er) entfaltete zu schnell → Verletzungen bei Kindern → heute zweistufige Zünder."},
{id:41,title:"⚡ Blitzpulver vs. Schwarzpulver",desc:"Schwarzpulver brennt relativ langsam. Blitzpulver kann detonieren – viel gefährlicher.",grade:10,cat:"pyro",funfact:"💡 Schwarzpulver wurde im 9. Jh. in China erfunden – bei der Suche nach dem Elixier der Unsterblichkeit! Blitzpulver wurde früher in der Fotografie benutzt (daher der Name).",hint:"Beide: Oxidationsmittel + Brennstoff. Aber Teilchengröße und Oxidationsmittel unterscheiden sich. Wie beeinflusst das die Reaktionsgeschwindigkeit?",explanation:"Schwarzpulver (KNO₃ + Kohle + Schwefel): deflagriert (~400 m/s). Blitzpulver (KClO₄ + feines Al-Pulver): kann detonieren (>2000 m/s). KClO₄ gibt O₂ schneller ab, µm-feines Al hat riesige Oberfläche.",particle:"Schwarzpulver: KNO₃ gibt O₂ erst ab ~400 °C, Reaktion pflanzt sich durch Wärmeleitung fort (Deflagration). Blitzpulver: KClO₄ → KCl + 2O₂ ab ~600 °C, mehr O₂/g. Al + ¾O₂ → ½Al₂O₃ (ΔH = -1676 kJ/mol – extrem exotherm!). Bei µm-Partikelgröße: riesiges A/V-Verhältnis → Reaktion schneller als Druckwelle → DDT (Deflagration-to-Detonation Transition) möglich.",deepdive:"Viele Silvester-Unfälle entstehen durch illegales Blitzpulver – in der EU für Privatpersonen verboten, wird aber online illegal gehandelt."},
{id:42,title:"🐍 Pharaoschlange",desc:"Ein kleines Häufchen Pulver wächst beim Anzünden zu einer riesigen 'Schlange' heran.",grade:11,cat:"pyro",funfact:"💡 Die Original-Pharaoschlange aus Hg(SCN)₂ wurde im 19. Jh. als Spielzeug verkauft – bis man den giftigen Hg-Dampf bemerkte! Heute: NaHCO₃ + Zucker + Sand als ungiftige Alternative.",hint:"Beim Erhitzen zerfällt die Substanz in Gase und einen voluminösen Feststoff. Was bewirkt das Aufblähen?",explanation:"Hg(SCN)₂ → HgS + C₃N₄ + CS₂↑. Große Gasmengen blähen den festen Rückstand (C₃N₄, hochschmelzendes Netzwerk-Polymer) auf → Volumenzunahme 100-1000×. Ungiftige Alternative: NaHCO₃ → CO₂ bläht karamellisierten Zucker.",particle:"Ab ~165 °C: Ein Mol (~316 g) erzeugt mehrere Mol Gas. C₃N₄ hat eine Graphit-ähnliche Schichtstruktur aus kondensierten Triazin-Ringen – bleibt bei Expansion intakt → feste, poröse 'Schlange'. HgS sublimiert teilweise → toxisch!",deepdive:"C₃N₄ ist heute ein Forschungs-Hotspot: Als Photokatalysator kann es unter Licht Wasser spalten → Wasserstoffproduktion! Von viktorianischem Spielzeug zum Zukunftsmaterial."},
{id:43,title:"💡 Seltene Erden in LEDs",desc:"Energiesparlampen und LEDs brauchen Lanthanoide für weißes Licht.",grade:11,cat:"pyro",funfact:"💡 2010 kamen 97 % der Seltenen Erden aus China. Exportbeschränkungen ließen den Europiumpreis um 1200 % steigen!",hint:"Weißes Licht = R+G+B. Welche Lanthanoid-Ionen emittieren in diesen Farben?",explanation:"UV-Licht (von Hg bei 254 nm) regt Lanthanoid-Phosphore an: Eu³⁺ → rot (611 nm), Tb³⁺ → grün (545 nm), Eu²⁺ → blau (~450 nm). Zusammen → weiß.",particle:"Die 4f-Orbitale der Lanthanoide sind durch 5s²5p⁶ abgeschirmt → extrem scharfe Emissionslinien (~1 nm) und kaum umgebungsabhängig. Eu³⁺ in YVO₄: VO₄³⁻ absorbiert UV (Charge Transfer O²⁻→V⁵⁺), überträgt Energie auf Eu³⁺ (Antenna-Effekt) → 619 nm. Quantenausbeute: bis 95 %!",deepdive:"In weißen LEDs: Blaue InGaN-LED (450 nm) regt Ce³⁺-dotiertes YAG an → gelbe Emission. Blau + Gelb = Weiß. Premium-LEDs haben zusätzlich Eu²⁺-Phosphore für bessere Rotanteile."},
{id:44,title:"🪲 Glühwürmchen-Leuchten",desc:"Das effizienteste Licht der Natur – fast ohne Wärme.",grade:9,cat:"pyro",funfact:"💡 Quantenausbeute: bis 41 % – fast jedes zweite theoretisch mögliche Photon wird emittiert! Eine Glühbirne: nur ~2 %. Luciferin wird auch als Reporter-Gen für Tumorforschung genutzt.",hint:"Ein Enzym (Luciferase) oxidiert ein Substrat (Luciferin). Das Produkt entsteht im angeregten Zustand...",explanation:"D-Luciferin wird durch Luciferase mit O₂ und ATP oxidiert. Oxyluciferin entsteht im S₁-Zustand und emittiert ein Photon bei 560 nm beim Relaxieren.",particle:"(1) Luciferase adenyliert Luciferin (+ ATP → Luciferyl-AMP). (2) O₂ greift am C4 des Thiazolrings an → Dioxetanon-Intermediat (gespannter Vierring). (3) CO₂-Abspaltung → Oxyluciferin in S₁. (4) S₁→S₀ = Photon. Farbe hängt von der Luciferase ab: verschiedene Spezies → verschiedene Bindungstaschen → gelb-grün bis rot.",deepdive:"ATP-Biolumineszenz wird zur Hygieneüberwachung in Krankenhäusern genutzt: Wischprobe + Luciferin/Luciferase → Licht = Bakterien vorhanden!"},
{id:45,title:"📱 OLEDs in Smartphones",desc:"Jeder Pixel eines OLED-Displays ist seine eigene Lichtquelle – ohne Hintergrundbeleuchtung.",grade:12,cat:"pyro",funfact:"💡 Faltbare Displays (Galaxy Fold) sind nur möglich, weil OLEDs auf flexiblem Plastik statt starrem Glas aufgebaut werden!",hint:"Organische Halbleiter haben HOMO und LUMO. Was passiert, wenn Elektronen und 'Löcher' sich treffen?",explanation:"Kathode injiziert Elektronen ins LUMO, Anode entfernt Elektronen aus dem HOMO (→ 'Löcher'). Elektron + Loch treffen sich in der Emitterschicht → Exciton → Licht.",particle:"Emitter z. B. Ir(ppy)₃: Elektron besetzt π*-LUMO des Phenylpyridin-Liganden, Loch das Ir-d/π-HOMO. Exciton (Coulomb-Bindung ~0,3 eV) relaxiert: Singlett → Fluoreszenz (25 %), Triplett → Phosphoreszenz durch Spin-Bahn-Kopplung am schweren Ir (75 %). Ohne Ir wären 75 % Wärme! Farbe = HOMO-LUMO-Lücke: größer → blau, kleiner → rot.",deepdive:"Das 'Blue OLED Problem': Große HOMO-LUMO-Lücke → energetisch angeregte, instabile Moleküle. Neueste Lösung: TADF (Thermally Activated Delayed Fluorescence) – organisch, ohne teures Iridium."}
];

let state={screen:'grade',selectedGrade:null,pool:[],seen:new Set(),current:null,hypothesis:'',hintShown:false,thumbs:null,adjustment:'',stats:{correct:0,incorrect:0,total:0},completedGrades:new Set()};

function getGradeLabel(g){return g<=10?`Klasse ${g}`:g===11?'EF / Q1':'Q1 / Q2'}
function getGradeEmoji(g){return{7:'🔬',8:'⚗️',9:'🧫',10:'🔭',11:'📐',12:'🎓'}[g]||'🧪'}
function getCatClass(c){return{alltag:'cat-alltag',forensik:'cat-forensik',pharma:'cat-pharma',pyro:'cat-pyro'}[c]}
function getCatLabel(c){return{alltag:'Alltag & Küche',forensik:'Forensik & Kriminaltechnik',pharma:'Medikamente & Pharmazie',pyro:'Pyrotechnik & Lumineszenz'}[c]}
function getPhenomenaForGrade(g){return PHENOMENA.filter(p=>p.grade<=g)}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function buildPool(g){return shuffle(getPhenomenaForGrade(g).filter(p=>!state.seen.has(p.id)))}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function drawNext(){
  if(!state.pool.length) state.pool=buildPool(state.selectedGrade);
  if(!state.pool.length){state.screen='complete';render();return}
  state.current=state.pool.pop();
  state.seen.add(state.current.id);
  state.hypothesis='';state.hintShown=false;state.thumbs=null;state.adjustment='';
  state.screen='card';render();
}

function render(){
  const el=document.getElementById('app');
  ({grade:renderGrade,card:renderCard,reveal:renderReveal,complete:renderComplete})[state.screen](el);
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderGrade(el){
  const grades=[7,8,9,10,11,12];
  el.innerHTML=`
    <div class="header"><h1>🧪 Hypothesentrainer Chemie</h1><p>Entdecke faszinierende chemische Phänomene und bilde Hypothesen auf der Teilchenebene!</p></div>
    ${state.stats.total?`<div class="stats-bar"><div class="stat">🎯 Gesamt: <span class="num">${state.stats.total}</span></div><div class="stat">👍 Richtig: <span class="num">${state.stats.correct}</span></div><div class="stat">👎 Zu überarbeiten: <span class="num">${state.stats.incorrect}</span></div></div>`:''}
    <div class="grade-select"><h2>Wähle deine Jahrgangsstufe</h2><div class="grade-grid">${grades.map(g=>{
      const cnt=getPhenomenaForGrade(g).length,seen=getPhenomenaForGrade(g).filter(p=>state.seen.has(p.id)).length,done=state.completedGrades.has(g);
      return`<div class="grade-btn ${done?'completed':''}" onclick="selectGrade(${g})"><span class="emoji">${getGradeEmoji(g)}</span><span class="label">${getGradeLabel(g)}</span><span class="sub">${cnt} Phänomene${seen?` · ${seen} gesehen`:''}</span></div>`
    }).join('')}</div></div>`;
}

function selectGrade(g){state.selectedGrade=g;state.pool=buildPool(g);drawNext()}

function renderCard(el){
  const p=state.current;
  el.innerHTML=`
    <button class="back-btn" onclick="goBack()">← Jahrgangsstufe wählen</button>
    <div class="stats-bar"><div class="stat">🃏 Karte <span class="num">#${state.stats.total+1}</span></div><div class="stat">👍 <span class="num">${state.stats.correct}</span></div><div class="stat">👎 <span class="num">${state.stats.incorrect}</span></div></div>
    <div class="card-container"><div class="card" style="animation:slideUp .45s ease">
      <div class="card-header"><span class="card-category ${getCatClass(p.cat)}">${getCatLabel(p.cat)}</span><span class="card-grade">${getGradeLabel(p.grade)}</span></div>
      <div class="card-body">
        <div class="phenomenon-title">${p.title}</div>
        <div class="phenomenon-desc">${p.desc}</div>
        <div class="funfact"><div class="ff-label">Fun Fact</div>${p.funfact.replace('💡 ','')}</div>
      </div>
      <div class="hypo-section">
        <div class="hypo-label">✍️ Deine Hypothese</div>
        <textarea class="hypo-input" id="hypoInput" placeholder="Formuliere hier deine Hypothese: Wie lässt sich das Phänomen auf der Teilchenebene erklären?">${state.hypothesis}</textarea>
        <button class="hint-btn" onclick="toggleHint()">${state.hintShown?'🙈 Tipp verbergen':'💡 Denkanstoß anzeigen'}</button>
        ${state.hintShown?`<div class="hint-box">🧩 ${p.hint}</div>`:''}
      </div>
      <button class="reveal-btn" id="revealBtn" onclick="revealAnswer()">🔍 Erklärung aufdecken</button>
    </div></div>`;
  setTimeout(()=>{
    const inp=document.getElementById('hypoInput'),btn=document.getElementById('revealBtn');
    if(!inp||!btn) return;
    const upd=()=>{state.hypothesis=inp.value;const ok=inp.value.trim().length>=10;btn.disabled=!ok;btn.textContent=ok?'🔍 Erklärung aufdecken':'🔍 Erklärung aufdecken (mind. 10 Zeichen)'};
    inp.addEventListener('input',upd);upd();
  },50);
}

function toggleHint(){state.hintShown=!state.hintShown;render()}
function revealAnswer(){state.screen='reveal';render()}
function goBack(){state.screen='grade';render()}

function renderReveal(el){
  const p=state.current,isDeep=p.grade<state.selectedGrade;
  el.innerHTML=`
    <button class="back-btn" onclick="goBack()">← Jahrgangsstufe wählen</button>
    <div class="stats-bar"><div class="stat">🃏 Karte <span class="num">#${state.stats.total+1}</span></div><div class="stat">👍 <span class="num">${state.stats.correct}</span></div><div class="stat">👎 <span class="num">${state.stats.incorrect}</span></div></div>
    <div class="card-container"><div class="card" style="animation:flipIn .4s ease">
      <div class="card-header"><span class="card-category ${getCatClass(p.cat)}">${getCatLabel(p.cat)}</span><span class="card-grade">${getGradeLabel(p.grade)}</span></div>
      <div class="card-body" style="background:rgba(110,231,183,.03)">
        <div class="phenomenon-title">${p.title}</div>
        <div style="margin-bottom:14px"><div style="font-size:.78rem;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:4px;font-weight:600">📝 Deine Hypothese</div><div class="hypo-display">${escHtml(state.hypothesis)}</div></div>
      </div>
      <div class="explanation-section"><div class="card-body">
        <div class="explanation-title">🔬 Erklärung</div>
        <div class="explanation-text">${p.explanation}</div>
        <div class="particle-level"><div class="pl-label">⚛️ Auf Teilchenebene</div><p>${p.particle}</p></div>
        <div class="deep-dive"><div class="dd-label">${isDeep?'🚀 Vertiefung für '+getGradeLabel(state.selectedGrade):'🌍 Wusstest du?'}</div><p>${p.deepdive}</p></div>
      </div></div>
      <div class="assessment">
        <h3>🤔 Wie gut war deine Hypothese?</h3>
        <div class="thumb-row">
          <button class="thumb-btn up ${state.thumbs==='up'?'active':''}" onclick="setThumbs('up')">👍</button>
          <button class="thumb-btn down ${state.thumbs==='down'?'active':''}" onclick="setThumbs('down')">👎</button>
        </div>
        ${state.thumbs!==null?`
        <div class="adjust-section" style="animation:fadeIn .3s ease">
          <div class="adjust-label">${state.thumbs==='up'?'🎉 Super! Möchtest du deine Hypothese ergänzen?':'📝 Wie würdest du deine Hypothese jetzt anpassen?'}</div>
          <textarea class="adjust-input" id="adjustInput" placeholder="${state.thumbs==='up'?'Optional: Ergänzungen...':'Überarbeitete Hypothese...'}">${state.adjustment}</textarea>
        </div>
        <button class="next-btn" onclick="nextCard()">Nächstes Phänomen →</button>`:''}
      </div>
    </div></div>`;
  if(state.thumbs!==null) setTimeout(()=>{const a=document.getElementById('adjustInput');if(a) a.addEventListener('input',()=>{state.adjustment=a.value})},50);
}

function setThumbs(v){state.thumbs=v;render();setTimeout(()=>{const a=document.querySelector('.adjust-section');if(a)a.scrollIntoView({behavior:'smooth',block:'center'})},100)}

function nextCard(){
  state.stats.total++;
  if(state.thumbs==='up') state.stats.correct++; else state.stats.incorrect++;
  if(getPhenomenaForGrade(state.selectedGrade).every(p=>state.seen.has(p.id))){state.completedGrades.add(state.selectedGrade);state.screen='complete';render();spawnConfetti();return}
  drawNext();
}

function renderComplete(el){
  const t=state.stats.total,c=state.stats.correct,pct=t?Math.round(c/t*100):0;
  el.innerHTML=`<div class="completion">
    <div class="big-emoji">🎉</div><h2>Alle Phänomene geschafft!</h2><p>${getGradeLabel(state.selectedGrade)} ist abgeschlossen</p>
    <div class="score">${pct}%</div><p>${c} von ${t} Hypothesen bestätigt</p>
    <p style="font-size:.85rem;color:var(--text3);margin:12px 0 24px">${pct>=80?'🏆 Hervorragend! Du denkst wie ein Chemiker!':pct>=50?'👏 Gute Arbeit! Weiter üben lohnt sich.':'💪 Übung macht den Meister!'}</p>
    <button class="restart-btn" onclick="goBack()">🔄 Weitere Jahrgangsstufe</button><br>
    <button class="restart-btn" style="margin-top:10px;background:linear-gradient(135deg,var(--purple),var(--pink))" onclick="resetAll()">🔁 Alles zurücksetzen</button>
  </div>`;
}

function resetAll(){state.seen.clear();state.completedGrades.clear();state.stats={correct:0,incorrect:0,total:0};state.screen='grade';render()}

function spawnConfetti(){
  const cols=['#6ee7b7','#a78bfa','#f472b6','#fbbf24','#60a5fa','#fb923c'];
  for(let i=0;i<40;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${cols[i%6]};animation-delay:${Math.random()}s;animation-duration:${1.5+Math.random()*1.5}s;width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;border-radius:${Math.random()>.5?'50%':'2px'}`;document.body.appendChild(p);setTimeout(()=>p.remove(),3500)}
}

render();
</script>
</body>
</html>
